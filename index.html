<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GLINT - The Great Slumber</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

    <style>
        :root {
            --bg-night: #0b0d14;
            --glass-bg: rgba(20, 25, 40, 0.45);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-title: #ffffff;
            --text-body: rgba(255, 255, 255, 0.8);
            --accent-pure: #8be9fd;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-night);
            color: var(--text-body);
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            -webkit-font-smoothing: antialiased;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.15'/%3E%3C/svg%3E");
            mix-blend-mode: overlay;
            z-index: 9999;
            pointer-events: none;
        }

        h1,
        h2,
        h3,
        .serif {
            font-family: 'Playfair Display', serif;
            color: var(--text-title);
            font-weight: normal;
            text-wrap: balance;
        }

        #transition-veil {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: var(--bg-night);
            z-index: 999999;
            opacity: 1;
            transition: opacity 1.2s ease-in-out;
            pointer-events: none;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
        }

        #threejs-radar-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #dream-veil {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, transparent 0%, rgba(11, 13, 20, 0.8) 100%);
            pointer-events: none;
            z-index: 2;
        }

        .edge-glow {
            position: absolute;
            top: 0;
            width: 80px;
            height: 100vh;
            pointer-events: none;
            z-index: 90;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        #glow-left {
            left: 0;
        }

        #glow-right {
            right: 0;
        }

        #radar-ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 80px;
            box-sizing: border-box;
            z-index: 10;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1.5s ease;
        }

        .info-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 30px 20px;
            text-align: center;
            width: 85%;
            max-width: 350px;
            height: 300px;
            pointer-events: auto;
            box-sizing: border-box;
            transition: box-shadow 1s ease;
        }

        .panel-blobs {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            opacity: 0.3;
            border-radius: 20px;
            overflow: hidden;
        }

        .panel-blob {
            position: absolute;
            filter: blur(40px);
            opacity: 0.6;
        }

        .panel-blob.b1 {
            animation: driftBlob1 20s linear infinite;
        }

        .panel-blob.b2 {
            animation: driftBlob2 15s linear infinite reverse;
        }

        .info-top {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100px;
            width: 100%;
        }

        .info-mid {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            width: 100%;
        }

        .info-bottom {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            height: 20px;
            width: 100%;
        }

        .main-title {
            font-size: 1.5rem;
            letter-spacing: 2px;
            margin: 0 0 10px 0;
            line-height: 1;
        }

        #distance-display {
            font-size: 2rem;
            font-weight: 200;
            margin: 0;
            color: var(--text-title);
            line-height: 1;
            display: flex;
            align-items: center;
        }

        #status-display {
            font-weight: 200;
            font-size: 0.8rem;
            margin: 0;
            line-height: 1.2;
            text-wrap: balance;
            height: 2em;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .data-stream {
            font-size: 0.65rem;
            color: var(--text-body);
            margin: 0;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.6;
            line-height: 1;
        }

        button {
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            margin: 0;
            height: 55px;
            width: 100%;
            box-sizing: border-box;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-title);
            font-family: 'Montserrat', sans-serif;
            font-weight: 400;
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: all 0.4s ease;
            line-height: 1;
        }

        button:active {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(0.98);
        }

        #recalc-btn {
            display: none;
            font-size: 0.65rem;
            border: none;
            opacity: 0.5;
            height: 40px;
            background: transparent;
            margin-top: 15px;
        }

        #ar-container {
            width: 100%;
            display: none;
        }

        #ARButton {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid var(--accent-pure) !important;
            color: var(--accent-pure) !important;
            font-family: 'Montserrat', sans-serif !important;
            font-weight: 600 !important;
            letter-spacing: 2px !important;
            position: relative !important;
            bottom: auto !important;
            left: auto !important;
            transform: none !important;
            width: 100% !important;
            max-width: 100% !important;
            margin: 0 !important;
            height: 55px !important;
            border-radius: 50px !important;
            box-shadow: 0 0 15px var(--accent-pure) !important;
        }

        #xr-ui {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: fit-content;
            z-index: 100;
            pointer-events: none;
            text-align: center;
            display: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 0.8rem;
            letter-spacing: 2px;
            font-weight: 600;
            transition: all 0.4s ease;
        }

        /* --- STYLES FICHE ARTEFACT --- */
        .fs-fiche {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-night) !important;
            z-index: 3000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            overflow: hidden;
        }

        .fs-blobs-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .fs-blob {
            position: absolute;
            filter: blur(70px);
            opacity: 0.7;
            mix-blend-mode: screen;
        }

        .fs-blob.b1 {
            animation: driftBlob1 25s linear infinite;
        }

        .fs-blob.b2 {
            animation: driftBlob2 20s linear infinite reverse;
        }

        @keyframes driftBlob1 {
            0% {
                border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
                transform: translate(-10%, -10%) rotate(0deg) scale(1);
            }

            33% {
                border-radius: 70% 30% 50% 50% / 30% 30% 70% 70%;
                transform: translate(20%, 15%) rotate(120deg) scale(1.3);
            }

            66% {
                border-radius: 100% 60% 60% 100% / 100% 100% 60% 60%;
                transform: translate(-15%, 20%) rotate(240deg) scale(0.9);
            }

            100% {
                border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
                transform: translate(-10%, -10%) rotate(360deg) scale(1);
            }
        }

        @keyframes driftBlob2 {
            0% {
                border-radius: 60% 40% 30% 70% / 60% 50% 40% 50%;
                transform: translate(10%, 10%) rotate(0deg) scale(1);
            }

            33% {
                border-radius: 30% 70% 70% 30% / 50% 40% 60% 50%;
                transform: translate(-20%, -15%) rotate(120deg) scale(1.4);
            }

            66% {
                border-radius: 50% 50% 30% 70% / 40% 60% 50% 50%;
                transform: translate(15%, -20%) rotate(240deg) scale(0.8);
            }

            100% {
                border-radius: 60% 40% 30% 70% / 60% 50% 40% 50%;
                transform: translate(10%, 10%) rotate(360deg) scale(1);
            }
        }

        .fs-content {
            position: relative;
            z-index: 2;
            width: 85%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .artifact-3d-canvas {
            width: 250px;
            height: 250px;
            margin: 0 auto 10px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            filter: drop-shadow(0 20px 30px rgba(0, 0, 0, 0.5));
        }

        .fs-content h2 {
            font-family: 'Playfair Display', serif;
            font-weight: 400;
            font-size: 1.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 0 0 15px 0;
            color: #fff;
            text-align: center;
        }

        .fs-content .artifact-lore {
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.9);
            text-align: center;
            line-height: 1.6;
            margin-bottom: 25px;
            text-wrap: balance;
        }

        .clean-divider {
            border: none;
            border-top: 1px solid rgba(255, 255, 255, 0.4);
            width: 100%;
            margin: 0 0 20px 0;
        }

        .clean-stats {
            width: 100%;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 2px;
        }

        .clean-stats p {
            margin: 12px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .clean-stats .lbl {
            opacity: 0.7;
            text-transform: uppercase;
            font-weight: 400;
        }

        .clean-stats .val {
            font-weight: 300;
            color: #fff;
            letter-spacing: 1px;
        }

        .clean-stats .val.resonance {
            font-family: 'Montserrat', sans-serif;
            font-weight: 400;
            letter-spacing: 4px;
            color: var(--accent-pure);
            text-transform: uppercase;
        }

        .clean-btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 40px;
            width: 100%;
        }

        .clean-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 30px;
            color: #fff;
            height: 50px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.3s;
        }

        /* --- THE SANCTUARY --- */
        #sanctuary-ui {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #0b0d14;
            z-index: 5000;
            display: none;
            flex-direction: column;
            padding: 50px 0 20px 0;
            box-sizing: border-box;
            overflow: hidden;
        }

        .sanctuary-header {
            text-align: center;
            margin-bottom: 20px;
            flex-shrink: 0;
            padding: 0 20px;
        }

        .sanctuary-header h2 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            margin: 0;
            letter-spacing: 6px;
            font-size: 1.2rem;
            color: #fff;
            text-transform: uppercase;
        }

        .sanctuary-header p {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 5px;
        }

        .map-wrapper {
            padding: 0 20px;
            margin-bottom: 20px;
            flex-shrink: 0;
        }

        #memory-map {
            width: 100%;
            height: 180px;
            border-radius: 15px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--glass-border);
            z-index: 1;
            display: none;
            overflow: hidden;
        }

        .leaflet-control-attribution {
            display: none !important;
        }

        .pulsing-node {
            width: 12px;
            height: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 500;
        }

        .artifact-core {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            z-index: 10;
        }

        .artifact-halo {
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            opacity: 0.8;
            animation: pulseHalo 2s infinite ease-out;
        }

        @keyframes pulseHalo {
            0% {
                transform: scale(1);
                opacity: 0.8;
            }

            100% {
                transform: scale(2.5);
                opacity: 0;
            }
        }

        .constellation {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 20px 0;
        }

        .star {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--glass-border);
            margin: 0 4px;
            transition: all 1s;
        }

        .star-link {
            height: 1px;
            width: 12px;
            background: var(--glass-border);
            transition: background 1s;
        }

        .final-revelation {
            font-family: 'Montserrat', sans-serif;
            font-weight: 400;
            font-size: 1rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 30px;
            padding: 0 20px;
            font-style: normal;
            animation: fadeInAnim 3s forwards;
            text-wrap: balance;
            color: var(--text-title);
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
        }

        /* COVERFLOW STACK */
        .sanctuary-list {
            position: relative;
            flex: 1 1 auto;
            display: flex;
            flex-direction: row;
            gap: 0px;
            overflow-x: auto;
            overflow-y: hidden;
            padding: 20px calc(50vw - 110px);
            scroll-snap-type: x mandatory;
            scrollbar-width: none;
            align-items: center;
        }

        .sanctuary-list::-webkit-scrollbar {
            display: none;
        }

        .fragment-slot {
            position: relative;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            width: 220px;
            height: 340px;
            background: rgba(18, 20, 28, 0.65);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            overflow: hidden;
            backdrop-filter: blur(15px);
            scroll-snap-align: center;
            will-change: transform, opacity, z-index;
        }

        .fragment-slot.active-card {
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8);
        }

        .slot-content {
            position: relative;
            z-index: 2;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100%;
            box-sizing: border-box;
            text-align: center;
        }

        @keyframes morphCardBlob {
            0% {
                border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
                transform: rotate(0deg) scale(1) translate(0, 0);
            }

            33% {
                border-radius: 70% 30% 50% 50% / 30% 30% 70% 70%;
                transform: rotate(120deg) scale(1.3) translate(10%, -10%);
            }

            66% {
                border-radius: 100% 60% 60% 100% / 100% 100% 60% 60%;
                transform: rotate(240deg) scale(0.8) translate(-10%, 15%);
            }

            100% {
                border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
                transform: rotate(360deg) scale(1) translate(0, 0);
            }
        }

        .card-blob {
            position: absolute;
            width: 150%;
            height: 150%;
            filter: blur(45px);
            opacity: 0.6;
            z-index: 0;
            animation: morphCardBlob 12s linear infinite;
            mix-blend-mode: screen;
        }

        .fragment-slot:not(.found) {
            background: rgba(18, 20, 28, 0.3);
            border: 1px dashed rgba(255, 255, 255, 0.05);
        }

        .clickable-slot {
            cursor: pointer;
        }

        .slot-content .slot-title {
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            font-size: 0.65rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.5;
            margin-bottom: auto;
        }

        .slot-content .slot-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            font-weight: 400;
            opacity: 0.3;
            text-transform: uppercase;
            margin-top: auto;
            margin-bottom: 10px;
            line-height: 1.1;
        }

        .fragment-slot.found .slot-name {
            opacity: 1;
            color: var(--text-title);
        }

        .slot-content .slot-word {
            font-family: 'Montserrat', sans-serif;
            font-weight: 400;
            font-size: 1rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-align: center;
            opacity: 0;
        }

        .sanctuary-footer {
            flex-shrink: 0;
            margin-top: 10px;
            padding: 0 20px env(safe-area-inset-bottom, 10px) 20px;
        }

        /* --- DIVERS --- */
        #flash-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #fff;
            z-index: 8000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease-out;
        }

        #apotheosis-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-night);
            z-index: 9999999;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 2s ease-in-out;
        }

        .apo-word {
            font-family: 'Montserrat', sans-serif;
            font-weight: 400;
            font-style: normal;
            font-size: 2.5rem;
            letter-spacing: 8px;
            opacity: 0;
            position: absolute;
            text-transform: uppercase;
            transition: opacity 1.5s ease-in-out, transform 3s ease-out;
            transform: scale(0.8);
            text-align: center;
        }

        .apo-word.show {
            opacity: 1;
            transform: scale(1.1);
            text-shadow: 0 0 30px currentColor;
        }

        #review-ui {
            z-index: 6000;
        }

        /* --- ONBOARDING CLEAN --- */
        #onboarding-ui {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 8000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 1.5s ease;
            background: var(--bg-night);
        }

        .ob-content {
            position: relative;
            z-index: 2;
            width: 85%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .ob-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            font-weight: 400;
            line-height: 1.6;
            color: #fff;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            text-wrap: balance;
            margin-bottom: 40px;
        }

        .ob-btn {
            opacity: 0;
            display: none;
            width: 100%;
            transition: opacity 1s ease;
        }
    </style>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
</head>

<body>

    <div id="transition-veil"></div>
    <div id="flash-overlay"></div>
    <div id="apotheosis-overlay"></div>

    <div id="onboarding-ui">
        <div class="ob-content">
            <p id="ob-text" class="ob-text"></p>
            <button id="ob-btn" class="clean-btn ob-btn"></button>
        </div>
    </div>

    <div id="review-ui" class="fs-fiche">
        <div class="fs-blobs-container">
            <div id="review-bg-blob1" class="fs-blob b1" style="width: 140vw; height: 140vw; top: -20%; left: -20%;">
            </div>
            <div id="review-bg-blob2" class="fs-blob b2"
                style="width: 140vw; height: 140vw; bottom: -20%; right: -20%;"></div>
        </div>
        <div class="fs-content">

    <script type="module">
        import * as THREE from 'three';

        // --- 1. CORE DATA & AUDIO ---
        let audioCtx = null;
        function getAudioCtx() {
            if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
            if (audioCtx.state === 'suspended') { audioCtx.resume(); }
            return audioCtx;
        }

        function playUISound(type) {
            const ctx = getAudioCtx(); const t = ctx.currentTime;
            function sparkle(freq, delay, duration, vol) {
                const osc = ctx.createOscillator(); const gain = ctx.createGain();
                osc.type = 'sine'; osc.frequency.value = freq;
                osc.connect(gain); gain.connect(ctx.destination);
                gain.gain.setValueAtTime(0, t + delay);
                gain.gain.linearRampToValueAtTime(vol, t + delay + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.001, t + delay + duration);
                osc.start(t + delay); osc.stop(t + delay + duration);
            }
            if (type === 'action') { sparkle(1200, 0.00, 0.6, 0.08); sparkle(1500, 0.05, 0.6, 0.08); sparkle(2000, 0.10, 0.8, 0.1); sparkle(2800, 0.15, 1.0, 0.15); }
            else if (type === 'click') { sparkle(2400, 0.0, 0.15, 0.08); sparkle(3200, 0.02, 0.1, 0.04); }
            else if (type === 'transition') { sparkle(3200, 0.00, 0.4, 0.05); sparkle(2600, 0.05, 0.4, 0.08); sparkle(2000, 0.10, 0.5, 0.1); sparkle(1400, 0.15, 0.6, 0.1); }
            else if (type === 'success') {
                const freqs = [1046.50, 1318.51, 1567.98, 2093.00, 2637.02, 3135.96];
                freqs.forEach((f, i) => { let jitter = Math.random() * 0.15; sparkle(f, 0.05 + jitter, 2.5, 0.08); sparkle(f * 1.01, 0.1 + jitter, 2.0, 0.04); });
            }
            else if (type === 'apotheosis') {
                const oscDrone = ctx.createOscillator(); const gainDrone = ctx.createGain();
                oscDrone.type = 'sine'; oscDrone.frequency.value = 55;
                oscDrone.connect(gainDrone); gainDrone.connect(ctx.destination);
                gainDrone.gain.setValueAtTime(0, t); gainDrone.gain.linearRampToValueAtTime(0.3, t + 5); gainDrone.gain.exponentialRampToValueAtTime(0.001, t + 18);
                oscDrone.start(t); oscDrone.stop(t + 18);

                [440, 554.37, 659.25, 880].forEach((f, i) => {
                    const osc = ctx.createOscillator(); const g = ctx.createGain();
                    osc.type = 'triangle'; osc.frequency.value = f;
                    osc.connect(g); g.connect(ctx.destination);
                    g.gain.setValueAtTime(0, t); g.gain.linearRampToValueAtTime(0.05, t + 3 + (i * 1.5)); g.gain.exponentialRampToValueAtTime(0.001, t + 18);
                    osc.start(t); osc.stop(t + 18);
                });
            }
        }

        const ARTIFACTS_DATA = [

            { id: 4, colorHex: 0x50fa7b, color1: new THREE.Color(0x0a6464), color2: new THREE.Color(0x50fa7b), cssColor: "rgba(80, 250, 123, 1)", shape: "icosahedron", audioFreqs: [440, 587.33, 659.25, 880, 1174.66], shaderMod: "pulse", name: "Pulsating Core", word: "TO", lore: "« The primordial beat of a waking heart. I dream, therefore I fade. »" },
            { id: 5, colorHex: 0xf1fa8c, color1: new THREE.Color(0xb43278), color2: new THREE.Color(0xf1fa8c), cssColor: "rgba(241, 250, 140, 1)", shape: "cylinder", audioFreqs: [440, 554.37, 659.25, 880, 1108.73], shaderMod: "mirror", name: "Dawn Prism", word: "BE", lore: "« Light bends where the dream meets reality. The boundary begins to fracture. »" },

        ];

        let gameState = JSON.parse(localStorage.getItem('glint_save_final')) || { foundNodes: [], onboardingDone: false, apotheosisPlayed: false };
        const urlParams = new URLSearchParams(window.location.search);
        let isSanctuaryView = urlParams.get('view') === 'sanctuary';

        function pickRandomUnfound() {
            let unfound = ARTIFACTS_DATA.filter(a => !gameState.foundNodes.find(n => n.id === a.id));
            return unfound.length ? unfound[Math.floor(Math.random() * unfound.length)] : null;

        let activeProfile = pickRandomUnfound() || ARTIFACTS_DATA[0];

        function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }
        function navigateTo(url) { document.getElementById('transition-veil').style.opacity = '1'; setTimeout(() => window.location.href = url, 1000); }

        // --- 2. 3D UI ENGINE (HOLOGRAM) ---
        let uiScene, uiCamera, uiRenderer, uiMesh;
        const holoVertex = `varying vec3 vNormal; varying vec3 vPos; void main() { vNormal = normalize(normalMatrix * normal); vec4 mv = modelViewMatrix * vec4(position, 1.0); vPos = -mv.xyz; gl_Position = projectionMatrix * mv; }`;
        const holoFragment = `uniform vec3 color1; uniform vec3 color2; varying vec3 vNormal; varying vec3 vPos; void main() { vec3 view = normalize(vPos); float f = pow(1.0 - max(dot(view, vNormal), 0.0), 3.0); vec3 c = mix(vec3(0.05), mix(color1, color2, vNormal.y*0.5+0.5), f*1.5); gl_FragColor = vec4(c + vec3(1.0)*f*0.8, 0.9); }`;

        function getGeometry(shapeName) {
            const s = 1.2;
            switch (shapeName) {
                case 'tetrahedron': return new THREE.TetrahedronGeometry(0.06 * s, 0);
                case 'box': return new THREE.BoxGeometry(0.08 * s, 0.08 * s, 0.08 * s);
                case 'cone': return new THREE.ConeGeometry(0.05 * s, 0.1 * s, 8);
                case 'icosahedron': return new THREE.IcosahedronGeometry(0.06 * s, 0);
                case 'cylinder': return new THREE.CylinderGeometry(0.04 * s, 0.04 * s, 0.1 * s, 8);
                case 'sphere': return new THREE.IcosahedronGeometry(0.05 * s, 2);
                case 'octahedron': default: return new THREE.OctahedronGeometry(0.06 * s, 0);
            }
        }

        function initUI3D() {
            uiRenderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            uiRenderer.setSize(250, 250); uiRenderer.setPixelRatio(window.devicePixelRatio);
            uiScene = new THREE.Scene(); uiCamera = new THREE.PerspectiveCamera(45, 1, 0.01, 10); uiCamera.position.z = 0.35;

            const mat = new THREE.ShaderMaterial({
                uniforms: { color1: { value: new THREE.Color() }, color2: { value: new THREE.Color() } },
                vertexShader: holoVertex, fragmentShader: holoFragment, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
            });
            uiMesh = new THREE.Mesh(getGeometry('octahedron'), mat); uiScene.add(uiMesh);
            uiRenderer.setAnimationLoop(() => { uiMesh.rotation.y += 0.005; uiMesh.rotation.x += 0.003; uiRenderer.render(uiScene, uiCamera); });
        }

        function attachUI3D(containerId, profile) {
            const container = document.getElementById(containerId);
            container.innerHTML = ''; container.appendChild(uiRenderer.domElement);
            uiMesh.geometry.dispose(); uiMesh.geometry = getGeometry(profile.shape);
            uiMesh.material.uniforms.color1.value.copy(profile.color1); uiMesh.material.uniforms.color2.value.copy(profile.color2);
        }

        async function playApotheosisSequence() {
            const overlay = document.getElementById('apotheosis-overlay');
            overlay.style.display = 'flex'; void overlay.offsetWidth; overlay.style.opacity = '1';
            playUISound('apotheosis');
            await sleep(2000);
            const words = ARTIFACTS_DATA.map(d => ({ text: d.word, color: d.cssColor }));
            for (let i = 0; i < words.length; i++) {
                const el = document.createElement('div');

                overlay.appendChild(el); void el.offsetWidth; el.classList.add('show');
                await sleep(1800); el.classList.remove('show'); await sleep(1000); overlay.removeChild(el);
            }
            await sleep(1000); overlay.style.opacity = '0'; await sleep(2000); overlay.style.display = 'none';
        }

        // --- 3. SANCTUARY ENGINE (COVERFLOW & MAP) ---
        let mapInstance = null;

        function buildSanctuary() {
            const listContainer = document.getElementById('sanctuary-list');
            const constelContainer = document.getElementById('constellation');
            const mapContainer = document.getElementById('memory-map');
            listContainer.innerHTML = '';

            if (gameState.foundNodes.length > 0) {
                constelContainer.style.display = 'none'; mapContainer.style.display = 'block';

                setTimeout(() => {
                    if (!mapInstance) {
                        mapInstance = L.map('memory-map', { zoomControl: false, attributionControl: false }).setView([gameState.foundNodes[0].lat, gameState.foundNodes[0].lon], 16);
                        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(mapInstance);
                    }
                    mapInstance.invalidateSize(); // Fix map rendering
                    mapInstance.eachLayer((layer) => { if (!!layer.toGeoJSON) mapInstance.removeLayer(layer); });
                    let latlngs = [];

                    gameState.foundNodes.forEach((node) => {
                        const profile = ARTIFACTS_DATA.find(p => p.id === node.id);
                        latlngs.push([node.lat, node.lon]);
                        const pulsingIcon = L.divIcon({
                            className: 'pulsing-node',
                            html: `<div class="artifact-core" style="background:${profile.cssColor};"></div><div class="artifact-halo" style="background:${profile.cssColor};"></div>`,
                            iconSize: [12, 12]
                        });
                        L.marker([node.lat, node.lon], { icon: pulsingIcon }).addTo(mapInstance);
                    });

                    if (latlngs.length > 1) {
                        L.polyline(latlngs, { color: 'rgba(255, 215, 0, 0.4)', weight: 3, opacity: 0.6, lineJoin: 'round', smoothFactor: 1 }).addTo(mapInstance);
                        mapInstance.fitBounds(L.polyline(latlngs).getBounds(), { padding: [20, 20] });
                    }
                }, 100);
            } else {
                constelContainer.innerHTML = '';
                for (let i = 0; i < 7; i++) {
                    let star = document.createElement('div'); star.className = 'star'; constelContainer.appendChild(star);
                    if (i < 6) { let link = document.createElement('div'); link.className = 'star-link'; constelContainer.appendChild(link); }
                }
            }

            if (gameState.foundNodes.length >= 7) {
                document.getElementById('btn-back-radar').style.display = 'none';
                document.getElementById('btn-reset').style.display = 'block';
                let rev = document.createElement('div'); rev.className = 'final-revelation';
                rev.innerText = "«\u00A0WE HAVE FORGOTTEN HOW TO BE REAL\u00A0»";
                document.getElementById('sanctuary-ui').insertBefore(rev, listContainer);
            }

            ARTIFACTS_DATA.forEach((profile, index) => {
                const isFound = gameState.foundNodes.find(n => n.id === index) !== undefined;
                const slot = document.createElement('div');
                slot.className = `fragment-slot ${isFound ? 'found clickable-slot' : ''}`;

                let blobHtml = '';
                if (isFound) {
                    let blobTop = Math.floor(Math.random() * 60) - 30; let blobLeft = Math.floor(Math.random() * 80) - 20;
                    blobHtml = `<div class="card-blob" style="background: radial-gradient(circle, rgba(${profile.color2.r * 255},${profile.color2.g * 255},${profile.color2.b * 255},0.8) 0%, rgba(${profile.color1.r * 255},${profile.color1.g * 255},${profile.color1.b * 255},0.8) 80%); top: ${blobTop}%; left: ${blobLeft}%;"></div>`;

                    slot.addEventListener('click', () => {
                        if (!slot.classList.contains('active-card')) {
                            slot.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
                            return;
                        }
                        playUISound('click');
                        document.documentElement.style.setProperty('--accent-pure', profile.cssColor);
                        document.getElementById('review-art-name').innerText = profile.name;
                        document.getElementById('review-art-lore').innerHTML = profile.lore;
                        document.getElementById('review-word').innerText = `"${profile.word}"`;
                        document.getElementById('review-word').style.color = profile.cssColor;
                        document.getElementById('review-progress').innerText = `${index + 1} / 7`;
                        let nodeData = gameState.foundNodes.find(n => n.id === index);
                        document.getElementById('review-gps').innerText = `${(nodeData.lat || 0).toFixed(3)}, ${(nodeData.lon || 0).toFixed(3)}`;
                        document.getElementById('review-bg-blob1').style.background = `rgba(${profile.color1.r * 255},${profile.color1.g * 255},${profile.color1.b * 255},0.8)`;
                        document.getElementById('review-bg-blob2').style.background = `rgba(${profile.color2.r * 255},${profile.color2.g * 255},${profile.color2.b * 255},0.8)`;

                        attachUI3D('review-3d-container', profile);
                        document.getElementById('review-ui').style.display = 'flex';
                    });
                }

                let wordColor = isFound ? profile.cssColor : '';
                slot.innerHTML = `
                    ${blobHtml}
                    <div class="slot-content">
                        <div class="slot-title">SHARD ${index + 1}</div>
                        <div class="slot-name" style="${isFound ? 'opacity:1;' : ''}">${isFound ? profile.name : 'Vanished memory'}</div>
                        <div class="slot-word" style="color: ${wordColor}; opacity: ${isFound ? '1' : '0'};">${isFound ? profile.word : ''}</div>
                    </div>
                `;
                listContainer.appendChild(slot);
            });

            // V9 Coverflow Math Logic
            const slots = listContainer.querySelectorAll('.fragment-slot');
            function updateCoverflow() {
                const containerCenter = listContainer.scrollLeft + listContainer.clientWidth / 2;
                slots.forEach((slot) => {
                    const slotCenter = slot.offsetLeft + slot.offsetWidth / 2;
                    const distance = slotCenter - containerCenter;
                    const normalizedDistance = distance / slot.offsetWidth;
                    const absDistance = Math.abs(normalizedDistance);

                    let scale = Math.max(1 - (Math.pow(absDistance, 1.5) * 0.2), 0.7);
                    let overlap = normalizedDistance * -130;
                    let rotateY = Math.max(-60, Math.min(60, normalizedDistance * -35));
                    let rotateX = absDistance * -5;
                    let opacity = Math.max(1 - (absDistance * 0.5), 0.2);
                    let zIndex = Math.floor(100 - absDistance * 50);

                    slot.style.transform = `perspective(1200px) translateX(${overlap}px) scale(${scale}) rotateY(${rotateY}deg) rotateX(${rotateX}deg)`;
                    slot.style.zIndex = zIndex; slot.style.opacity = opacity;

                    if (absDistance < 0.3) {
                        if (!slot.classList.contains('active-card')) {
                            slot.classList.add('active-card');
                            if (navigator.vibrate) navigator.vibrate(2);
                        }
                    } else slot.classList.remove('active-card');
                });
            }
            listContainer.addEventListener('scroll', updateCoverflow);
            setTimeout(updateCoverflow, 100);
        }

        // --- 4. UNIFIED RADAR, GPS & AR ENGINE ---
        // Global variables (Single Source of Truth)
        let userPos = null;
        let targetPos = null;
        const SPAWN_DIST = 15;
        const GLITCH_DIST = 15;
        const EXTRACT_DIST = 5;

        let radarRenderer, shaderMat, videoTex, radarTimeout, dataStreamInterval;
        let xrScene, xrCamera, xrRenderer, xrReticle, xrController, hitSource = null, xrState = 'search';
        let isTargetSpawned = false, hiddenTarget = new THREE.Vector3(), canExtract = false;
        let crystalGroup, crystalMesh; // AR objects

        function calcDist(lat1, lon1, lat2, lon2) {
            const R = 6371e3; const p1 = lat1 * Math.PI / 180; const p2 = lat2 * Math.PI / 180;
            const dp = (lat2 - lat1) * Math.PI / 180; const dl = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dp / 2) * Math.sin(dp / 2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dl / 2) * Math.sin(dl / 2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        function generateTarget(lat, lon, distance) {
            const R = 6371000; const angle = Math.random() * 2 * Math.PI;
            targetPos = {
                lat: lat + ((distance * Math.cos(angle)) / R) * 180 / Math.PI,
                lon: lon + ((distance * Math.sin(angle)) / (R * Math.cos(lat * Math.PI / 180))) * 180 / Math.PI
            };
        }

        function updateRadarUI() {
            if (!targetPos || !userPos) return;

            // Stop UI updates if AR is presenting
            if (xrRenderer && xrRenderer.xr && xrRenderer.xr.isPresenting) {
                document.getElementById('ar-container').style.display = 'none';
                return;
            }

            const dist = calcDist(userPos.lat, userPos.lon, targetPos.lat, targetPos.lon);
            document.getElementById('distance-display').innerText = Math.round(dist) + " m";

            let intensity = dist <= GLITCH_DIST ? 1 - (dist / GLITCH_DIST) : 0;
            if (shaderMat) shaderMat.uniforms.intensity.value = intensity;

            const arBtn = document.getElementById('ARButton');
            if (dist < EXTRACT_DIST) {
                document.getElementById('status-display').innerText = "MEMORY SURFACING...";
                document.getElementById('status-display').style.color = activeProfile.cssColor;
                document.getElementById('ar-container').style.display = 'block';
                document.getElementById('recalc-btn').style.display = 'none';
                document.getElementById('main-panel').style.boxShadow = `0 0 30px ${activeProfile.cssColor.replace('1)', '0.3)')}`;

                if (arBtn && !arBtn.dataset.styled) {
                    arBtn.innerText = "GRASP THE SHARD";
                    arBtn.style.background = activeProfile.cssColor.replace('1)', '0.15)');
                    arBtn.style.border = `1px solid ${activeProfile.cssColor}`;
                    arBtn.style.color = activeProfile.cssColor;
                    arBtn.dataset.styled = "true";
                }
            } else {
                document.getElementById('status-display').innerText = "FOLLOW THE ECHO...";
                document.getElementById('status-display').style.color = "var(--text-body)";
                document.getElementById('ar-container').style.display = 'none';
                document.getElementById('recalc-btn').style.display = 'block';
                document.getElementById('main-panel').style.boxShadow = `0 8px 32px 0 rgba(0, 0, 0, 0.4)`;
            }
        }

        function radarAudioLoop() {
            clearTimeout(radarTimeout);
            if (userPos && targetPos) {
                const dist = calcDist(userPos.lat, userPos.lon, targetPos.lat, targetPos.lon);
                let intensity = dist <= GLITCH_DIST ? 1 - (dist / GLITCH_DIST) : 0;

                if (intensity > 0) {
                    const ctx = getAudioCtx();
                    if (ctx) {
                        const osc = ctx.createOscillator(); const gain = ctx.createGain();
                        osc.type = 'sine'; osc.frequency.value = activeProfile.audioFreqs[Math.floor(Math.random() * activeProfile.audioFreqs.length)];
                        osc.connect(gain); gain.connect(ctx.destination); osc.start();
                        gain.gain.setValueAtTime(0, ctx.currentTime); gain.gain.linearRampToValueAtTime(0.15 * intensity, ctx.currentTime + 0.1); gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.5);
                        osc.stop(ctx.currentTime + 1.5);
                    }
                }
                let delay = intensity > 0 ? 200 + ((1 - intensity) * 1500) : 2000;
                radarTimeout = setTimeout(radarAudioLoop, delay);
            } else {
                radarTimeout = setTimeout(radarAudioLoop, 2000);
            }
        }

        async function initRadarAndGPS() {
            // Setup Camera & Shaders
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                const vid = document.createElement('video'); vid.setAttribute('playsinline', ''); vid.setAttribute('autoplay', ''); vid.setAttribute('muted', '');
                vid.srcObject = stream; vid.play();

                const container = document.getElementById('threejs-radar-container');
                radarRenderer = new THREE.WebGLRenderer(); radarRenderer.setSize(window.innerWidth, window.innerHeight);
                container.appendChild(radarRenderer.domElement);
                videoTex = new THREE.VideoTexture(vid);

                let uvMod = "uv += vec2(sin(uv.y * 15.0 + time * 1.5), cos(uv.x * 15.0 + time * 1.2)) * 0.015 * intensity;";
                if (activeProfile.shaderMod === "pixelate") uvMod = "if(intensity > 0.0) { float pixels = max(10.0, 100.0 - (intensity * 90.0)); uv = mix(uv, floor(uv * pixels) / pixels, smoothstep(0.0, 0.2, intensity)); }";

                let hex = activeProfile.colorHex; let rTint = ((hex >> 16) & 255) / 255; let gTint = ((hex >> 8) & 255) / 255; let bTint = (hex & 255) / 255;

                shaderMat = new THREE.ShaderMaterial({
                    uniforms: { tDiffuse: { value: videoTex }, intensity: { value: 0 }, time: { value: 0 } },
                    vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = vec4(position, 1.0); }`,
                    fragmentShader: `uniform sampler2D tDiffuse; uniform float intensity; uniform float time; varying vec2 vUv;
                        void main() {
                            vec2 uv = vUv; ${uvMod}
                            vec3 c = texture2D(tDiffuse, uv).rgb; float lum = dot(c, vec3(0.299, 0.587, 0.114));
                            vec3 dreamTint = vec3(${rTint}, ${gTint}, ${bTint}); 
                            vec3 finalColor = mix(c, dreamTint * lum * 2.0, intensity * 0.8);
                            gl_FragColor = vec4(finalColor, 1.0);
                        }`
                });
                const rScene = new THREE.Scene(); rScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), shaderMat));
                const rCam = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
                const clock = new THREE.Clock();
                radarRenderer.setAnimationLoop(() => { shaderMat.uniforms.time.value = clock.getElapsedTime(); radarRenderer.render(rScene, rCam); });
            } catch (e) { console.warn("Camera init failed", e); }

            // Setup GPS
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    userPos = { lat: pos.coords.latitude, lon: pos.coords.longitude };
                    generateTarget(userPos.lat, userPos.lon, SPAWN_DIST);
                    updateRadarUI();
                    navigator.geolocation.watchPosition(p => {
                        userPos = { lat: p.coords.latitude, lon: p.coords.longitude };
                        updateRadarUI();
                    }, null, { enableHighAccuracy: true });
                },
                (err) => { console.warn("GPS Error", err); },
                { enableHighAccuracy: true }
            );

            radarAudioLoop();
            initWebXR();
        }

        function initWebXR() {
            xrScene = new THREE.Scene(); xrCamera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);
            xrRenderer = new THREE.WebGLRenderer({ antialias: true, alpha: true }); xrRenderer.setPixelRatio(window.devicePixelRatio); xrRenderer.setSize(window.innerWidth, window.innerHeight); xrRenderer.xr.enabled = true;
            document.body.appendChild(xrRenderer.domElement);

            const arButton = ARButton.createButton(xrRenderer, { requiredFeatures: ['hit-test'], optionalFeatures: ['dom-overlay'], domOverlay: { root: document.body } });
            document.getElementById('ar-container').appendChild(arButton);

            xrRenderer.xr.addEventListener('sessionstart', () => {
                document.getElementById('flash-overlay').style.transition = 'none'; document.getElementById('flash-overlay').style.opacity = '1';
                document.getElementById('ar-container').style.display = 'none'; document.getElementById('radar-ui').style.display = 'none'; document.getElementById('dream-veil').style.display = 'none';
                document.getElementById('xr-ui').style.display = 'block';
                setTimeout(() => { document.getElementById('flash-overlay').style.transition = 'opacity 1.5s ease-in-out'; document.getElementById('flash-overlay').style.opacity = '0'; }, 50);
            });

            xrRenderer.xr.addEventListener('sessionend', () => {
                hitSource = null; document.getElementById('ar-container').style.display = 'block';
                if (xrState !== 'recovered') location.reload();
            });

            crystalGroup = new THREE.Group();
            const coreMat = new THREE.ShaderMaterial({ uniforms: { color1: { value: activeProfile.color1 }, color2: { value: activeProfile.color2 } }, vertexShader: holoVertex, fragmentShader: holoFragment, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false });
            crystalMesh = new THREE.Mesh(getGeometry(activeProfile.shape), coreMat);
            crystalGroup.add(crystalMesh);

            xrController = xrRenderer.xr.getController(0);
            const raycaster = new THREE.Raycaster();

            xrController.addEventListener('select', () => {
                if (xrState === 'search' && xrReticle.visible && canExtract) {
                    crystalGroup.position.setFromMatrixPosition(xrReticle.matrix);
                    xrScene.add(crystalGroup);
                    xrState = 'revealed'; xrReticle.visible = false;
                    document.getElementById('xr-ui').innerText = "Reach out to assimilate the shard.";
                    document.getElementById('glow-left').style.opacity = '0'; document.getElementById('glow-right').style.opacity = '0';
                    if (navigator.vibrate) navigator.vibrate([50, 50, 50]);
                }
                else if (xrState === 'revealed') {
                    const tempMatrix = new THREE.Matrix4().identity().extractRotation(xrController.matrixWorld);
                    raycaster.ray.origin.setFromMatrixPosition(xrController.matrixWorld);
                    raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tempMatrix);

                    if (raycaster.intersectObject(crystalMesh, true).length > 0) {
                        xrState = 'recovered'; document.getElementById('xr-ui').style.display = 'none';
                        playUISound('success');
                        document.getElementById('flash-overlay').style.transition = 'opacity 0.6s ease-out';
                        document.getElementById('flash-overlay').style.opacity = '1';

                        setTimeout(() => {
                            gameState.foundNodes.push({ id: activeProfile.id, lat: userPos.lat, lon: userPos.lon });
                            localStorage.setItem('glint_save_final', JSON.stringify(gameState));

                            document.documentElement.style.setProperty('--accent-pure', activeProfile.cssColor);
                            document.getElementById('ui-art-name').innerText = activeProfile.name;
                            document.getElementById('ui-art-lore').innerHTML = activeProfile.lore;
                            document.getElementById('ui-word').innerText = `"${activeProfile.word}"`;
                            document.getElementById('ui-word').style.color = activeProfile.cssColor;
                            document.getElementById('ui-progress').innerText = `${gameState.foundNodes.length} / 7`;
                            document.getElementById('ui-gps').innerText = `${userPos.lat.toFixed(3)}, ${userPos.lon.toFixed(3)}`;

                            document.getElementById('ui-bg-blob1').style.background = `rgba(${activeProfile.color1.r * 255},${activeProfile.color1.g * 255},${activeProfile.color1.b * 255},0.8)`;
                            document.getElementById('ui-bg-blob2').style.background = `rgba(${activeProfile.color2.r * 255},${activeProfile.color2.g * 255},${activeProfile.color2.b * 255},0.8)`;

                            attachUI3D('ui-3d-container', activeProfile);
                            document.getElementById('artifact-ui').style.display = 'flex';

                            xrRenderer.xr.getSession().end();
                        }, 600);
                    }
                }
            });
            xrScene.add(xrController);

            xrReticle = new THREE.Mesh(new THREE.RingGeometry(0.08, 0.09, 32).rotateX(-Math.PI / 2), new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 }));
            xrReticle.matrixAutoUpdate = false; xrReticle.visible = false; xrScene.add(xrReticle);

            let hitTestSourceRequested = false;
            xrRenderer.setAnimationLoop((timestamp, frame) => {
                if (frame) {
                    const refSpace = xrRenderer.xr.getReferenceSpace(); const session = xrRenderer.xr.getSession();
                    if (!hitTestSourceRequested) {
                        session.requestReferenceSpace('viewer').then((ref) => { session.requestHitTestSource({ space: ref }).then((src) => hitSource = src); });
                        hitTestSourceRequested = true;
                    }
                    if (hitSource && xrState === 'search') {
                        const results = frame.getHitTestResults(hitSource);
                        if (results.length > 0) {
                            xrReticle.visible = true; xrReticle.matrix.fromArray(results[0].getPose(refSpace).transform.matrix);
                            if (!isTargetSpawned) {
                                let pos = new THREE.Vector3().setFromMatrixPosition(xrReticle.matrix);
                                hiddenTarget.set(pos.x + (Math.random() > 0.5 ? 1 : -1) * (0.5 + Math.random()), pos.y, pos.z + (Math.random() > 0.5 ? 1 : -1) * (0.5 + Math.random()));
                                isTargetSpawned = true;
                            }
                            if (isTargetSpawned) {
                                let curr = new THREE.Vector3().setFromMatrixPosition(xrReticle.matrix);
                                let dist = Math.sqrt(Math.pow(curr.x - hiddenTarget.x, 2) + Math.pow(curr.z - hiddenTarget.z, 2));

                                let projVec = hiddenTarget.clone().project(xrCamera);
                                let isBehind = projVec.z > 1;
                                let glowColor = activeProfile.cssColor.replace('1)', '0.4)');

                                if (projVec.x < -0.8 || (isBehind && projVec.x > 0)) {
                                    document.getElementById('glow-left').style.opacity = '1'; document.getElementById('glow-right').style.opacity = '0';
                                    document.getElementById('glow-left').style.background = `linear-gradient(to right, ${glowColor}, transparent)`;
                                } else if (projVec.x > 0.8 || (isBehind && projVec.x < 0)) {
                                    document.getElementById('glow-left').style.opacity = '0'; document.getElementById('glow-right').style.opacity = '1';
                                    document.getElementById('glow-right').style.background = `linear-gradient(to left, ${glowColor}, transparent)`;
                                } else {
                                    document.getElementById('glow-left').style.opacity = '0'; document.getElementById('glow-right').style.opacity = '0';
                                }

                                if (dist < 0.4) {
                                    let fastPulse = 1.0 + Math.sin(timestamp * 0.01) * 0.3;
                                    xrReticle.material.color.setHex(activeProfile.colorHex); xrReticle.material.opacity = 0.9; xrReticle.scale.set(fastPulse * 1.5, fastPulse * 1.5, 1);
                                    document.getElementById('xr-ui').innerText = "The source is pure. Touch it."; document.getElementById('xr-ui').style.color = activeProfile.cssColor; canExtract = true;
                                } else if (dist < 1.2) {
                                    let midPulse = 1.0 + Math.sin(timestamp * 0.006) * 0.15;
                                    xrReticle.material.color.setHex(0xb19cd9); xrReticle.material.opacity = 0.7; xrReticle.scale.set(midPulse * 1.2, midPulse * 1.2, 1);
                                    document.getElementById('xr-ui').innerText = "The resonance is fading..."; document.getElementById('xr-ui').style.color = "#b19cd9"; canExtract = false;
                                } else {
                                    let slowPulse = 1.0 + Math.sin(timestamp * 0.003) * 0.05;
                                    xrReticle.material.color.setHex(0xff6b6b); xrReticle.material.opacity = 0.4; xrReticle.scale.set(slowPulse, slowPulse, 1);
                                    document.getElementById('xr-ui').innerText = "The echo is distorted..."; document.getElementById('xr-ui').style.color = "#ff6b6b"; canExtract = false;
                                }
                            }
                        } else {
                            xrReticle.visible = false; document.getElementById('xr-ui').innerText = "Seek the resonance around you..."; document.getElementById('xr-ui').style.color = "var(--text-title)";
                            document.getElementById('glow-left').style.opacity = '0'; document.getElementById('glow-right').style.opacity = '0';
                        }
                    }
                }
                if (xrState === 'revealed') {
                    crystalGroup.position.y += Math.sin(timestamp * 0.002) * 0.0005;
                    crystalMesh.rotation.y += 0.01; crystalMesh.rotation.x += 0.005;
                }
                xrRenderer.render(xrScene, xrCamera);
            });
        }

        // --- 5. INITIALIZATION & ROUTING ---
        document.getElementById('btn-close-review').addEventListener('click', () => { playUISound('transition'); document.getElementById('review-ui').style.display = 'none'; });
        document.getElementById('btn-back-radar').addEventListener('click', () => { playUISound('transition'); navigateTo(window.location.pathname); });
        document.getElementById('btn-reset').addEventListener('click', () => { playUISound('action'); localStorage.removeItem('glint_save_final'); navigateTo(window.location.pathname); });
        document.getElementById('btn-continue').addEventListener('click', () => { playUISound('transition'); navigateTo(window.location.pathname); });
        document.getElementById('btn-inventory').addEventListener('click', () => { playUISound('transition'); navigateTo(window.location.pathname + '?view=sanctuary'); });
        document.getElementById('recalc-btn').addEventListener('click', () => { playUISound('click'); if (userPos) { generateTarget(userPos.lat, userPos.lon, SPAWN_DIST); document.getElementById('status-display').innerText = "Map is reconfiguring..."; } });

        async function runOnboarding() {
            const obUI = document.getElementById('onboarding-ui'); const obText = document.getElementById('ob-text'); const obBtn = document.getElementById('ob-btn');
            obUI.style.display = 'flex';

            // Set dynamic colors
            document.documentElement.style.setProperty('--accent-pure', activeProfile.cssColor);
            document.getElementById('glow-left').style.background = `linear-gradient(to right, ${activeProfile.cssColor.replace('1)', '0.4)')}, transparent)`;
            document.getElementById('glow-right').style.background = `linear-gradient(to left, ${activeProfile.cssColor.replace('1)', '0.4)')}, transparent)`;
            document.getElementById('panel-blob1').style.background = `rgba(${activeProfile.color1.r * 255},${activeProfile.color1.g * 255},${activeProfile.color1.b * 255},0.8)`;
            document.getElementById('panel-blob2').style.background = `rgba(${activeProfile.color2.r * 255},${activeProfile.color2.g * 255},${activeProfile.color2.b * 255},0.8)`;

            if (gameState.onboardingDone) {
                obText.innerText = "The wandering is not over."; obText.style.opacity = '1';
                obBtn.innerText = "RESUME WANDERING"; obBtn.style.display = 'flex'; setTimeout(() => obBtn.style.opacity = '1', 100);

                obBtn.onclick = () => {
                    playUISound('action'); audioCtx = getAudioCtx(); obText.style.opacity = '0'; obBtn.style.opacity = '0';
                    setTimeout(() => {
                        obUI.style.display = 'none'; document.getElementById('radar-ui').style.opacity = '1';
                        document.getElementById('recalc-btn').style.display = 'block'; document.getElementById('main-title').innerText = "Slumber"; document.getElementById('status-display').innerText = "Synchronizing resonance...";
                        dataStreamInterval = setInterval(() => { let s = ""; const chars = "01010011..."; for (let i = 0; i < 8; i++) s += chars.charAt(Math.floor(Math.random() * chars.length)); document.getElementById('data-stream').innerText = `Wave: ~${s}`; }, 150);
                    }, 1000);
                    initRadarAndGPS(); // UNIFIED CALL
                };
            } else {
                await sleep(1000); obText.innerText = "Listen. The world has grown silent."; obText.style.opacity = '1'; await sleep(3500); obText.style.opacity = '0'; await sleep(1500);
                obText.innerText = "A collective illusion.\nThe Great Slumber."; obText.style.opacity = '1'; await sleep(3500); obText.style.opacity = '0'; await sleep(1500);
                obText.innerText = "You are wandering through a crumbling dream.\nTo guide you, I must anchor your presence to what remains of the waking world."; obText.style.opacity = '1';
                obBtn.innerText = "DROP THE ANCHOR"; obBtn.style.display = 'flex'; setTimeout(() => obBtn.style.opacity = '1', 100);

                await new Promise(resolve => {
                    obBtn.onclick = () => {
                        playUISound('click'); audioCtx = getAudioCtx(); obText.innerText = "Seeking anchor point..."; obBtn.style.opacity = '0';
                        navigator.geolocation.getCurrentPosition((pos) => { resolve(); }, (err) => { console.warn("GPS Init skipped/error", err); resolve(); }, { enableHighAccuracy: true });
                    };
                });

                obText.style.opacity = '0'; obBtn.style.display = 'none'; await sleep(1500);
                obText.innerText = "The memories of the true world have crystallized.\nMake this screen your Lens."; obText.style.opacity = '1';
                obBtn.innerText = "OPEN THE LENS"; obBtn.style.display = 'flex'; setTimeout(() => obBtn.style.opacity = '1', 100);

                await new Promise(resolve => {
                    obBtn.onclick = async () => {
                        playUISound('action'); obText.style.opacity = '0'; obBtn.style.opacity = '0';
                        gameState.onboardingDone = true; localStorage.setItem('glint_save_final', JSON.stringify(gameState));
                        resolve();
                    };
                });

                await sleep(1000); obUI.style.opacity = '0'; await sleep(2000); obUI.style.display = 'none';
                document.getElementById('radar-ui').style.opacity = '1'; document.getElementById('recalc-btn').style.display = 'block'; document.getElementById('main-title').innerText = "Slumber";
                dataStreamInterval = setInterval(() => { let s = ""; const chars = "01010011..."; for (let i = 0; i < 8; i++) s += chars.charAt(Math.floor(Math.random() * chars.length)); document.getElementById('data-stream').innerText = `Wave: ~${s}`; }, 150);

                initRadarAndGPS(); // UNIFIED CALL
            }
        }

        window.onload = () => {
            document.getElementById('transition-veil').style.opacity = '0';
            initUI3D();

            if (isSanctuaryView) {
                if (gameState.foundNodes.length >= 7 && !gameState.apotheosisPlayed) {
                    playApotheosisSequence().then(() => {
                        gameState.apotheosisPlayed = true; localStorage.setItem('glint_save_final', JSON.stringify(gameState));
                        buildSanctuary(); document.getElementById('sanctuary-ui').style.display = 'flex';
                    });
                } else {
                    buildSanctuary(); document.getElementById('sanctuary-ui').style.display = 'flex';
                }
            } else if (gameState.foundNodes.length < 7) {
                runOnboarding();
            } else {
                navigateTo(window.location.pathname + '?view=sanctuary');
            }
        };
    </script>
