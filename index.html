<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GLINT - Érrance Onirique</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Palette Crépuscule / Rêve */
            --bg-night: #0b0f19;
            --glass-bg: rgba(20, 25, 40, 0.45);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-title: #f0e6d2; 
            --text-body: #a8b2c1;
            /* La couleur de la pureté (Cyan Glace) pour les éléments trouvés */
            --accent-pure: #8be9fd; 
        }

        body { 
            margin: 0; padding: 0; 
            background-color: var(--bg-night); 
            color: var(--text-body); 
            font-family: 'Montserrat', sans-serif;
            overflow: hidden; height: 100vh; width: 100vw;
        }

        h1, h2, h3, .serif { font-family: 'Playfair Display', serif; color: var(--text-title); font-weight: normal; }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
        }

        #threejs-radar-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        #dream-veil {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at center, transparent 0%, rgba(11, 15, 25, 0.6) 100%);
            pointer-events: none; z-index: 2;
        }

        #radar-ui {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            display: flex; flex-direction: column; align-items: center; 
            justify-content: flex-end; padding-bottom: 80px; box-sizing: border-box;
            z-index: 10; pointer-events: none; 
        }
        
        .info-box { padding: 30px; text-align: center; width: 85%; max-width: 350px; pointer-events: auto; }
        .main-title { font-size: 1.5rem; letter-spacing: 2px; margin-bottom: 5px; }
        .data-stream { font-size: 0.65rem; color: var(--text-body); margin-top: 10px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.6; }
        #distance-display { font-size: 2rem; font-weight: 200; margin: 15px 0; color: var(--text-title); }

        button {
            margin-top: 15px; padding: 15px 24px; width: 100%;
            background: rgba(255,255,255,0.05); color: var(--text-title); 
            font-family: 'Montserrat', sans-serif; font-weight: 400; font-size: 0.8rem; letter-spacing: 3px; text-transform: uppercase;
            border: 1px solid var(--glass-border); border-radius: 50px; cursor: pointer;
            backdrop-filter: blur(5px); transition: all 0.4s ease;
        }
        button:active { background: rgba(255,255,255,0.15); transform: scale(0.98); }
        
        #recalc-btn { display: none; font-size: 0.65rem; border: none; opacity: 0.5; margin-top: 20px; }

        #ARButton {
            background: rgba(139, 233, 253, 0.15) !important; border: 1px solid var(--accent-pure) !important; color: var(--accent-pure) !important;
            font-family: 'Montserrat', sans-serif !important; font-weight: 600 !important; letter-spacing: 2px !important;
            position: absolute !important; bottom: 30px !important; left: 50% !important; transform: translateX(-50%) !important;
            width: 85% !important; max-width: 350px !important; z-index: 999 !important; border-radius: 50px !important;
        }

        #xr-ui {
            position: absolute; top: 50px; left: 50%; transform: translateX(-50%);
            width: fit-content; z-index: 100; pointer-events: none; text-align: center; display: none;
            padding: 12px 25px; border-radius: 50px; font-size: 0.8rem; letter-spacing: 2px; font-weight: 600;
            transition: all 0.4s ease;
        }

        #artifact-ui {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(11, 15, 25, 0.7); z-index: 3000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            box-sizing: border-box; backdrop-filter: blur(15px);
        }
        .artifact-card { padding: 40px 30px; width: 85%; max-width: 360px; text-align: center; }
        .artifact-card h2 { margin-top: 0; letter-spacing: 2px; font-size: 1.6rem; text-shadow: 0 0 15px rgba(139, 233, 253, 0.3); }
        .artifact-lore { font-size: 1rem; color: var(--text-body); margin-bottom: 35px; line-height: 1.7; }
        
        .artifact-stats { text-align: left; font-size: 0.75rem; border-top: 1px solid var(--glass-border); padding-top: 20px; font-weight: 200; letter-spacing: 1px; }
        .artifact-stats p { margin: 12px 0; display: flex; justify-content: space-between; align-items: center; }
        .artifact-stats span { color: var(--text-title); font-weight: 400; text-align: right; }
        .mystery-word { color: var(--accent-pure) !important; font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.5rem !important; text-transform: lowercase !important; }
        
        .btn-group { display: flex; flex-direction: column; gap: 15px; margin-top: 35px; }
        #btn-inventory { background: rgba(139, 233, 253, 0.1); color: var(--accent-pure); border-color: var(--accent-pure); }
        
        #sanctuary-ui {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; 
            background: radial-gradient(circle at top, #1a2035 0%, #0b0f19 100%);
            z-index: 5000; display: none; flex-direction: column; 
            padding: 50px 20px 20px 20px; box-sizing: border-box; overflow: hidden; 
        }
        .sanctuary-header { text-align: center; margin-bottom: 30px; flex-shrink: 0; }
        .sanctuary-header h2 { margin: 0; letter-spacing: 6px; font-size: 1.8rem; }
        .sanctuary-header p { font-family: 'Montserrat', sans-serif; font-size: 0.75rem; font-weight: 200; letter-spacing: 2px; opacity: 0.6; margin-top: 10px; text-transform: uppercase; }
        
        .sanctuary-list { flex: 1 1 auto; min-height: 0; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; padding-bottom: 20px; scrollbar-width: none; }
        .fragment-slot { padding: 20px; display: flex; flex-direction: column; gap: 10px; flex-shrink: 0; border: 1px dashed rgba(255,255,255,0.05); background: transparent; border-radius: 15px; }
        .fragment-slot.found { border: 1px solid rgba(139, 233, 253, 0.4); background: linear-gradient(135deg, rgba(139, 233, 253, 0.05) 0%, rgba(255,255,255,0) 100%); }
        .fragment-slot .slot-title { font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; opacity: 0.4; }
        .fragment-slot .slot-name { font-family: 'Playfair Display', serif; font-size: 1.2rem; opacity: 0.3; }
        .fragment-slot.found .slot-name { opacity: 1; color: var(--text-title); }
        .fragment-slot .slot-word { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.4rem; text-align: right; opacity: 0; }
        .fragment-slot.found .slot-word { opacity: 1; color: var(--accent-pure); }
        
        .sanctuary-footer { flex-shrink: 0; margin-top: 10px; padding-bottom: env(safe-area-inset-bottom, 10px); }
        #btn-back-radar { border-color: transparent; }

        #flash-overlay { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #fff; z-index: 8000; opacity: 0; pointer-events: none; transition: opacity 0.6s ease-out; }
    </style>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
</head>
<body>

    <div id="flash-overlay"></div>
    <div id="ar-container" style="display: none;"></div>
    <div id="threejs-radar-container"></div>
    <div id="dream-veil"></div>

    <div id="radar-ui">
        <div class="info-box glass-panel">
            <h1 class="main-title serif" id="main-title">Sommeil</h1>
            <p id="distance-display">---</p>
            <p id="status-display" style="font-weight:200; font-size:0.8rem;">En attente d'éveil.</p>
            <div class="data-stream" id="data-stream">_</div>
            <button id="start-btn">Ouvrir l'œil</button>
            <button id="recalc-btn">Se recentrer</button>
        </div>
    </div>

    <div id="xr-ui" class="glass-panel">CHERCHEZ LA LUEUR...</div>

    <div id="artifact-ui">
        <div class="artifact-card glass-panel">
            <h2 id="ui-art-name">ÉCLAT MNÉMONIQUE</h2>
            <p id="ui-art-lore" class="artifact-lore serif"></p>
            
            <div class="artifact-stats">
                <p>MÉMOIRE <span id="ui-progress">1 / 7</span></p>
                <p>POINT D'ANCRAGE <span id="ui-gps">0.000, 0.000</span></p>
                <p>RÉSONANCE <span id="ui-word" class="mystery-word">"---"</span></p>
            </div>

            <div class="btn-group">
                <button id="btn-inventory">Ouvrir le Carnet</button>
                <button id="btn-continue">Poursuivre l'Errance</button>
            </div>
        </div>
    </div>

    <div id="sanctuary-ui">
        <div class="sanctuary-header">
            <h2 class="serif">LE CARNET</h2>
            <p>Pensées reconstituées</p>
        </div>
        <div class="sanctuary-list" id="sanctuary-list"></div>
        <div class="sanctuary-footer">
            <button id="btn-back-radar">Fermer les yeux (Retour)</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/addons/webxr/ARButton.js';

        // --- DATA POÉTIQUE ---
        const ARTIFACTS_DATA = [
            { name: "La Première Goutte", word: "NOUS", lore: "« Une résonance cristallisée d'un futur oublié. Les données palpitent encore d'une chaleur fantôme. »" },
            { name: "Souvenir Liquide", word: "AVONS", lore: "« Une larme digitale figée dans le flux. Elle contient l'écho d'un rire sans visage. »" },
            { name: "Le Poids de l'Absence", word: "OUBLIÉ", lore: "« Le silence entre deux paquets de données. Une absence qui pèse lourdement sur la réalité. »" },
            { name: "Vecteur Cendré", word: "COMMENT", lore: "« Une direction sans but, gravée dans l'obsidienne. Elle pointe inlassablement vers le vide. »" },
            { name: "Noyau Palpitant", word: "ÊTRE", lore: "« La pulsation primordiale du code source. Je calcule, donc je fuis. »" },
            { name: "Prisme de l'Aube", word: "RÉELS", lore: "« La lumière se courbe là où la donnée devient chair. La frontière commence à s'effacer. »" },
            { name: "L'Acceptation", word: "...", lore: "« Le point final de la fuite. Le moment où la simulation s'abandonne enfin. »" }
        ];

        const urlParams = new URLSearchParams(window.location.search);
        let foundCount = parseInt(urlParams.get('fragment')) || 0;
        let isSanctuaryView = urlParams.get('view') === 'sanctuary';

        function buildSanctuaryList() {
            const listContainer = document.getElementById('sanctuary-list');
            listContainer.innerHTML = ''; 
            ARTIFACTS_DATA.forEach((data, index) => {
                const isFound = index < foundCount;
                const slot = document.createElement('div');
                slot.className = `fragment-slot ${isFound ? 'found' : ''}`;
                
                const titleBlock = document.createElement('div');
                titleBlock.className = 'slot-title';
                titleBlock.innerText = `RÉFLEXION ${index + 1}`;

                const nameBlock = document.createElement('div');
                nameBlock.className = 'slot-name';
                nameBlock.innerText = isFound ? data.name : 'Pensée évanouie';
                
                const wordBlock = document.createElement('div');
                wordBlock.className = 'slot-word';
                wordBlock.innerText = isFound ? data.word : '';
                
                slot.appendChild(titleBlock); slot.appendChild(nameBlock); slot.appendChild(wordBlock);
                listContainer.appendChild(slot);
            });
        }

        if (isSanctuaryView) {
            document.getElementById('radar-ui').style.display = 'none';
            document.getElementById('threejs-radar-container').style.display = 'none';
            document.getElementById('dream-veil').style.display = 'none';
            buildSanctuaryList();
            document.getElementById('sanctuary-ui').style.display = 'flex';
        }

        document.getElementById('btn-back-radar').addEventListener('click', () => {
            window.location.href = window.location.pathname + '?fragment=' + foundCount;
        });

        if (!isSanctuaryView) {
            let targetLat = null, targetLon = null, startLat = null, startLon = null;
            const spawnDistance = 2; const glitchStartDistance = 10; const extractionDistance = 5; 
            let currentDistance = 999;
            let radarTimeout, audioCtx, cameraStream = null, dataStreamInterval;

            const startBtn = document.getElementById('start-btn');
            const recalcBtn = document.getElementById('recalc-btn');
            const distanceDisplay = document.getElementById('distance-display');
            const statusDisplay = document.getElementById('status-display');
            const radarUI = document.getElementById('radar-ui');
            const xrUI = document.getElementById('xr-ui');
            const arContainer = document.getElementById('ar-container');
            const mainTitle = document.getElementById('main-title');
            const dataStream = document.getElementById('data-stream');
            const flashOverlay = document.getElementById('flash-overlay');

            function generateTarget(lat, lon, distance) {
                const R = 6371000; const angle = Math.random() * 2 * Math.PI;
                targetLat = lat + ((distance * Math.cos(angle)) / R) * 180 / Math.PI;
                targetLon = lon + ((distance * Math.sin(angle)) / (R * Math.cos(lat * Math.PI / 180))) * 180 / Math.PI;
            }
            function updateDataStream() {
                let stream = ""; const chars = "01010011...";
                for(let i=0; i<8; i++) stream += chars.charAt(Math.floor(Math.random() * chars.length));
                dataStream.innerText = `Onde : ~${stream}`;
            }

            let radarRenderer, radarScene, radarCamera, videoTexture, shaderMaterial, videoElement;
            let isFlashTriggered = false;

            startBtn.addEventListener('click', async () => {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)(); audioCtx.resume();
                startBtn.style.display = 'none'; recalcBtn.style.display = 'inline-block'; 
                mainTitle.innerText = "Écoute";
                dataStreamInterval = setInterval(updateDataStream, 150);

                if ("geolocation" in navigator) {
                    navigator.geolocation.getCurrentPosition((pos) => {
                        startLat = pos.coords.latitude; startLon = pos.coords.longitude;
                        generateTarget(startLat, startLon, spawnDistance);
                        navigator.geolocation.watchPosition(updatePosition, (err) => console.log(err), { enableHighAccuracy: true });
                        radarLoop(); 
                    });
                }
                try { cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }); initRadarShader(cameraStream); } catch (err) { console.error(err); }
            });

            recalcBtn.addEventListener('click', () => { if (startLat && startLon) { generateTarget(startLat, startLon, spawnDistance); statusDisplay.innerText = "L'esprit divague..."; } });

            function updatePosition(pos) {
                startLat = pos.coords.latitude; startLon = pos.coords.longitude;
                currentDistance = calculateDistance(pos.coords.latitude, pos.coords.longitude, targetLat, targetLon);
                
                if (renderer && renderer.xr && renderer.xr.isPresenting) {
                    arContainer.style.display = 'none'; return;
                }

                distanceDisplay.innerText = `${Math.round(currentDistance)} m`;
                
                let intensity = 0; if (currentDistance <= glitchStartDistance) { intensity = 1 - (currentDistance / glitchStartDistance); }
                if(shaderMaterial) shaderMaterial.uniforms.intensity.value = intensity;

                const arBtn = document.getElementById('ARButton');
                if (currentDistance < extractionDistance) {
                    statusDisplay.innerText = "La mémoire affleure..."; statusDisplay.style.color = "var(--accent-pure)";
                    arContainer.style.display = 'block'; recalcBtn.style.display = 'none'; 
                    if (arBtn) {
                        arBtn.innerText = "Saisir le rêve";
                        if (!isFlashTriggered) {
                            arBtn.addEventListener('click', () => { flashOverlay.style.opacity = '1'; if (navigator.vibrate) navigator.vibrate([100, 50, 100]); }, { once: true });
                            isFlashTriggered = true;
                        }
                    }
                } else {
                    statusDisplay.innerText = "Suivez le fil..."; statusDisplay.style.color = "var(--text-body)";
                    arContainer.style.display = 'none'; recalcBtn.style.display = 'inline-block';
                }
            }

            function initRadarShader(stream) {
                const container = document.getElementById('threejs-radar-container');
                videoElement = document.createElement('video'); videoElement.srcObject = stream; videoElement.play();
                radarScene = new THREE.Scene(); radarCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
                radarRenderer = new THREE.WebGLRenderer(); radarRenderer.setSize(window.innerWidth, window.innerHeight); container.appendChild(radarRenderer.domElement);
                videoTexture = new THREE.VideoTexture(videoElement);
                
                shaderMaterial = new THREE.ShaderMaterial({
                    uniforms: { tDiffuse: { value: videoTexture }, intensity: { value: 0 }, time: { value: 0 } },
                    vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = vec4(position, 1.0); }`,
                    fragmentShader: `
                        uniform sampler2D tDiffuse; uniform float intensity; uniform float time; varying vec2 vUv;
                        void main() {
                            vec2 uv = vUv;
                            float wave1 = sin(uv.y * 15.0 + time * 1.5);
                            float wave2 = cos(uv.x * 15.0 + time * 1.2);
                            uv += vec2(wave1, wave2) * 0.015 * intensity;

                            float r = texture2D(tDiffuse, uv + vec2(0.01 * intensity, 0.0)).r;
                            float g = texture2D(tDiffuse, uv).g;
                            float b = texture2D(tDiffuse, uv - vec2(0.01 * intensity, 0.0)).b;
                            vec3 color = vec3(r, g, b);

                            float lum = dot(color, vec3(0.299, 0.587, 0.114));
                            vec3 dreamTint = vec3(0.8, 0.6, 0.9); 
                            vec3 finalColor = mix(color, dreamTint * lum * 1.8, intensity * 0.7);

                            float dist = distance(vUv, vec2(0.5));
                            finalColor += dreamTint * smoothstep(0.4, 0.0, dist) * intensity * 0.4;

                            gl_FragColor = vec4(finalColor, 1.0);
                        }
                    `
                });
                const quad = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), shaderMaterial); radarScene.add(quad); renderRadar();
            }
            
            let clock = new THREE.Clock();
            function renderRadar() { if (radarRenderer && shaderMaterial) { requestAnimationFrame(renderRadar); shaderMaterial.uniforms.time.value = clock.getElapsedTime(); radarRenderer.render(radarScene, radarCamera); } }

            // --- MOTEUR WEBXR ---
            let scene, camera, renderer, controller, reticle, hitTestSource = null, hitTestSourceRequested = false;
            let hiddenTarget = new THREE.Vector3(); let isTargetSpawned = false; let canExtract = false; 
            let xrState = 'search'; let spawnedArtifactMesh = null;
            const raycaster = new THREE.Raycaster();

            function initXR() {
                scene = new THREE.Scene(); camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20); 
                const light = new THREE.HemisphereLight(0xffffff, 0x444466, 2); scene.add(light);
                
                renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true }); renderer.setPixelRatio(window.devicePixelRatio); renderer.setSize(window.innerWidth, window.innerHeight); renderer.xr.enabled = true;
                document.body.appendChild(renderer.domElement);

                const arButton = ARButton.createButton(renderer, { requiredFeatures: ['hit-test'], optionalFeatures: ['dom-overlay'], domOverlay: { root: document.body } });
                arContainer.appendChild(arButton);

                renderer.xr.addEventListener('sessionstart', () => {
                    flashOverlay.style.transition = 'none'; flashOverlay.style.opacity = '1';
                    
                    arContainer.style.display = 'none'; 
                    radarUI.style.display = 'none'; 
                    document.getElementById('dream-veil').style.display = 'none'; 
                    
                    if (cameraStream) cameraStream.getTracks().forEach(track => track.stop()); if(videoElement) videoElement.pause();
                    clearTimeout(radarTimeout); clearInterval(dataStreamInterval); 
                    if(radarRenderer) { radarRenderer.dispose(); radarRenderer = null; document.getElementById('threejs-radar-container').innerHTML = ''; }
                    
                    xrUI.style.display = 'block'; 
                    xrUI.innerText = "L'écho est confus..."; 
                    
                    setTimeout(() => { flashOverlay.style.transition = 'opacity 1.5s ease-in-out'; flashOverlay.style.opacity = '0'; }, 50); 
                });

                // --- L'ARTEFACT CRISTALLIN ---
                const artifactGroup = new THREE.Group(); artifactGroup.name = 'artifact'; 
                const coreGeo = new THREE.OctahedronGeometry(0.06, 0); 
                // Changement de la couleur du cristal pour correspondre à la "Pureté Cyan Glace"
                const coreMat = new THREE.MeshPhysicalMaterial({ 
                    color: 0xe0ffff, metalness: 0.1, roughness: 0.1, 
                    transmission: 0.9, ior: 1.5, emissive: 0x00d2ff, emissiveIntensity: 0.4, transparent: true
                }); 
                const coreMesh = new THREE.Mesh(coreGeo, coreMat);
                
                const wireGeo = new THREE.OctahedronGeometry(0.08, 0); 
                const wireMat = new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true, transparent: true, opacity: 0.4 }); 
                const wireMesh = new THREE.Mesh(wireGeo, wireMat);
                
                artifactGroup.add(coreMesh); artifactGroup.add(wireMesh);

                controller = renderer.xr.getController(0);
                controller.addEventListener('select', () => {
                    if (xrState === 'search' && reticle.visible && canExtract) {
                        spawnedArtifactMesh = artifactGroup.clone();
                        reticle.matrix.decompose(spawnedArtifactMesh.position, spawnedArtifactMesh.quaternion, spawnedArtifactMesh.scale);
                        scene.add(spawnedArtifactMesh);
                        
                        xrState = 'revealed';
                        reticle.visible = false; 
                        xrUI.innerText = "Tendez la main pour l'assimiler"; 
                        
                        if (navigator.vibrate) navigator.vibrate([50, 50, 50]); 
                    } 
                    else if (xrState === 'revealed') {
                        const tempMatrix = new THREE.Matrix4();
                        tempMatrix.identity().extractRotation(controller.matrixWorld);
                        raycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
                        raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tempMatrix);

                        if (raycaster.intersectObject(spawnedArtifactMesh, true).length > 0) {
                            xrState = 'recovered';
                            xrUI.style.display = 'none'; 
                            
                            const safeIndex = foundCount % 7; 
                            const currentData = ARTIFACTS_DATA[safeIndex];
                            
                            document.getElementById('ui-art-name').innerText = currentData.name;
                            document.getElementById('ui-art-lore').innerText = currentData.lore;
                            document.getElementById('ui-word').innerText = `"${currentData.word}"`;
                            document.getElementById('ui-progress').innerText = `${safeIndex + 1} / 7`;
                            document.getElementById('ui-gps').innerText = `${startLat.toFixed(4)}, ${startLon.toFixed(4)}`;
                            
                            document.getElementById('artifact-ui').style.display = 'flex';
                            if (navigator.vibrate) navigator.vibrate([50, 100, 200]); 
                        }
                    }
                });
                scene.add(controller);
                
                reticle = new THREE.Mesh(new THREE.RingGeometry(0.08, 0.09, 32).rotateX(-Math.PI/2), new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 })); 
                reticle.matrixAutoUpdate = false; reticle.visible = false; scene.add(reticle);
                renderer.setAnimationLoop(renderXR);
            }

            function renderXR(timestamp, frame) {
                if (frame) {
                    const refSpace = renderer.xr.getReferenceSpace(); const session = renderer.xr.getSession();
                    if (!hitTestSourceRequested) {
                        session.requestReferenceSpace('viewer').then((ref) => { session.requestHitTestSource({ space: ref }).then((src) => hitTestSource = src); });
                        session.addEventListener('end', () => { hitTestSourceRequested = false; hitTestSource = null; location.reload(); });
                        hitTestSourceRequested = true;
                    }
                    if (hitTestSource && xrState === 'search') {
                        const results = frame.getHitTestResults(hitTestSource);
                        if (results.length > 0) {
                            reticle.visible = true; reticle.matrix.fromArray(results[0].getPose(refSpace).transform.matrix);
                            if (!isTargetSpawned) {
                                let pos = new THREE.Vector3(); pos.setFromMatrixPosition(reticle.matrix);
                                hiddenTarget.x = pos.x + (Math.random() > 0.5 ? 1 : -1) * (0.5 + Math.random()); hiddenTarget.y = pos.y; hiddenTarget.z = pos.z + (Math.random() > 0.5 ? 1 : -1) * (0.5 + Math.random());
                                isTargetSpawned = true;
                            }
                            if (isTargetSpawned) {
                                let curr = new THREE.Vector3(); curr.setFromMatrixPosition(reticle.matrix);
                                let dist = Math.sqrt(Math.pow(curr.x - hiddenTarget.x, 2) + Math.pow(curr.z - hiddenTarget.z, 2));
                                
                                // --- CHAUD/FROID INVERSÉ ET DISTINCT ---
                                if (dist < 0.4) { 
                                    // PURETÉ (Proche) : Cyan / Bleu Glace
                                    let fastPulse = 1.0 + Math.sin(timestamp * 0.01) * 0.3; 
                                    reticle.material.color.setHex(0x8be9fd); 
                                    reticle.material.opacity = 0.9;
                                    reticle.scale.set(fastPulse * 1.5, fastPulse * 1.5, 1); 
                                    
                                    xrUI.innerText = "La source est pure. Touchez."; 
                                    xrUI.style.color = "#8be9fd"; 
                                    xrUI.style.borderColor = "rgba(139, 233, 253, 0.6)";
                                    xrUI.style.boxShadow = "0 0 20px rgba(139, 233, 253, 0.4)";
                                    canExtract = true; 
                                } 
                                else if (dist < 1.2) { 
                                    // TRANSITION (Moyen) : Violet Améthyste
                                    let midPulse = 1.0 + Math.sin(timestamp * 0.006) * 0.15; 
                                    reticle.material.color.setHex(0xb19cd9); 
                                    reticle.material.opacity = 0.7;
                                    reticle.scale.set(midPulse * 1.2, midPulse * 1.2, 1); 
                                    
                                    xrUI.innerText = "La résonance s'apaise..."; 
                                    xrUI.style.color = "#b19cd9"; 
                                    xrUI.style.borderColor = "rgba(177, 156, 217, 0.4)";
                                    xrUI.style.boxShadow = "0 0 15px rgba(177, 156, 217, 0.2)";
                                    canExtract = false; 
                                } 
                                else { 
                                    // FIÈVRE / BRUIT (Loin) : Rouge Corail
                                    let slowPulse = 1.0 + Math.sin(timestamp * 0.003) * 0.05; 
                                    reticle.material.color.setHex(0xff6b6b); 
                                    reticle.material.opacity = 0.4;
                                    reticle.scale.set(slowPulse, slowPulse, 1); 
                                    
                                    xrUI.innerText = "L'écho est confus..."; 
                                    xrUI.style.color = "#ff6b6b"; 
                                    xrUI.style.borderColor = "rgba(255, 107, 107, 0.2)";
                                    xrUI.style.boxShadow = "0 8px 32px 0 rgba(255, 107, 107, 0.2)";
                                    canExtract = false; 
                                }
                            }
                        } else { reticle.visible = false; }
                    }
                }
                
                scene.traverse((obj) => { 
                    if (obj.name === 'artifact') { 
                        obj.rotation.y += 0.01; 
                        obj.position.y += Math.sin(timestamp * 0.002) * 0.0005; 
                        obj.children[1].rotation.x -= 0.01; obj.children[1].rotation.z += 0.005;
                    } 
                }); 
                renderer.render(scene, camera);
            }

            function playGlitchPop(intensity) {
                if (!audioCtx || intensity <= 0) return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine'; 
                const freqs = [440, 493.88, 554.37, 659.25, 739.99]; 
                osc.frequency.value = freqs[Math.floor(Math.random() * freqs.length)];
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start();
                gain.gain.setValueAtTime(0, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.15 * intensity, audioCtx.currentTime + 0.1);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.5);
                osc.stop(audioCtx.currentTime + 1.5);
            }

            function radarLoop() {
                clearTimeout(radarTimeout);
                let intensity = 0; if (currentDistance <= glitchStartDistance) { intensity = 1 - (currentDistance / glitchStartDistance); }
                if (intensity > 0) playGlitchPop(intensity);
                let delay = 2000; if (intensity > 0) delay = 200 + ((1 - intensity) * 1500);
                radarTimeout = setTimeout(radarLoop, delay);
            }

            function calculateDistance(lat1, lon1, lat2, lon2) {
                const R = 6371e3; const p1 = lat1 * Math.PI/180; const p2 = lat2 * Math.PI/180;
                const dp = (lat2-lat1) * Math.PI/180; const dl = (lon2-lon1) * Math.PI/180;
                const a = Math.sin(dp/2) * Math.sin(dp/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dl/2) * Math.sin(dl/2);
                return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); 
            }

            // --- ÉVÉNEMENTS DES BOUTONS DE LA FICHE ---
            document.getElementById('btn-continue').addEventListener('click', () => { 
                let nextCount = foundCount + 1;
                window.location.href = window.location.pathname + '?fragment=' + nextCount;
            });

            document.getElementById('btn-inventory').addEventListener('click', () => { 
                let nextCount = foundCount + 1;
                window.location.href = window.location.pathname + '?fragment=' + nextCount + '&view=sanctuary';
            });

            initXR();
        }
    </script>
