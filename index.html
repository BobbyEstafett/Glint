<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GLINT - Alpha (Neumorphic Design)</title>
    <style>
        /* --- VARIABLES NEUMORPHISM --- */
        :root {
            --bg-color: #e0e5ec;
            --text-main: #4a5568;
            --text-light: #a0aec0;
            --accent-color: #7f9cf5; /* Bleu doux / éthéré */
            --accent-danger: #fc8181;
            --shadow-light: #ffffff;
            --shadow-dark: #a3b1c6;
        }

        body { 
            margin: 0; padding: 0; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; 
            -webkit-font-smoothing: antialiased;
        }

        /* --- UI DU RADAR --- */
        #radar-ui {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            display: flex; flex-direction: column; align-items: center; 
            justify-content: flex-end; padding-bottom: 80px; box-sizing: border-box;
            z-index: 10; transition: opacity 0.5s; pointer-events: none; 
        }

        #ar-veil {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: rgba(255, 255, 255, 0.4); backdrop-filter: blur(2px); 
            pointer-events: none; z-index: 4; display: none; 
        }

        #flash-overlay {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #ffffff; z-index: 8000; opacity: 0; pointer-events: none; transition: opacity 0.4s ease-out;
        }
        
        /* Neumorphic Info Box */
        .info-box { 
            background: var(--bg-color); 
            padding: 30px; 
            border-radius: 24px; 
            text-align: center; width: 85%; max-width: 400px; pointer-events: auto; 
            box-shadow: 9px 9px 16px rgba(163,177,198,0.6), -9px -9px 16px rgba(255,255,255, 0.8);
        }
        
        .main-title { font-size: 1.2rem; font-weight: 700; color: var(--text-main); margin-bottom: 5px; letter-spacing: 2px; text-transform: uppercase; }
        .data-stream { font-size: 0.75rem; color: var(--text-light); margin-top: 10px; font-family: monospace; letter-spacing: 1px; }
        #distance-display { font-size: 1.4rem; font-weight: 300; margin: 15px 0; color: var(--accent-color); }
        #status-display { font-size: 0.85rem; color: var(--text-light); }

        /* Neumorphic Buttons */
        button {
            margin-top: 15px; padding: 15px 24px; width: 100%;
            background: var(--bg-color); color: var(--accent-color); 
            font-weight: 600; font-size: 0.9rem; letter-spacing: 1px; text-transform: uppercase;
            border: none; border-radius: 50px; cursor: pointer;
            box-shadow: 6px 6px 10px 0 rgba(163,177,198, 0.6), -6px -6px 10px 0 rgba(255,255,255, 0.8);
            transition: all 0.2s ease;
        }
        button:active {
            box-shadow: inset 4px 4px 6px rgba(163,177,198, 0.6), inset -4px -4px 6px rgba(255,255,255, 0.8);
        }
        
        #recalc-btn { display: none; font-size: 0.7rem; color: var(--text-light); margin-top: 20px; box-shadow: 4px 4px 8px rgba(163,177,198, 0.4), -4px -4px 8px rgba(255,255,255, 0.6); }

        /* Surcharge du bouton WebXR pour le rendre Neumorphique */
        #ARButton {
            background: var(--bg-color) !important; color: var(--accent-danger) !important;
            border: none !important; border-radius: 50px !important;
            box-shadow: 6px 6px 10px 0 rgba(163,177,198, 0.6), -6px -6px 10px 0 rgba(255,255,255, 0.8) !important;
            font-family: inherit !important; font-weight: 700 !important; letter-spacing: 1px !important;
            position: absolute !important; bottom: 40px !important; left: 50% !important; transform: translateX(-50%) !important;
            width: 85% !important; max-width: 400px !important; z-index: 999 !important; padding: 15px 24px !important;
        }

        /* --- UI INDICATIONS AR --- */
        #xr-ui {
            position: absolute; top: 50px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 400px; z-index: 100;
            pointer-events: none; text-align: center; display: none; box-sizing: border-box;
            background: rgba(255, 255, 255, 0.7); border-radius: 50px;
            padding: 15px 25px; box-shadow: 0 8px 32px rgba(31, 38, 135, 0.1); backdrop-filter: blur(8px);
            font-size: 0.9rem; font-weight: 600; color: var(--text-main); letter-spacing: 1px;
            transition: color 0.3s, background 0.3s;
        }

        /* --- UI FICHE ARTEFACT --- */
        #artifact-ui {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(224, 229, 236, 0.85); z-index: 3000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            box-sizing: border-box; backdrop-filter: blur(15px);
        }
        .artifact-card {
            background: var(--bg-color); border-radius: 30px;
            padding: 40px 30px; width: 85%; max-width: 350px; text-align: center;
            box-shadow: 12px 12px 24px rgba(163,177,198,0.7), -12px -12px 24px rgba(255,255,255, 0.9);
        }
        .artifact-card h2 { color: var(--text-main); margin-top: 0; letter-spacing: 2px; font-size: 1.3rem; font-weight: 800; }
        .artifact-lore { font-size: 0.95rem; color: var(--text-light); font-style: italic; margin-bottom: 30px; line-height: 1.6; }
        .artifact-stats { text-align: left; font-size: 0.85rem; border-top: 1px solid rgba(163,177,198,0.3); padding-top: 20px; }
        .artifact-stats p { margin: 12px 0; color: var(--text-light); display: flex; justify-content: space-between; font-weight: 500; }
        .artifact-stats span { color: var(--accent-color); font-weight: 700; text-align: right; }
        .mystery-word { color: var(--accent-danger) !important; font-size: 1.2rem; letter-spacing: 2px; }
        
        .btn-group { display: flex; flex-direction: column; gap: 15px; margin-top: 35px; }

        /* --- UI SANCTUAIRE 2D --- */
        #sanctuary-ui {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; 
            background: var(--bg-color);
            z-index: 5000; display: none; flex-direction: column; 
            padding: 50px 20px 20px 20px; box-sizing: border-box; 
            overflow: hidden; 
        }
        .sanctuary-header { text-align: center; margin-bottom: 30px; flex-shrink: 0; }
        .sanctuary-header h2 { color: var(--text-main); margin: 0; letter-spacing: 3px; font-size: 1.4rem; font-weight: 800; }
        .sanctuary-header p { color: var(--text-light); font-size: 0.9rem; margin-top: 10px; }
        
        .sanctuary-list { 
            flex: 1 1 auto; min-height: 0; 
            display: flex; flex-direction: column; gap: 20px; 
            overflow-y: auto; padding-bottom: 20px; scrollbar-width: none; 
            padding: 10px; /* Espace pour les ombres */
        }
        .sanctuary-list::-webkit-scrollbar { display: none; }
        
        .fragment-slot { 
            background: var(--bg-color); border-radius: 20px; 
            padding: 20px; display: flex; flex-direction: column; gap: 8px;
            flex-shrink: 0; transition: all 0.3s;
            /* Ombre "creusée" pour les objets non trouvés */
            box-shadow: inset 5px 5px 10px rgba(163,177,198,0.5), inset -5px -5px 10px rgba(255,255,255, 0.8);
        }
        .fragment-slot.found { 
            /* Ombre "extrudée" pour les objets trouvés */
            box-shadow: 6px 6px 12px rgba(163,177,198,0.6), -6px -6px 12px rgba(255,255,255, 0.8);
        }
        .fragment-slot .slot-title { color: var(--text-light); font-size: 0.75rem; letter-spacing: 1px; font-weight: 600; text-transform: uppercase; }
        .fragment-slot .slot-name { color: #a0aec0; font-weight: bold; font-size: 1.1rem; }
        .fragment-slot.found .slot-name { color: var(--text-main); }
        .fragment-slot .slot-word { color: transparent; font-size: 1.3rem; letter-spacing: 2px; text-align: right; font-weight: 800; }
        .fragment-slot.found .slot-word { color: var(--accent-color); }
        
        .sanctuary-footer { flex-shrink: 0; margin-top: 15px; padding-bottom: env(safe-area-inset-bottom, 10px); }

        #threejs-radar-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
    </style>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
</head>
<body>

    <div id="flash-overlay"></div>
    <div id="ar-container" style="display: none;"></div>
    <div id="threejs-radar-container"></div>
    <div id="ar-veil"></div>

    <div id="radar-ui">
        <div class="info-box">
            <div class="main-title" id="main-title">Scanner Désactivé</div>
            <p id="distance-display">En attente...</p>
            <p id="status-display">Autorisez les capteurs pour l'immersion.</p>
            <div class="data-stream" id="data-stream">_</div>
            <button id="start-btn">Activer le Radar</button>
            <button id="recalc-btn">Recalibrer le capteur</button>
        </div>
    </div>

    <div id="xr-ui">Recherche de la surface...</div>

    <div id="artifact-ui">
        <div class="artifact-card">
            <h2 id="ui-art-name">ÉCLAT MNÉMONIQUE</h2>
            <p id="ui-art-lore" class="artifact-lore"></p>
            
            <div class="artifact-stats">
                <p>DONNÉE <span id="ui-progress">1 / 7</span></p>
                <p>ORIGINE <span id="ui-gps">0.000, 0.000</span></p>
                <p>EXTRACTION <span class="mystery-word" id="ui-word">"---"</span></p>
            </div>

            <div class="btn-group">
                <button id="btn-inventory">Consulter l'Archive</button>
                <button id="btn-continue">Poursuivre</button>
            </div>
        </div>
    </div>

    <div id="sanctuary-ui">
        <div class="sanctuary-header">
            <h2>L'ARCHIVE</h2>
            <p>Reconstruction de la mémoire originelle</p>
        </div>
        <div class="sanctuary-list" id="sanctuary-list">
            </div>
        <div class="sanctuary-footer">
            <button id="btn-back-radar">Retourner au Scanner</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/addons/webxr/ARButton.js';

        // --- DATA SYSTEM (Identique au Golden Master) ---
        const ARTIFACTS_DATA = [
            { name: "ÉCLAT MNÉMONIQUE", word: "NOUS", lore: "Une résonance cristallisée d'un futur oublié. Les données palpitent encore d'une chaleur fantôme." },
            { name: "SOUVENIR LIQUIDE", word: "AVONS", lore: "Une larme digitale figée dans le flux du réseau. Elle contient l'écho d'un rire sans visage." },
            { name: "FRAGMENT D'ÉCHO", word: "OUBLIÉ", lore: "Le silence entre deux paquets de données. Une absence qui pèse lourdement sur la réalité." },
            { name: "VECTEUR D'INTENTION", word: "COMMENT", lore: "Une direction sans but, gravée dans l'obsidienne. Elle pointe inlassablement vers le vide." },
            { name: "NOYAU D'EXISTENCE", word: "ÊTRE", lore: "La pulsation primordiale du code source. 'Je calcule, donc je fuis'." },
            { name: "PRISME DE VÉRITÉ", word: "RÉELS", lore: "La lumière se courbe là où la donnée devient chair. La frontière commence à s'effacer." },
            { name: "CLEF D'ANCRAGE", word: "...", lore: "Le point final de la fuite. Le moment où la simulation accepte enfin son sort." }
        ];

        const urlParams = new URLSearchParams(window.location.search);
        let foundCount = parseInt(urlParams.get('fragment')) || 0;
        let isSanctuaryView = urlParams.get('view') === 'sanctuary';

        // --- FONCTIONS SANCTUAIRE ---
        function buildSanctuaryList() {
            const listContainer = document.getElementById('sanctuary-list');
            listContainer.innerHTML = ''; 
            
            ARTIFACTS_DATA.forEach((data, index) => {
                const isFound = index < foundCount;
                const slot = document.createElement('div');
                slot.className = `fragment-slot ${isFound ? 'found' : ''}`;
                
                const titleBlock = document.createElement('div');
                titleBlock.className = 'slot-title';
                titleBlock.innerText = `Mémoire ${index + 1}`;

                const nameBlock = document.createElement('div');
                nameBlock.className = 'slot-name';
                nameBlock.innerText = isFound ? data.name : 'Non identifié';
                
                const wordBlock = document.createElement('div');
                wordBlock.className = 'slot-word';
                wordBlock.innerText = isFound ? data.word : '---';
                
                slot.appendChild(titleBlock);
                slot.appendChild(nameBlock);
                slot.appendChild(wordBlock);
                listContainer.appendChild(slot);
            });
        }

        if (isSanctuaryView) {
            document.getElementById('radar-ui').style.display = 'none';
            document.getElementById('threejs-radar-container').style.display = 'none';
            buildSanctuaryList();
            document.getElementById('sanctuary-ui').style.display = 'flex';
        }

        document.getElementById('btn-back-radar').addEventListener('click', () => {
            window.location.href = window.location.pathname + '?fragment=' + foundCount;
        });

        // --- CODE RADAR / AR ---
        if (!isSanctuaryView) {
            let targetLat = null, targetLon = null;
            let startLat = null, startLon = null;
            
            const spawnDistance = 2; const glitchStartDistance = 10; const extractionDistance = 5; 
            const maxGlitchOffset = 10; // Réduit pour un effet plus subtil
            let currentDistance = 999;
            let radarTimeout, audioCtx, cameraStream = null, dataStreamInterval;

            const startBtn = document.getElementById('start-btn');
            const recalcBtn = document.getElementById('recalc-btn');
            const distanceDisplay = document.getElementById('distance-display');
            const statusDisplay = document.getElementById('status-display');
            const radarUI = document.getElementById('radar-ui');
            const xrUI = document.getElementById('xr-ui');
            const arContainer = document.getElementById('ar-container');
            const mainTitle = document.getElementById('main-title');
            const dataStream = document.getElementById('data-stream');
            const flashOverlay = document.getElementById('flash-overlay');
            const arVeil = document.getElementById('ar-veil');
            const artifactUI = document.getElementById('artifact-ui');

            function generateTarget(lat, lon, distance) {
                const R = 6371000; const angle = Math.random() * 2 * Math.PI;
                targetLat = lat + ((distance * Math.cos(angle)) / R) * 180 / Math.PI;
                targetLon = lon + ((distance * Math.sin(angle)) / (R * Math.cos(lat * Math.PI / 180))) * 180 / Math.PI;
            }
            function updateDataStream() {
                let stream = ""; const chars = "0123456789ABCDEF";
                for(let i=0; i<12; i++) stream += chars.charAt(Math.floor(Math.random() * chars.length));
                dataStream.innerText = `SYNC: ${stream}`;
            }

            let radarRenderer, radarScene, radarCamera, videoTexture, shaderMaterial, videoElement;
            let isFlashTriggered = false;

            startBtn.addEventListener('click', async () => {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)(); audioCtx.resume();
                startBtn.style.display = 'none'; recalcBtn.style.display = 'inline-block'; 
                mainTitle.innerText = "Analyse en cours";
                dataStreamInterval = setInterval(updateDataStream, 100);

                if ("geolocation" in navigator) {
                    navigator.geolocation.getCurrentPosition((pos) => {
                        startLat = pos.coords.latitude; startLon = pos.coords.longitude;
                        generateTarget(startLat, startLon, spawnDistance);
                        navigator.geolocation.watchPosition(updatePosition, (err) => console.log(err), { enableHighAccuracy: true });
                        radarLoop();
                    });
                }
                try { cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }); initRadarShader(cameraStream); } catch (err) { console.error(err); }
            });

            recalcBtn.addEventListener('click', () => { if (startLat && startLon) { generateTarget(startLat, startLon, spawnDistance); statusDisplay.innerText = "Recalibrage en cours..."; } });

            function updatePosition(pos) {
                startLat = pos.coords.latitude; startLon = pos.coords.longitude;
                currentDistance = calculateDistance(pos.coords.latitude, pos.coords.longitude, targetLat, targetLon);
                
                if (renderer && renderer.xr && renderer.xr.isPresenting) {
                    arContainer.style.display = 'none';
                    return;
                }

                distanceDisplay.innerText = `${Math.round(currentDistance)} m`;
                
                let intensity = 0; if (currentDistance <= glitchStartDistance) { intensity = 1 - (currentDistance / glitchStartDistance); }
                document.documentElement.style.setProperty('--glitch-offset', `${intensity * maxGlitchOffset}px`);
                if(shaderMaterial) shaderMaterial.uniforms.intensity.value = intensity;

                const arBtn = document.getElementById('ARButton');
                if (currentDistance < extractionDistance) {
                    statusDisplay.innerText = "Anomalie à portée."; statusDisplay.style.color = "var(--accent-danger)";
                    arContainer.style.display = 'block'; recalcBtn.style.display = 'none'; 
                    if (arBtn) {
                        arBtn.innerText = "Initier l'extraction";
                        if (!isFlashTriggered) {
                            arBtn.addEventListener('click', () => { flashOverlay.style.opacity = '1'; if (navigator.vibrate) navigator.vibrate([200, 100, 200]); }, { once: true });
                            isFlashTriggered = true;
                        }
                    }
                } else {
                    statusDisplay.innerText = "Déplacez-vous pour affiner le signal."; statusDisplay.style.color = "var(--text-light)";
                    arContainer.style.display = 'none'; recalcBtn.style.display = 'inline-block';
                }
            }

            // MODIFICATION SHADER : Mode Clair / Ethereal
            function initRadarShader(stream) {
                const container = document.getElementById('threejs-radar-container');
                videoElement = document.createElement('video'); videoElement.srcObject = stream; videoElement.play();
                radarScene = new THREE.Scene(); radarCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
                radarRenderer = new THREE.WebGLRenderer(); radarRenderer.setSize(window.innerWidth, window.innerHeight); container.appendChild(radarRenderer.domElement);
                videoTexture = new THREE.VideoTexture(videoElement);
                shaderMaterial = new THREE.ShaderMaterial({
                    uniforms: { tDiffuse: { value: videoTexture }, intensity: { value: 0 }, time: { value: 0 } },
                    vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = vec4(position, 1.0); }`,
                    fragmentShader: `
                        uniform sampler2D tDiffuse; uniform float intensity; uniform float time; varying vec2 vUv;
                        void main() {
                            vec2 uv = vUv;
                            // Léger tremblement
                            float jitter = sin(time * 20.0 + uv.y * 50.0) * 0.005 * intensity;
                            uv.x += jitter;
                            
                            vec4 color = texture2D(tDiffuse, uv);
                            float luma = dot(color.rgb, vec3(0.299, 0.587, 0.114));
                            
                            // Effet Bright/Ethereal au lieu de dark
                            vec3 etherealColor = mix(vec3(luma + 0.4), color.rgb, 0.7 - intensity); 
                            
                            // Aberration douce bleu/rose
                            float ab = 0.01 * intensity;
                            etherealColor.r = mix(etherealColor.r, texture2D(tDiffuse, uv + vec2(ab, 0.0)).r + 0.2, intensity);
                            etherealColor.b = mix(etherealColor.b, texture2D(tDiffuse, uv - vec2(ab, 0.0)).b + 0.3, intensity);
                            
                            gl_FragColor = vec4(etherealColor, 1.0);
                        }
                    `
                });
                const quad = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), shaderMaterial); radarScene.add(quad); renderRadar();
            }
            let clock = new THREE.Clock();
            function renderRadar() { if (radarRenderer && shaderMaterial) { requestAnimationFrame(renderRadar); shaderMaterial.uniforms.time.value = clock.getElapsedTime(); radarRenderer.render(radarScene, radarCamera); } }

            // --- MOTEUR WEBXR ---
            let scene, camera, renderer, controller, reticle, hitTestSource = null, hitTestSourceRequested = false;
            let hiddenTarget = new THREE.Vector3(); let isTargetSpawned = false; let canExtract = false; 
            
            let xrState = 'search'; 
            let spawnedArtifactMesh = null;
            const raycaster = new THREE.Raycaster();

            function initXR() {
                scene = new THREE.Scene(); camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20); 
                const light = new THREE.HemisphereLight(0xffffff, 0xd0d9e6, 3); scene.add(light);
                
                renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true }); renderer.setPixelRatio(window.devicePixelRatio); renderer.setSize(window.innerWidth, window.innerHeight); renderer.xr.enabled = true;
                document.body.appendChild(renderer.domElement);

                const arButton = ARButton.createButton(renderer, { requiredFeatures: ['hit-test'], optionalFeatures: ['dom-overlay'], domOverlay: { root: document.body } });
                document.getElementById('ar-container').appendChild(arButton);

                renderer.xr.addEventListener('sessionstart', () => {
                    flashOverlay.style.transition = 'none'; flashOverlay.style.opacity = '1';
                    if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
                    
                    document.getElementById('ar-container').style.display = 'none'; 
                    document.getElementById('radar-ui').style.display = 'none'; 
                    document.getElementById('ar-veil').style.display = 'block'; 
                    
                    if (cameraStream) cameraStream.getTracks().forEach(track => track.stop()); if(videoElement) videoElement.pause();
                    clearTimeout(radarTimeout); clearInterval(dataStreamInterval); 
                    if(radarRenderer) { radarRenderer.dispose(); radarRenderer = null; document.getElementById('threejs-radar-container').innerHTML = ''; }
                    
                    document.getElementById('xr-ui').style.display = 'block'; 
                    document.getElementById('xr-ui').innerText = "Balayez l'environnement pour localiser";
                    
                    setTimeout(() => { flashOverlay.style.transition = 'opacity 1.5s ease-in-out'; flashOverlay.style.opacity = '0'; }, 50); 
                });

                const artifactGroup = new THREE.Group(); artifactGroup.name = 'artifact'; 
                // Core modifié pour l'éthéré
                const coreGeo = new THREE.IcosahedronGeometry(0.06, 0); const coreMat = new THREE.MeshStandardMaterial({ color:0xffffff, roughness:0.1, metalness:0.8, flatShading: true }); const coreMesh = new THREE.Mesh(coreGeo, coreMat);
                // Wireframe modifié
                const wireGeo = new THREE.IcosahedronGeometry(0.09, 1); const wireMat = new THREE.MeshBasicMaterial({ color: 0x7f9cf5, wireframe: true, transparent: true, opacity: 0.6 }); const wireMesh = new THREE.Mesh(wireGeo, wireMat);
                artifactGroup.add(coreMesh); artifactGroup.add(wireMesh);

                controller = renderer.xr.getController(0);
                controller.addEventListener('select', () => {
                    if (xrState === 'search' && reticle.visible && canExtract) {
                        spawnedArtifactMesh = artifactGroup.clone();
                        reticle.matrix.decompose(spawnedArtifactMesh.position, spawnedArtifactMesh.quaternion, spawnedArtifactMesh.scale);
                        spawnedArtifactMesh.rotation.y = Math.random() * Math.PI;
                        scene.add(spawnedArtifactMesh);
                        
                        xrState = 'revealed';
                        reticle.visible = false; 
                        document.getElementById('xr-ui').innerText = "Donnée stabilisée. Touchez pour extraire."; 
                        document.getElementById('xr-ui').style.background = "var(--accent-color)";
                        document.getElementById('xr-ui').style.color = "#fff";
                        
                        if (navigator.vibrate) navigator.vibrate([100, 50, 100]); 
                    } 
                    else if (xrState === 'revealed') {
                        const tempMatrix = new THREE.Matrix4();
                        tempMatrix.identity().extractRotation(controller.matrixWorld);
                        raycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
                        raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tempMatrix);

                        const intersects = raycaster.intersectObject(spawnedArtifactMesh, true);
                        if (intersects.length > 0) {
                            xrState = 'recovered';
                            document.getElementById('xr-ui').style.display = 'none'; 
                            
                            const safeIndex = foundCount % 7; 
                            const currentData = ARTIFACTS_DATA[safeIndex];
                            
                            document.getElementById('ui-art-name').innerText = currentData.name;
                            document.getElementById('ui-art-lore').innerText = `"${currentData.lore}"`;
                            document.getElementById('ui-word').innerText = `"${currentData.word}"`;
                            document.getElementById('ui-progress').innerText = `${safeIndex + 1} / 7`;
                            document.getElementById('ui-gps').innerText = `${startLat.toFixed(4)}, ${startLon.toFixed(4)}`;
                            
                            document.getElementById('artifact-ui').style.display = 'flex';
                            if (navigator.vibrate) navigator.vibrate([50, 50, 200]); 
                        }
                    }
                });
                scene.add(controller);
                
                // Réticule mis à jour pour coller au light mode
                reticle = new THREE.Mesh(new THREE.RingGeometry(0.08, 0.1, 32).rotateX(-Math.PI/2), new THREE.MeshBasicMaterial({ color: 0xa0aec0 })); 
                reticle.matrixAutoUpdate = false; reticle.visible = false; scene.add(reticle);
                renderer.setAnimationLoop(renderXR);
            }

            function renderXR(timestamp, frame) {
                if (frame) {
                    const refSpace = renderer.xr.getReferenceSpace(); const session = renderer.xr.getSession();
                    if (!hitTestSourceRequested) {
                        session.requestReferenceSpace('viewer').then((ref) => { session.requestHitTestSource({ space: ref }).then((src) => hitTestSource = src); });
                        session.addEventListener('end', () => { hitTestSourceRequested = false; hitTestSource = null; location.reload(); });
                        hitTestSourceRequested = true;
                    }
                    if (hitTestSource && xrState === 'search') {
                        const results = frame.getHitTestResults(hitTestSource);
                        if (results.length > 0) {
                            reticle.visible = true; reticle.matrix.fromArray(results[0].getPose(refSpace).transform.matrix);
                            if (!isTargetSpawned) {
                                let pos = new THREE.Vector3(); pos.setFromMatrixPosition(reticle.matrix);
                                hiddenTarget.x = pos.x + (Math.random() > 0.5 ? 1 : -1) * (0.5 + Math.random()); hiddenTarget.y = pos.y; hiddenTarget.z = pos.z + (Math.random() > 0.5 ? 1 : -1) * (0.5 + Math.random());
                                isTargetSpawned = true;
                            }
                            if (isTargetSpawned) {
                                let curr = new THREE.Vector3(); curr.setFromMatrixPosition(reticle.matrix);
                                let dist = Math.sqrt(Math.pow(curr.x - hiddenTarget.x, 2) + Math.pow(curr.z - hiddenTarget.z, 2));
                                
                                if (dist < 0.3) { 
                                    reticle.material.color.setHex(0x7f9cf5); reticle.scale.set(1.5, 1.5, 1.5); 
                                    document.getElementById('xr-ui').innerText = "Cible identifiée. Touchez l'écran."; 
                                    canExtract = true; if (navigator.vibrate && Math.random() > 0.8) navigator.vibrate(20); 
                                } 
                                else if (dist < 1.0) { 
                                    reticle.material.color.setHex(0xa0aec0); reticle.scale.set(1, 1, 1); 
                                    document.getElementById('xr-ui').innerText = "Anomalie à proximité..."; 
                                    canExtract = false; 
                                } 
                                else { 
                                    reticle.material.color.setHex(0xcbced1); reticle.scale.set(1, 1, 1); 
                                    document.getElementById('xr-ui').innerText = "Balayez l'environnement..."; 
                                    canExtract = false; 
                                }
                            }
                        } else { reticle.visible = false; }
                    }
                }
                
                scene.traverse((obj) => { 
                    if (obj.name === 'artifact') { 
                        obj.rotation.y += 0.01; obj.position.y += Math.sin(timestamp*0.003)*0.0005; 
                        obj.children[1].rotation.x -= 0.01; obj.children[1].rotation.z += 0.005;
                    } 
                }); 
                renderer.render(scene, camera);
            }

            document.getElementById('btn-continue').addEventListener('click', () => { 
                let nextCount = foundCount + 1;
                window.location.href = window.location.pathname + '?fragment=' + nextCount;
            });

            document.getElementById('btn-inventory').addEventListener('click', () => { 
                let nextCount = foundCount + 1;
                window.location.href = window.location.pathname + '?fragment=' + nextCount + '&view=sanctuary';
            });

            function radarLoop() {
                clearTimeout(radarTimeout);
                let intensity = 0; if (currentDistance <= glitchStartDistance) { intensity = 1 - (currentDistance / glitchStartDistance); }
                let delay = 2000; if (intensity > 0) delay = 100 + ((1 - intensity) * 1900);
                radarTimeout = setTimeout(radarLoop, delay);
            }

            function calculateDistance(lat1, lon1, lat2, lon2) {
                const R = 6371e3; const p1 = lat1 * Math.PI/180; const p2 = lat2 * Math.PI/180;
                const dp = (lat2-lat1) * Math.PI/180; const dl = (lon2-lon1) * Math.PI/180;
                const a = Math.sin(dp/2) * Math.sin(dp/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dl/2) * Math.sin(dl/2);
                return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); 
            }

            initXR();
        }
    </script>
</body>
