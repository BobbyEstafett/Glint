<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GLINT - The Great Slumber</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

    <style>
        :root {
            --bg-night: #0b0d14;
            --glass-bg: rgba(20, 25, 40, 0.45);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-title: #ffffff;
            --text-body: rgba(255, 255, 255, 0.8);
            --accent-pure: #8be9fd;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-night);
            color: var(--text-body);
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            -webkit-font-smoothing: antialiased;
        }

        /* Effet de grain/bruit constant */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.15'/%3E%3C/svg%3E");
            mix-blend-mode: overlay;
            z-index: 9999;
            pointer-events: none;
        }

        h1,
        h2,
        h3,
        .serif {
            font-family: 'Playfair Display', serif;
            color: var(--text-title);
            font-weight: normal;
            text-wrap: balance;
        }

        #transition-veil {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: var(--bg-night);
            z-index: 999999;
            opacity: 1;
            transition: opacity 1.2s ease-in-out;
            pointer-events: none;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
        }

        #threejs-radar-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #dream-veil {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, transparent 0%, rgba(11, 13, 20, 0.8) 100%);
            pointer-events: none;
            z-index: 2;
        }

        .edge-glow {
            position: absolute;
            top: 0;
            width: 80px;
            height: 100vh;
            pointer-events: none;
            z-index: 90;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        #glow-left {
            left: 0;
        }

        #glow-right {
            right: 0;
        }

        #radar-ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 80px;
            box-sizing: border-box;
            z-index: 10;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1.5s ease;
        }

        .info-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 30px 20px;
            text-align: center;
            width: 85%;
            max-width: 350px;
            height: 300px;
            pointer-events: auto;
            box-sizing: border-box;
            transition: box-shadow 1s ease;
        }

        .panel-blobs {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            opacity: 0.3;
            border-radius: 20px;
            overflow: hidden;
        }

        .panel-blob {
            position: absolute;
            filter: blur(40px);
            opacity: 0.6;
        }

        .panel-blob.b1 {
            animation: driftBlob1 20s linear infinite;
        }

        .panel-blob.b2 {
            animation: driftBlob2 15s linear infinite reverse;
        }

        .info-top {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100px;
            width: 100%;
        }

        .info-mid {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            width: 100%;
        }

        .info-bottom {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            height: 20px;
            width: 100%;
        }

        .main-title {
            font-size: 1.5rem;
            letter-spacing: 2px;
            margin: 0 0 10px 0;
            line-height: 1;
        }

        #distance-display {
            font-size: 2rem;
            font-weight: 200;
            margin: 0;
            color: var(--text-title);
            line-height: 1;
            display: flex;
            align-items: center;
        }

        #status-display {
            font-weight: 200;
            font-size: 0.8rem;
            margin: 0;
            line-height: 1.2;
            text-wrap: balance;
            height: 2em;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .data-stream {
            font-size: 0.65rem;
            color: var(--text-body);
            margin: 0;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.6;
            line-height: 1;
        }

        button {
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            margin: 0;
            height: 55px;
            width: 100%;
            box-sizing: border-box;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-title);
            font-family: 'Montserrat', sans-serif;
            font-weight: 400;
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: all 0.4s ease;
            line-height: 1;
        }

        button:active {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(0.98);
        }

        #recalc-btn {
            display: none;
            font-size: 0.65rem;
            border: none;
            opacity: 0.5;
            height: 40px;
            background: transparent;
            margin-top: 15px;
        }

        #ar-container {
            width: 100%;
            display: none;
        }

        #ARButton {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid var(--accent-pure) !important;
            color: var(--accent-pure) !important;
            font-family: 'Montserrat', sans-serif !important;
            font-weight: 600 !important;
            letter-spacing: 2px !important;
            position: relative !important;
            bottom: auto !important;
            left: auto !important;
            transform: none !important;
            width: 100% !important;
            max-width: 100% !important;
            margin: 0 !important;
            height: 55px !important;
            border-radius: 50px !important;
            box-shadow: 0 0 15px var(--accent-pure) !important;
        }

        #xr-ui {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: fit-content;
            z-index: 100;
            pointer-events: none;
            text-align: center;
            display: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 0.8rem;
            letter-spacing: 2px;
            font-weight: 600;
            transition: all 0.4s ease;
        }

        /* --- STYLES FICHE ARTEFACT --- */
        .fs-fiche {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-night) !important;
            z-index: 3000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            overflow: hidden;
        }

        .fs-blobs-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .fs-blob {
            position: absolute;
            filter: blur(70px);
            opacity: 0.7;
            mix-blend-mode: screen;
        }

        .fs-blob.b1 {
            animation: driftBlob1 25s linear infinite;
        }

        .fs-blob.b2 {
            animation: driftBlob2 20s linear infinite reverse;
        }

        .fs-content {
            position: relative;
            z-index: 2;
            width: 85%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .artifact-3d-canvas {
            width: 250px;
            height: 250px;
            margin: 0 auto 10px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            filter: drop-shadow(0 20px 30px rgba(0, 0, 0, 0.5));
        }

        .fs-content h2 {
            font-family: 'Playfair Display', serif;
            font-weight: 400;
            font-size: 1.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 0 0 15px 0;
            color: #fff;
            text-align: center;
        }

        .fs-content .artifact-lore {
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.9);
            text-align: center;
            line-height: 1.6;
            margin-bottom: 25px;
            text-wrap: balance;
        }

        .clean-divider {
            border: none;
            border-top: 1px solid rgba(255, 255, 255, 0.4);
            width: 100%;
            margin: 0 0 20px 0;
        }

        .clean-stats {
            width: 100%;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 2px;
        }

        .clean-stats p {
            margin: 12px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .clean-stats .lbl {
            opacity: 0.7;
            text-transform: uppercase;
            font-weight: 400;
        }

        .clean-stats .val {
            font-weight: 300;
            color: #fff;
            letter-spacing: 1px;
        }

        .clean-stats .val.resonance {
            font-family: 'Montserrat', sans-serif;
            font-weight: 400;
            letter-spacing: 4px;
            color: var(--accent-pure);
            text-transform: uppercase;
        }

        .clean-btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 40px;
            width: 100%;
        }

        .clean-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 30px;
            color: #fff;
            height: 50px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.3s;
        }

        /* --- THE SANCTUARY --- */
        #sanctuary-ui {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #0b0d14;
            z-index: 5000;
            display: none;
            flex-direction: column;
            padding: 50px 0 20px 0;
            box-sizing: border-box;
            overflow: hidden;
        }

        .sanctuary-header {
            text-align: center;
            margin-bottom: 20px;
            flex-shrink: 0;
            padding: 0 20px;
        }

        .sanctuary-header h2 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            margin: 0;
            letter-spacing: 6px;
            font-size: 1.2rem;
            color: #fff;
            text-transform: uppercase;
        }

        .sanctuary-header p {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 5px;
        }

        .map-wrapper {
            padding: 0 20px;
            margin-bottom: 20px;
            flex-shrink: 0;
        }

        #memory-map {
            width: 100%;
            height: 180px;
            border-radius: 15px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--glass-border);
            z-index: 1;
            display: none;
            overflow: hidden;
        }

        .pulsing-node {
            width: 12px;
            height: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 500;
        }

        .artifact-core {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            z-index: 10;
        }

        .artifact-halo {
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            opacity: 0.8;
            animation: pulseHalo 2s infinite ease-out;
        }

        @keyframes pulseHalo {
            0% {
                transform: scale(1);
                opacity: 0.8;
            }

            100% {
                transform: scale(2.5);
                opacity: 0;
            }
        }

        /* --- CARROUSEL FLUIDE V9 --- */
        .sanctuary-list {
            position: relative;
            flex: 1 1 auto;
            display: flex;
            flex-direction: row;
            gap: 0px;
            overflow-x: auto;
            overflow-y: hidden;
            padding: 20px calc(50vw - 110px);
            scroll-snap-type: x mandatory;
            scrollbar-width: none;
            align-items: center;
        }

        .sanctuary-list::-webkit-scrollbar {
            display: none;
        }

        .fragment-slot {
            position: relative;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            width: 220px;
            height: 340px;
            background: rgba(18, 20, 28, 0.65);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            overflow: hidden;
            backdrop-filter: blur(15px);
            scroll-snap-align: center;
            will-change: transform, opacity, z-index;
        }

        .slot-content {
            position: relative;
            z-index: 2;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100%;
            box-sizing: border-box;
        }

        .card-blob {
            position: absolute;
            width: 150%;
            height: 150%;
            filter: blur(45px);
            opacity: 0.6;
            z-index: 0;
            animation: morphCardBlob 12s linear infinite;
            mix-blend-mode: screen;
        }

        .fragment-slot:not(.found) {
            background: rgba(18, 20, 28, 0.3);
            border: 1px dashed rgba(255, 255, 255, 0.05);
        }

        .slot-content .slot-title {
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            font-size: 0.65rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.5;
        }

        .slot-content .slot-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            font-weight: 400;
            opacity: 0.3;
            text-transform: uppercase;
            margin-top: auto;
            margin-bottom: 10px;
            text-align: center;
        }

        .fragment-slot.found .slot-name {
            opacity: 1;
            color: var(--text-title);
        }

        .slot-content .slot-word {
            font-family: 'Montserrat', sans-serif;
            font-weight: 400;
            font-size: 1rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-align: center;
            opacity: 0;
        }

        .sanctuary-footer {
            flex-shrink: 0;
            margin-top: 10px;
            padding: 0 20px env(safe-area-inset-bottom, 10px) 20px;
        }

        /* --- ONBOARDING & OVERLAYS --- */
        #onboarding-ui {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 8000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 1.5s ease;
            background: var(--bg-night);
        }

        .ob-content {
            position: relative;
            z-index: 2;
            width: 85%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .ob-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            font-weight: 400;
            line-height: 1.6;
            color: #fff;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            text-wrap: balance;
            margin-bottom: 40px;
        }

        .ob-btn {
            opacity: 0;
            display: none;
            width: 100%;
            transition: opacity 1s ease;
        }

        @keyframes driftBlob1 {
            0% {
                border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
                transform: translate(-10%, -10%) rotate(0deg) scale(1);
            }

            33% {
                border-radius: 70% 30% 50% 50% / 30% 30% 70% 70%;
                transform: translate(20%, 15%) rotate(120deg) scale(1.3);
            }

            66% {
                border-radius: 100% 60% 60% 100% / 100% 100% 60% 60%;
                transform: translate(-15%, 20%) rotate(240deg) scale(0.9);
            }

            100% {
                border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
                transform: translate(-10%, -10%) rotate(360deg) scale(1);
            }
        }

        @keyframes driftBlob2 {
            0% {
                border-radius: 60% 40% 30% 70% / 60% 50% 40% 50%;
                transform: translate(10%, 10%) rotate(0deg) scale(1);
            }

            33% {
                border-radius: 30% 70% 70% 30% / 50% 40% 60% 50%;
                transform: translate(-20%, -15%) rotate(120deg) scale(1.4);
            }

            66% {
                border-radius: 50% 50% 30% 70% / 40% 60% 50% 50%;
                transform: translate(15%, -20%) rotate(240deg) scale(0.8);
            }

            100% {
                border-radius: 60% 40% 30% 70% / 60% 50% 40% 50%;
                transform: translate(10%, 10%) rotate(360deg) scale(1);
            }
        }
    </style>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
</head>

<body>

    <div id="transition-veil"></div>
    <div id="flash-overlay"
        style="position:fixed; top:0; left:0; width:100vw; height:100vh; background:#fff; z-index:9000; opacity:0; pointer-events:none; transition:opacity 0.6s ease-out;">
    </div>
    <div id="apotheosis-overlay"></div>

    <div id="onboarding-ui">
        <div class="ob-content">
            <p id="ob-text" class="ob-text"></p>
            <button id="ob-btn" class="clean-btn ob-btn"></button>
        </div>
    </div>

    <div id="review-ui" class="fs-fiche">
        <div class="fs-blobs-container">
            <div id="review-bg-blob1" class="fs-blob b1" style="width: 140vw; height: 140vw; top: -20%; left: -20%;">
            </div>
            <div id="review-bg-blob2" class="fs-blob b2"
                style="width: 140vw; height: 140vw; bottom: -20%; right: -20%;"></div>
        </div>
        <div class="fs-content">
            <div id="review-3d-container" class="artifact-3d-canvas"></div>
            <h2 id="review-art-name">NAME</h2>
            <p id="review-art-lore" class="artifact-lore">LORE</p>
            <hr class="clean-divider">
            <div class="clean-stats">
                <p><span class="lbl">ESSENCE</span> <span class="val" id="review-progress"></span></p>
                <p><span class="lbl">ANCHOR POINT</span> <span class="val" id="review-gps"></span></p>
                <p><span class="lbl">RESONANCE</span> <span class="val resonance" id="review-word">"WORD"</span></p>
            </div>
            <div class="clean-btn-group">
                <button id="btn-close-review" class="clean-btn">CLOSE</button>
            </div>
        </div>
    </div>

    <div id="artifact-ui" class="fs-fiche">
        <div class="fs-blobs-container">
            <div id="ui-bg-blob1" class="fs-blob b1" style="width: 140vw; height: 140vw; top: -20%; left: -20%;"></div>
            <div id="ui-bg-blob2" class="fs-blob b2" style="width: 140vw; height: 140vw; bottom: -20%; right: -20%;">
            </div>
        </div>
        <div class="fs-content">
            <div id="ui-3d-container" class="artifact-3d-canvas fade-in-seq"></div>
            <h2 id="ui-art-name" class="fade-in-seq">NAME</h2>
            <p id="ui-art-lore" class="artifact-lore fade-in-seq delay-1"></p>
            <hr class="clean-divider fade-in-seq delay-2">
            <div class="clean-stats fade-in-seq delay-2">
                <p><span class="lbl">ESSENCE</span> <span class="val" id="ui-progress">1 / 7</span></p>
                <p><span class="lbl">ANCHOR POINT</span> <span class="val" id="ui-gps">0.000, 0.000</span></p>
                <p><span class="lbl">RESONANCE</span> <span class="val resonance" id="ui-word">"---"</span></p>
            </div>
            <div class="clean-btn-group fade-in-seq delay-3">
                <button id="btn-inventory" class="clean-btn">OPEN THE SANCTUARY</button>
                <button id="btn-continue" class="clean-btn">CONTINUE WANDERING</button>
            </div>
        </div>
    </div>

    <div id="threejs-radar-container"></div>
    <div id="dream-veil"></div>
    <div id="glow-left" class="edge-glow"></div>
    <div id="glow-right" class="edge-glow"></div>

    <div id="radar-ui">
        <div class="info-box glass-panel" id="main-panel">
            <div class="panel-blobs">
                <div id="panel-blob1" class="panel-blob b1"
                    style="width: 250px; height: 250px; top: -50px; left: -50px;"></div>
                <div id="panel-blob2" class="panel-blob b2"
                    style="width: 250px; height: 250px; bottom: -50px; right: -50px;"></div>
            </div>
            <div class="info-top">
                <h1 class="main-title serif" id="main-title">Slumber</h1>
                <p id="distance-display">---</p>
                <p id="status-display">Awaiting awakening.</p>
            </div>
            <div class="info-mid">
                <div id="ar-container"></div>
                <button id="recalc-btn">RECALIBRATE</button>
            </div>
            <div class="info-bottom">
                <div class="data-stream" id="data-stream">_</div>
            </div>
        </div>
    </div>

    <div id="xr-ui" class="glass-panel">Seek the resonance around you...</div>

    <div id="sanctuary-ui">
        <div class="sanctuary-header">
            <h2>THE SANCTUARY</h2>
            <p>Reconstructed realities</p>
            <div id="constellation" class="constellation"
                style="display:flex; justify-content:center; align-items:center; margin:20px 0;"></div>
        </div>

        <div class="map-wrapper">
            <div id="memory-map"></div>
        </div>

        <div class="sanctuary-list" id="sanctuary-list"></div>

        <div class="sanctuary-footer">
            <button id="btn-back-radar" class="clean-btn" style="border-color:transparent;">CLOSE YOUR EYES
                (RETURN)</button>
            <button id="btn-reset" class="clean-btn"
                style="display:none; border-color:transparent; opacity:0.5; font-size:0.6rem;">SEVER THE LINK
                (RESTART)</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/addons/webxr/ARButton.js';

        // --- AUDIO ENGINE ---
        let audioCtx = null;
        function getAudioCtx() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            return audioCtx;
        }

        function playUISound(type) {
            const ctx = getAudioCtx(); const t = ctx.currentTime;
            function sparkle(f, d, dur, v) {
                const o = ctx.createOscillator(); const g = ctx.createGain();
                o.type = 'sine'; o.frequency.value = f;
                o.connect(g); g.connect(ctx.destination);
                g.gain.setValueAtTime(0, t + d);
                g.gain.linearRampToValueAtTime(v, t + d + 0.02);
                g.gain.exponentialRampToValueAtTime(0.001, t + d + dur);
                o.start(t + d); o.stop(t + d + dur);
            }
            if (type === 'action') { sparkle(1200, 0, 0.6, 0.08); sparkle(2000, 0.1, 0.8, 0.15); }
            else if (type === 'click') { sparkle(2400, 0, 0.15, 0.08); }
            else if (type === 'success') { [1046, 1318, 1567, 2093].forEach((f, i) => sparkle(f, i * 0.1, 2.0, 0.08)); }
        }

        // --- GAME DATA ---
        const ARTIFACTS_DATA = [
            { id: 0, colorHex: 0x8be9fd, color1: new THREE.Color(0x0a3c96), color2: new THREE.Color(0x8be9fd), cssColor: "rgba(139, 233, 253, 1)", shape: "octahedron", audioFreqs: [440, 554, 659], name: "The First Drop", word: "WE", lore: "« A crystallized fragment of a waking mind. It still pulses with a phantom warmth. »" },
            { id: 1, colorHex: 0xffb86c, color1: new THREE.Color(0x961432), color2: new THREE.Color(0xffb86c), cssColor: "rgba(255, 184, 108, 1)", shape: "tetrahedron", audioFreqs: [440, 466, 554], name: "Liquid Memory", word: "HAVE", lore: "« A tear frozen within the Great Slumber. It holds the faint echo of a faceless laugh. »" },
            { id: 2, colorHex: 0x1e90ff, color1: new THREE.Color(0x280a78), color2: new THREE.Color(0x1e90ff), cssColor: "rgba(30, 144, 255, 1)", shape: "box", audioFreqs: [440, 493, 622], name: "Weight of Absence", word: "FORGOTTEN", lore: "« The silence between two dreams. An absence that weighs heavily on the illusion. »" },
            { id: 3, colorHex: 0xff79c6, color1: new THREE.Color(0x500a64), color2: new THREE.Color(0xff79c6), cssColor: "rgba(255, 121, 198, 1)", shape: "cone", audioFreqs: [440, 622, 659], name: "Ashen Vector", word: "HOW", lore: "« A direction without a destination, engraved in glass. It points relentlessly into the void. »" },
            { id: 4, colorHex: 0x50fa7b, color1: new THREE.Color(0x0a6464), color2: new THREE.Color(0x50fa7b), cssColor: "rgba(80, 250, 123, 1)", shape: "icosahedron", audioFreqs: [440, 880, 1174], name: "Pulsating Core", word: "TO", lore: "« The primordial beat of a waking heart. I dream, therefore I fade. »" },
            { id: 5, colorHex: 0xf1fa8c, color1: new THREE.Color(0xb43278), color2: new THREE.Color(0xf1fa8c), cssColor: "rgba(241, 250, 140, 1)", shape: "cylinder", audioFreqs: [440, 659, 1108], name: "Dawn Prism", word: "BE", lore: "« Light bends where the dream meets reality. The boundary begins to fracture. »" },
            { id: 6, colorHex: 0xffffff, color1: new THREE.Color(0x647896), color2: new THREE.Color(0xffffff), cssColor: "rgba(255, 255, 255, 1)", shape: "sphere", audioFreqs: [220, 440, 880], name: "The Acceptance", word: "REAL", lore: "« The endpoint of the slumber. The moment the simulation finally surrenders. »" }
        ];

        let gameState = JSON.parse(localStorage.getItem('glint_save_v10')) || { foundNodes: [], onboardingDone: false };
        const urlParams = new URLSearchParams(window.location.search);
        let isSanctuaryView = urlParams.get('view') === 'sanctuary';

        function pickRandomUnfound() {
            let unfound = ARTIFACTS_DATA.filter(a => !gameState.foundNodes.find(n => n.id === a.id));
            return unfound.length ? unfound[Math.floor(Math.random() * unfound.length)] : null;
        }

        let activeProfile = pickRandomUnfound() || ARTIFACTS_DATA[0];

        // --- 3D ENGINE (HOLO GLASS) ---
        let uiScene, uiCamera, uiRenderer, uiMesh;
        const holoVertex = `varying vec3 vNormal; varying vec3 vPos; void main() { vNormal = normalize(normalMatrix * normal); vec4 mv = modelViewMatrix * vec4(position, 1.0); vPos = -mv.xyz; gl_Position = projectionMatrix * mv; }`;
        const holoFragment = `uniform vec3 color1; uniform vec3 color2; varying vec3 vNormal; varying vec3 vPos; void main() { vec3 view = normalize(vPos); float f = pow(1.0 - max(dot(view, vNormal), 0.0), 3.0); vec3 c = mix(vec3(0.05), mix(color1, color2, vNormal.y*0.5+0.5), f*1.5); gl_FragColor = vec4(c + vec3(1.0)*f*0.8, 0.9); }`;

        function initUI3D() {
            uiRenderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            uiRenderer.setSize(250, 250); uiRenderer.setPixelRatio(window.devicePixelRatio);
            uiScene = new THREE.Scene(); uiCamera = new THREE.PerspectiveCamera(45, 1, 0.01, 10); uiCamera.position.z = 0.35;
            const mat = new THREE.ShaderMaterial({ uniforms: { color1: { value: new THREE.Color() }, color2: { value: new THREE.Color() } }, vertexShader: holoVertex, fragmentShader: holoFragment, transparent: true, blending: THREE.AdditiveBlending });
            uiMesh = new THREE.Mesh(new THREE.BufferGeometry(), mat); uiScene.add(uiMesh);
            uiRenderer.setAnimationLoop(() => { uiMesh.rotation.y += 0.01; uiMesh.rotation.x += 0.005; uiRenderer.render(uiScene, uiCamera); });
        }

        function getGeometry(shape) {
            const s = 0.08;
            if (shape === 'tetrahedron') return new THREE.TetrahedronGeometry(s);
            if (shape === 'box') return new THREE.BoxGeometry(s, s, s);
            if (shape === 'cone') return new THREE.ConeGeometry(s, s * 1.5, 8);
            if (shape === 'icosahedron') return new THREE.IcosahedronGeometry(s);
            if (shape === 'cylinder') return new THREE.CylinderGeometry(s * 0.6, s * 0.6, s * 1.2, 8);
            if (shape === 'sphere') return new THREE.IcosahedronGeometry(s, 3);
            return new THREE.OctahedronGeometry(s);
        }

        function attachUI3D(id, profile) {
            const container = document.getElementById(id); container.innerHTML = ''; container.appendChild(uiRenderer.domElement);
            uiMesh.geometry.dispose(); uiMesh.geometry = getGeometry(profile.shape);
            uiMesh.material.uniforms.color1.value.copy(profile.color1); uiMesh.material.uniforms.color2.value.copy(profile.color2);
        }

        // --- SANCTUARY CAROUSEL ---
        function buildSanctuary() {
            const list = document.getElementById('sanctuary-list'); list.innerHTML = '';
            ARTIFACTS_DATA.forEach((profile, i) => {
                const found = gameState.foundNodes.find(n => n.id === profile.id);
                const slot = document.createElement('div');
                slot.className = `fragment-slot ${found ? 'found clickable-slot' : ''}`;
                slot.innerHTML = found ? `<div class="card-blob" style="background:radial-gradient(circle, ${profile.cssColor.replace('1)', '0.8)')} 0%, transparent 70%)"></div>` : '';
                slot.innerHTML += `
                    <div class="slot-content">
                        <div class="slot-title">SHARD ${i + 1}</div>
                        <div class="slot-name">${found ? profile.name : 'Vanished memory'}</div>
                        <div class="slot-word" style="color:${profile.cssColor}">${found ? profile.word : ''}</div>
                    </div>
                `;
                slot.onclick = () => {
                    if (!slot.classList.contains('active-card')) {
                        slot.scrollIntoView({ behavior: 'smooth', inline: 'center' });
                    } else if (found) {
                        playUISound('click');
                        document.getElementById('review-art-name').innerText = profile.name;
                        document.getElementById('review-art-lore').innerText = profile.lore;
                        document.getElementById('review-word').innerText = `"${profile.word}"`;
                        document.getElementById('review-word').style.color = profile.cssColor;
                        document.getElementById('review-progress').innerText = `${i + 1}/7`;
                        document.getElementById('review-gps').innerText = `${found.lat.toFixed(3)}, ${found.lon.toFixed(3)}`;
                        attachUI3D('review-3d-container', profile);
                        document.getElementById('review-ui').style.display = 'flex';
                    }
                };
                list.appendChild(slot);
            });

            const slots = list.querySelectorAll('.fragment-slot');
            function updateCoverflow() {
                const center = list.scrollLeft + list.clientWidth / 2;
                slots.forEach(slot => {
                    const slotCenter = slot.offsetLeft + slot.offsetWidth / 2;
                    const dist = (slotCenter - center) / slot.offsetWidth;
                    const absDist = Math.abs(dist);

                    const scale = 1 - (Math.pow(absDist, 1.5) * 0.2);
                    const overlap = dist * -130;
                    const rotY = dist * -35;
                    const rotX = absDist * -5;
                    const opac = Math.max(1 - absDist * 0.6, 0.2);
                    const z = Math.floor(100 - absDist * 50);

                    slot.style.transform = `perspective(1200px) translateX(${overlap}px) scale(${Math.max(scale, 0.7)}) rotateY(${rotY}deg) rotateX(${rotX}deg)`;
                    slot.style.zIndex = z;
                    slot.style.opacity = opac;

                    if (absDist < 0.25) {
                        if (!slot.classList.contains('active-card')) {
                            slot.classList.add('active-card');
                            if (navigator.vibrate) navigator.vibrate(2);
                        }
                    } else slot.classList.remove('active-card');
                });
            }
            list.onscroll = updateCoverflow;
            setTimeout(updateCoverflow, 100);

            // Map Logic (V5 Style)
            if (gameState.foundNodes.length > 0) {
                const mapEl = document.getElementById('memory-map'); mapEl.style.display = 'block';
                if (!mapInstance) {
                    mapInstance = L.map('memory-map', { zoomControl: false, attributionControl: false }).setView([gameState.foundNodes[0].lat, gameState.foundNodes[0].lon], 15);
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(mapInstance);
                }
                mapInstance.invalidateSize();
                let pts = [];
                gameState.foundNodes.forEach(n => {
                    const p = ARTIFACTS_DATA[n.id]; pts.push([n.lat, n.lon]);
                    const icon = L.divIcon({ className: 'pulsing-node', html: `<div class="artifact-core" style="background:${p.cssColor}"></div><div class="artifact-halo" style="background:${p.cssColor}"></div>` });
                    L.marker([n.lat, n.lon], { icon }).addTo(mapInstance);
                });
                if (pts.length > 1) L.polyline(pts, { color: 'rgba(255,215,0,0.4)', weight: 3 }).addTo(mapInstance);
            }
        }

        // --- NAVIGATION & CORE ---
        let mapInstance = null;
        const navigate = (url) => { document.getElementById('transition-veil').style.opacity = '1'; setTimeout(() => window.location.href = url, 1000); };

        document.getElementById('btn-back-radar').onclick = () => navigate(window.location.pathname);
        document.getElementById('btn-inventory').onclick = () => navigate(window.location.pathname + '?view=sanctuary');
        document.getElementById('btn-continue').onclick = () => navigate(window.location.pathname);
        document.getElementById('btn-close-review').onclick = () => document.getElementById('review-ui').style.display = 'none';
        document.getElementById('btn-reset').onclick = () => { localStorage.removeItem('glint_save_v10'); navigate(window.location.pathname); };

        window.onload = () => {
            document.getElementById('transition-veil').style.opacity = '0';
            initUI3D();
            if (isSanctuaryView) {
                document.getElementById('sanctuary-ui').style.display = 'flex';
                if (gameState.foundNodes.length >= 7) document.getElementById('btn-reset').style.display = 'block';
                buildSanctuary();
            } else if (gameState.foundNodes.length < 7) {
                runOnboarding();
            } else {
                navigate(window.location.pathname + '?view=sanctuary');
            }
        };

        // --- ONBOARDING ENGINE ---
        async function runOnboarding() {
            const ui = document.getElementById('onboarding-ui'); ui.style.display = 'flex';
            const txt = document.getElementById('ob-text'); const btn = document.getElementById('ob-btn');
            const sleep = (ms) => new Promise(r => setTimeout(r, ms));
            const show = async (t, bLabel, onClick) => {
                txt.style.opacity = 0; await sleep(500); txt.innerText = t; txt.style.opacity = 1;
                if (bLabel) { btn.innerText = bLabel; btn.style.display = 'block'; await sleep(500); btn.style.opacity = 1; btn.onclick = onClick; }
            };

            if (gameState.onboardingDone) {
                await show("The wandering is not over.", "RESUME WANDERING", () => startRadar(true));
            } else {
                await show("Listen. The world has grown silent."); await sleep(3000);
                await show("A collective illusion.\nThe Great Slumber."); await sleep(3000);
                await show("To guide you, I must anchor your presence to the waking world.", "DROP THE ANCHOR", () => {
                    playUISound('click'); btn.style.opacity = 0;
                    navigator.geolocation.getCurrentPosition(pos => {
                        startGPS(pos);
                        show("The memories have crystallized.\nMake this screen your Lens.", "OPEN THE LENS", () => startRadar(false));
                    });
                });
            }
        }

        // --- RADAR & GPS ENGINE ---
        let target = null, userPos = null, radarRenderer, shaderMat, videoTex;
        const startGPS = (pos) => {
            userPos = { lat: pos.coords.latitude, lon: pos.coords.longitude };
            const R = 6371000; const d = 15; const a = Math.random() * Math.PI * 2;
            target = {
                lat: userPos.lat + (d * Math.cos(a) / R) * (180 / Math.PI),
                lon: userPos.lon + (d * Math.sin(a) / (R * Math.cos(userPos.lat * Math.PI / 180))) * (180 / Math.PI)
            };
            navigator.geolocation.watchPosition(p => {
                userPos = { lat: p.coords.latitude, lon: p.coords.longitude };
                updateRadarUI();
            }, null, { enableHighAccuracy: true });
        };

        async function startRadar(resume) {
            playUISound('action');
            document.getElementById('onboarding-ui').style.opacity = 0;
            setTimeout(() => document.getElementById('onboarding-ui').style.display = 'none', 1000);
            document.getElementById('radar-ui').style.opacity = 1;

            if (resume) navigator.geolocation.getCurrentPosition(startGPS);

            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            const vid = document.createElement('video'); vid.setAttribute('playsinline', ''); vid.setAttribute('autoplay', ''); vid.setAttribute('muted', '');
            vid.srcObject = stream; vid.play();

            radarRenderer = new THREE.WebGLRenderer(); radarRenderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('threejs-radar-container').appendChild(radarRenderer.domElement);
            videoTex = new THREE.VideoTexture(vid);

            const pb1 = document.getElementById('panel-blob1'); const pb2 = document.getElementById('panel-blob2');
            pb1.style.background = activeProfile.cssColor; pb2.style.background = activeProfile.cssColor;

            shaderMat = new THREE.ShaderMaterial({
                uniforms: { tDiffuse: { value: videoTex }, intensity: { value: 0 }, time: { value: 0 } },
                vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = vec4(position, 1.0); }`,
                fragmentShader: `uniform sampler2D tDiffuse; uniform float intensity; uniform float time; varying vec2 vUv;
                    void main() {
                        vec2 uv = vUv + vec2(sin(vUv.y*20.0+time)*0.01, 0.0)*intensity;
                        vec3 c = texture2D(tDiffuse, uv).rgb;
                        gl_FragColor = vec4(mix(c, c*vec3(1.2,0.8,1.2), intensity), 1.0);
                    }`
            });
            const scene = new THREE.Scene(); scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), shaderMat));
            const clock = new THREE.Clock();
            radarRenderer.setAnimationLoop(() => { shaderMat.uniforms.time.value = clock.getElapsedTime(); radarRenderer.render(scene, new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1)); });

            gameState.onboardingDone = true;
            localStorage.setItem('glint_save_v10', JSON.stringify(gameState));
            initXR();
        }

        function updateRadarUI() {
            if (!target || !userPos) return;
            const dist = calcDist(userPos.lat, userPos.lon, target.lat, target.lon);
            document.getElementById('distance-display').innerText = Math.round(dist) + "m";
            shaderMat.uniforms.intensity.value = dist < 15 ? 1 - (dist / 15) : 0;
            if (dist < 5) {
                document.getElementById('status-display').innerText = "MEMORY SURFACING...";
                document.getElementById('ar-container').style.display = 'block';
            } else {
                document.getElementById('status-display').innerText = "FOLLOW THE ECHO...";
            }
        }

        function calcDist(lat1, lon1, lat2, lon2) {
            const R = 6371e3; const p1 = lat1 * Math.PI / 180; const p2 = lat2 * Math.PI / 180;
            const dp = (lat2 - lat1) * Math.PI / 180; const dl = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dp / 2) ** 2 + Math.cos(p1) * Math.cos(p2) * Math.sin(dl / 2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        // --- WEBXR ENGINE (RESTORED HOT/COLD LOGIC) ---
        let xrScene, xrCamera, xrRenderer, xrReticle, hitSource = null;
        let isTargetSpawned = false, hiddenTarget = new THREE.Vector3(), canExtract = false, xrState = 'search';

        function initXR() {
            xrScene = new THREE.Scene(); xrCamera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);
            xrRenderer = new THREE.WebGLRenderer({ antialias: true, alpha: true }); xrRenderer.xr.enabled = true;
            const btn = ARButton.createButton(xrRenderer, { requiredFeatures: ['hit-test'] });
            document.getElementById('ar-container').appendChild(btn);

            xrReticle = new THREE.Mesh(new THREE.RingGeometry(0.08, 0.1, 32).rotateX(-Math.PI / 2), new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 }));
            xrReticle.visible = false; xrReticle.matrixAutoUpdate = false; xrScene.add(xrReticle);

            const crystal = new THREE.Mesh(getGeometry(activeProfile.shape), new THREE.ShaderMaterial({
                uniforms: { color1: { value: activeProfile.color1 }, color2: { value: activeProfile.color2 } },
                vertexShader: holoVertex, fragmentShader: holoFragment, transparent: true
            }));

            xrRenderer.xr.getController(0).addEventListener('select', () => {
                if (xrState === 'search' && xrReticle.visible && canExtract) {
                    crystal.position.setFromMatrixPosition(xrReticle.matrix);
                    xrScene.add(crystal);
                    xrState = 'revealed'; xrReticle.visible = false;
                    document.getElementById('xr-ui').innerText = "Reach out to assimilate the shard.";
                    document.getElementById('glow-left').style.opacity = '0'; document.getElementById('glow-right').style.opacity = '0';
                    if (navigator.vibrate) navigator.vibrate([50, 50, 50]);
                } else if (xrState === 'revealed') {
                    // Logic simplifiée pour extraire l'objet une fois apparu
                    document.getElementById('flash-overlay').style.opacity = 1;
                    setTimeout(() => {
                        gameState.foundNodes.push({ id: activeProfile.id, lat: userPos.lat, lon: userPos.lon });
                        localStorage.setItem('glint_save_v10', JSON.stringify(gameState));
                        document.documentElement.style.setProperty('--accent-pure', activeProfile.cssColor);
                        document.getElementById('ui-art-name').innerText = activeProfile.name;
                        document.getElementById('ui-art-lore').innerText = activeProfile.lore;
                        document.getElementById('ui-word').innerText = activeProfile.word;
                        document.getElementById('ui-word').style.color = activeProfile.cssColor;
                        document.getElementById('ui-progress').innerText = gameState.foundNodes.length + "/7";
                        attachUI3D('ui-3d-container', activeProfile);
                        document.getElementById('artifact-ui').style.display = 'flex';
                        playUISound('success');
                        xrRenderer.xr.getSession().end();
                    }, 600);
                }
            });

            // HOT / COLD LOGIC RESTORED
            xrRenderer.setAnimationLoop((timestamp, frame) => {
                if (frame) {
                    const session = xrRenderer.xr.getSession();
                    const refSpace = xrRenderer.xr.getReferenceSpace();
                    if (!hitSource) session.requestReferenceSpace('viewer').then(ref => session.requestHitTestSource({ space: ref }).then(s => hitSource = s));

                    if (hitSource && xrState === 'search') {
                        const results = frame.getHitTestResults(hitSource);
                        if (results.length) {
                            xrReticle.visible = true;
                            xrReticle.matrix.fromArray(results[0].getPose(refSpace).transform.matrix);

                            if (!isTargetSpawned) {
                                let pos = new THREE.Vector3().setFromMatrixPosition(xrReticle.matrix);
                                hiddenTarget.x = pos.x + (Math.random() > 0.5 ? 1 : -1) * (0.5 + Math.random());
                                hiddenTarget.y = pos.y;
                                hiddenTarget.z = pos.z + (Math.random() > 0.5 ? 1 : -1) * (0.5 + Math.random());
                                isTargetSpawned = true;
                            }

                            if (isTargetSpawned) {
                                let curr = new THREE.Vector3().setFromMatrixPosition(xrReticle.matrix);
                                let dist = Math.sqrt(Math.pow(curr.x - hiddenTarget.x, 2) + Math.pow(curr.z - hiddenTarget.z, 2));

                                let projVec = hiddenTarget.clone().project(xrCamera);
                                let isBehind = projVec.z > 1;
                                let glowColor = activeProfile.cssColor.replace('1)', '0.4)');

                                if (projVec.x < -0.8 || (isBehind && projVec.x > 0)) {
                                    document.getElementById('glow-left').style.opacity = '1'; document.getElementById('glow-right').style.opacity = '0';
                                    document.getElementById('glow-left').style.background = `linear-gradient(to right, ${glowColor}, transparent)`;
                                } else if (projVec.x > 0.8 || (isBehind && projVec.x < 0)) {
                                    document.getElementById('glow-left').style.opacity = '0'; document.getElementById('glow-right').style.opacity = '1';
                                    document.getElementById('glow-right').style.background = `linear-gradient(to left, ${glowColor}, transparent)`;
                                } else {
                                    document.getElementById('glow-left').style.opacity = '0'; document.getElementById('glow-right').style.opacity = '0';
                                }

                                if (dist < 0.4) {
                                    let fastPulse = 1.0 + Math.sin(timestamp * 0.01) * 0.3;
                                    xrReticle.material.color.setHex(activeProfile.colorHex);
                                    xrReticle.material.opacity = 0.9; xrReticle.scale.set(fastPulse * 1.5, fastPulse * 1.5, 1);
                                    document.getElementById('xr-ui').innerText = "The source is pure. Touch it.";
                                    document.getElementById('xr-ui').style.color = activeProfile.cssColor;
                                    canExtract = true;
                                }
                                else if (dist < 1.2) {
                                    let midPulse = 1.0 + Math.sin(timestamp * 0.006) * 0.15;
                                    xrReticle.material.color.setHex(0xb19cd9); xrReticle.material.opacity = 0.7; xrReticle.scale.set(midPulse * 1.2, midPulse * 1.2, 1);
                                    document.getElementById('xr-ui').innerText = "The resonance is fading..."; document.getElementById('xr-ui').style.color = "#b19cd9";
                                    canExtract = false;
                                }
                                else {
                                    let slowPulse = 1.0 + Math.sin(timestamp * 0.003) * 0.05;
                                    xrReticle.material.color.setHex(0xff6b6b); xrReticle.material.opacity = 0.4; xrReticle.scale.set(slowPulse, slowPulse, 1);
                                    document.getElementById('xr-ui').innerText = "The echo is distorted..."; document.getElementById('xr-ui').style.color = "#ff6b6b";
                                    canExtract = false;
                                }
                            }
                        } else {
                            xrReticle.visible = false;
                            document.getElementById('xr-ui').innerText = "Seek the resonance around you...";
                            document.getElementById('xr-ui').style.color = "var(--text-title)";
                            document.getElementById('glow-left').style.opacity = '0'; document.getElementById('glow-right').style.opacity = '0';
                        }
                    }
                }
                if (xrState === 'revealed') {
                    crystal.position.y += Math.sin(timestamp * 0.002) * 0.0005;
                    crystal.rotation.y += 0.01; crystal.rotation.x += 0.005;
                }
                xrRenderer.render(xrScene, xrCamera);
            });
        }
    </script>
</body>

</html>
