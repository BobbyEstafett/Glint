<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GLINT - Alpha (Fix AR & UI)</title>
    <style>
        :root {
            --bg-color: #e0e5ec;
            --glass-bg: rgba(224, 229, 236, 0.8);
            --text-main: #4a5568;
            --text-light: #a0aec0;
            --accent-hot: #7f9cf5;  
            --accent-cold: #fc8181; 
            --shadow-light: #ffffff;
            --shadow-dark: #a3b1c6;
        }

        body { 
            margin: 0; padding: 0; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden; height: 100vh; width: 100vw;
        }

        /* --- BACKGROUND AR/VIDEO --- */
        #threejs-radar-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
        }

        /* --- UI RADAR (PHASE 1) --- */
        #radar-interface {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: space-between; padding: 40px 20px; box-sizing: border-box;
            z-index: 10; pointer-events: none;
        }

        .header-panel {
            align-self: center; background: var(--glass-bg); backdrop-filter: blur(10px);
            padding: 15px 30px; border-radius: 25px; pointer-events: auto;
            box-shadow: 6px 6px 15px var(--shadow-dark), -6px -6px 15px var(--shadow-light);
            text-align: center;
        }

        .footer-panel {
            width: 100%; max-width: 400px; align-self: center;
            display: flex; flex-direction: column; gap: 15px; pointer-events: auto;
            padding-bottom: env(safe-area-inset-bottom, 20px);
        }

        /* --- UI AR (PHASE 2) --- */
        #xr-hud {
            position: absolute; top: 20%; left: 0; width: 100%;
            display: none; justify-content: center; z-index: 100; pointer-events: none;
        }
        .xr-pill {
            background: white; padding: 10px 25px; border-radius: 50px;
            font-size: 0.75rem; font-weight: 800; letter-spacing: 1px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1); color: var(--text-main);
        }

        /* --- BOUTONS NEUMORPHIQUES --- */
        button {
            padding: 20px; border-radius: 50px; border: none;
            background: var(--bg-color); color: var(--text-main);
            font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 8px 8px 16px var(--shadow-dark), -8px -8px 16px var(--shadow-light);
            transition: all 0.3s ease; width: 100%;
        }
        button:active { box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light); }

        #ARButton { 
            width: 100% !important; position: static !important; 
            background: var(--bg-color) !important; color: var(--accent-cold) !important;
            border-radius: 50px !important; box-shadow: 8px 8px 16px var(--shadow-dark) !important;
            font-family: inherit !important; font-weight: 800 !important;
        }
        .pulse-btn { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { background: #fff; } }

        /* --- FICHE ARTEFACT (TOP LAYER) --- */
        #artifact-ui {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(224, 229, 236, 0.95); z-index: 9999;
            display: none; align-items: center; justify-content: center; backdrop-filter: blur(15px);
        }
        .card {
            background: var(--bg-color); padding: 40px 30px; border-radius: 35px;
            width: 85%; max-width: 350px; text-align: center;
            box-shadow: 20px 20px 40px var(--shadow-dark), -20px -20px 40px var(--shadow-light);
        }

        /* --- SANCTUAIRE --- */
        #sanctuary-ui {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg-color);
            z-index: 10000; display: none; flex-direction: column; padding: 40px 20px;
        }
        .sanc-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; min-height: 0; padding: 10px; }
        .slot { background: var(--bg-color); padding: 20px; border-radius: 20px; box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light); }
        .slot.found { box-shadow: 6px 6px 12px var(--shadow-dark), -6px -6px 12px var(--shadow-light); }

        #flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 99999; opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div id="flash"></div>
    <div id="threejs-radar-container"></div>

    <div id="radar-interface">
        <header class="header-panel">
            <div style="font-size:0.7rem; font-weight:900; letter-spacing:3px; opacity:0.5; margin-bottom:5px;">GLINT SCANNER</div>
            <div id="distance-display">---</div>
        </header>

        <footer class="footer-panel">
            <div id="status-text" style="text-align:center; font-size:0.7rem; font-weight:700; opacity:0.4; margin-bottom:5px;">READY_TO_INITIALIZE</div>
            <button id="start-btn">Activer le flux</button>
            <div id="ar-btn-wrapper" style="display:none; width:100%;"></div>
        </footer>
    </div>

    <div id="xr-hud">
        <div class="xr-pill" id="xr-msg">Scan de la surface...</div>
    </div>

    <div id="artifact-ui">
        <div class="card">
            <h2 id="ui-art-name" style="margin-top:0;">ARTEFACT</h2>
            <p id="ui-art-lore" style="font-style:italic; color:var(--text-light); font-size:0.85rem; margin-bottom:30px;"></p>
            <div style="padding: 20px; background: var(--bg-color); border-radius: 20px; box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);">
                <p style="font-size:0.6rem; margin:0; opacity:0.5;">MOT DÉCRYPTÉ</p>
                <p id="ui-word" style="font-weight:900; font-size:1.6rem; color:var(--accent-hot); margin:5px 0 0 0;">---</p>
            </div>
            <button id="btn-inventory" style="margin-top:30px;">Archive</button>
            <button id="btn-continue" style="box-shadow:none; font-size:0.7rem; opacity:0.4;">Poursuivre</button>
        </div>
    </div>

    <div id="sanctuary-ui">
        <h2 style="text-align:center; letter-spacing:4px; font-weight:900;">ARCHIVE</h2>
        <div class="sanc-list" id="sanc-list"></div>
        <button id="btn-back-radar">Scanner</button>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/addons/webxr/ARButton.js';

        const ARTIFACTS_DATA = [
            { name: "ÉCLAT MNÉMONIQUE", word: "NOUS", lore: "Une résonance cristallisée d'un futur oublié." },
            { name: "SOUVENIR LIQUIDE", word: "AVONS", lore: "Une larme digitale figée dans le flux du réseau." },
            { name: "FRAGMENT D'ÉCHO", word: "OUBLIÉ", lore: "Le silence entre deux paquets de données." },
            { name: "VECTEUR D'INTENTION", word: "COMMENT", lore: "Une direction sans but, gravée dans l'obsidienne." },
            { name: "NOYAU D'EXISTENCE", word: "ÊTRE", lore: "La pulsation primordiale du code source." },
            { name: "PRISME DE VÉRITÉ", word: "RÉELS", lore: "La lumière se courbe là où la donnée devient chair." },
            { name: "CLEF D'ANCRAGE", word: "...", lore: "Le point final de la fuite." }
        ];

        const params = new URLSearchParams(window.location.search);
        let foundCount = parseInt(params.get('fragment')) || 0;
        let isSanctuary = params.get('view') === 'sanctuary';

        if(isSanctuary) {
            document.getElementById('radar-interface').style.display = 'none';
            document.getElementById('sanctuary-ui').style.display = 'flex';
            const list = document.getElementById('sanc-list');
            ARTIFACTS_DATA.forEach((d, i) => {
                const div = document.createElement('div');
                div.className = `slot ${i < foundCount ? 'found' : ''}`;
                div.innerHTML = `<div style="font-weight:700;">${i < foundCount ? d.name : 'Corrompu'}</div>
                                 <div style="color:var(--accent-hot); text-align:right; font-weight:900;">${i < foundCount ? d.word : '???'}</div>`;
                list.appendChild(div);
            });
        }

        document.getElementById('btn-back-radar').addEventListener('click', () => {
            window.location.href = window.location.pathname + '?fragment=' + foundCount;
        });

        if(!isSanctuary) {
            let targetLat, targetLon, dist = 999;
            let radarRenderer, radarScene, radarCamera, shaderMat, videoTex, clock = new THREE.Clock();
            let renderer, scene, camera, controller, reticle, hitSource, spawnedArt;
            const raycaster = new THREE.Raycaster();
            let state = 'radar';

            document.getElementById('start-btn').addEventListener('click', async () => {
                document.getElementById('start-btn').style.display = 'none';
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(pos => {
                        targetLat = pos.coords.latitude + 0.00002;
                        targetLon = pos.coords.longitude + 0.00002;
                        navigator.geolocation.watchPosition(p => {
                            const R = 6371e3;
                            const dLat = (targetLat-p.coords.latitude)*Math.PI/180;
                            const dLon = (targetLon-p.coords.longitude)*Math.PI/180;
                            const a = Math.sin(dLat/2)**2 + Math.cos(p.coords.latitude*Math.PI/180)*Math.cos(targetLat*Math.PI/180)*Math.sin(dLon/2)**2;
                            dist = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                            document.getElementById('distance-display').innerText = `${Math.round(dist)}m`;
                            if(dist < 5 && state === 'radar') {
                                document.getElementById('ar-btn-wrapper').style.display = 'block';
                                document.getElementById('status-text').innerText = "BREACH_FOUND";
                                const ab = document.getElementById('ARButton');
                                if(ab) ab.classList.add('pulse-btn');
                            }
                            if(shaderMat) shaderMat.uniforms.intensity.value = Math.max(0, 1-(dist/12));
                        }, null, {enableHighAccuracy:true});
                    });
                }
                const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
                initRadar(stream);
            });

            function initRadar(stream) {
                const container = document.getElementById('threejs-radar-container');
                radarRenderer = new THREE.WebGLRenderer({antialias:true});
                radarRenderer.setSize(window.innerWidth, window.innerHeight);
                container.appendChild(radarRenderer.domElement);
                radarScene = new THREE.Scene();
                radarCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
                const video = document.createElement('video'); video.srcObject = stream; video.play();
                videoTex = new THREE.VideoTexture(video);
                shaderMat = new THREE.ShaderMaterial({
                    uniforms: { tDiffuse:{value:videoTex}, intensity:{value:0}, time:{value:0} },
                    vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position=vec4(position,1.0); }`,
                    fragmentShader: `
                        uniform sampler2D tDiffuse; uniform float intensity; uniform float time; varying vec2 vUv;
                        void main(){
                            vec2 uv = vUv;
                            uv.x += sin(time*8.0 + uv.y*40.0) * 0.002 * intensity;
                            vec4 c = texture2D(tDiffuse, uv);
                            float lum = dot(c.rgb, vec3(0.299, 0.587, 0.114));
                            vec3 col = mix(vec3(lum + 0.35), c.rgb, 0.4);
                            float ab = 0.012 * intensity;
                            col.r += texture2D(tDiffuse, uv + vec2(ab, 0.0)).r * intensity * 0.3;
                            col.b += texture2D(tDiffuse, uv - vec2(ab, 0.0)).b * intensity * 0.5;
                            gl_FragColor = vec4(col, 1.0);
                        }
                    `
                });
                radarScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2), shaderMat));
                initXR();
                function anim(){
                    if(state === 'radar'){
                        requestAnimationFrame(anim);
                        shaderMat.uniforms.time.value = clock.getElapsedTime();
                        radarRenderer.render(radarScene, radarCamera);
                    }
                }
                anim();
            }

            function initXR() {
                renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
                renderer.setPixelRatio(window.devicePixelRatio);
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.xr.enabled = true;
                
                const btn = ARButton.createButton(renderer, { requiredFeatures: ['hit-test'], optionalFeatures: ['dom-overlay'], domOverlay: { root: document.body } });
                document.getElementById('ar-btn-wrapper').appendChild(btn);

                scene = new THREE.Scene();
                camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.01, 20);
                scene.add(new THREE.HemisphereLight(0xffffff, 0xd0d9e6, 3));

                renderer.xr.addEventListener('sessionstart', () => {
                    state = 'ar';
                    // NETTOYAGE UI RADAR
                    document.getElementById('radar-interface').style.display = 'none';
                    document.getElementById('xr-hud').style.display = 'flex';
                });

                const group = new THREE.Group();
                const core = new THREE.Mesh(new THREE.IcosahedronGeometry(0.08, 0), new THREE.MeshStandardMaterial({color: 0xffffff, emissive: 0x7f9cf5, emissiveIntensity: 10, metalness: 1, roughness: 0}));
                const ring = new THREE.Mesh(new THREE.TorusGeometry(0.12, 0.002, 8, 100), new THREE.MeshBasicMaterial({color: 0x7f9cf5, transparent:true, opacity:0.5}));
                group.add(core, ring);

                reticle = new THREE.Mesh(new THREE.RingGeometry(0.07, 0.09, 32).rotateX(-Math.PI/2), new THREE.MeshBasicMaterial());
                reticle.matrixAutoUpdate = false; reticle.visible = false;
                scene.add(reticle);

                controller = renderer.xr.getController(0);
                controller.addEventListener('select', () => {
                    if (!reticle.visible) return;
                    if (!spawnedArt) {
                        spawnedArt = group.clone();
                        reticle.matrix.decompose(spawnedArt.position, spawnedArt.quaternion, spawnedArt.scale);
                        scene.add(spawnedArt);
                        document.getElementById('xr-msg').innerText = "RÉSONANCE STABLE - TOUCHER";
                    } else {
                        const m = new THREE.Matrix4().identity().extractRotation(controller.matrixWorld);
                        raycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
                        raycaster.ray.direction.set(0,0,-1).applyMatrix4(m);
                        if(raycaster.intersectObject(spawnedArt, true).length > 0) {
                            const d = ARTIFACTS_DATA[foundCount % 7];
                            document.getElementById('ui-art-name').innerText = d.name;
                            document.getElementById('ui-art-lore').innerText = d.lore;
                            document.getElementById('ui-word').innerText = d.word;
                            document.getElementById('ui-progress').innerText = `${(foundCount%7)+1} / 7`;
                            document.getElementById('artifact-ui').style.display = 'flex';
                        }
                    }
                });
                scene.add(controller);

                renderer.setAnimationLoop((t, frame) => {
                    if (frame && state === 'ar') {
                        const refSpace = renderer.xr.getReferenceSpace();
                        const session = renderer.xr.getSession();
                        if (!hitSource) {
                            session.requestReferenceSpace('viewer').then(s => { session.requestHitTestSource({space:s}).then(src => hitSource = src); });
                        } else {
                            const results = frame.getHitTestResults(hitSource);
                            if (results.length > 0) {
                                reticle.visible = true;
                                reticle.matrix.fromArray(results[0].getPose(refSpace).transform.matrix);
                                const distToTarget = reticle.position.distanceTo(new THREE.Vector3(0,0,-1));
                                if(distToTarget < 0.4) {
                                    reticle.material.color.setHex(0x7f9cf5);
                                    document.getElementById('xr-msg').innerText = "FAILLE DÉTECTÉE";
                                } else {
                                    reticle.material.color.setHex(0xfc8181);
                                    document.getElementById('xr-msg').innerText = "SCANNING...";
                                }
                            } else { reticle.visible = false; }
                        }
                    }
                    if(spawnedArt) spawnedArt.rotation.y += 0.02;
                    renderer.render(scene, camera);
                });
            }

            document.getElementById('btn-continue').addEventListener('click', () => { window.location.href = window.location.pathname + '?fragment=' + (foundCount + 1); });
            document.getElementById('btn-inventory').addEventListener('click', () => { window.location.href = window.location.pathname + '?fragment=' + (foundCount + 1) + '&view=sanctuary'; });
        }
    </script>
</body>
</html>
