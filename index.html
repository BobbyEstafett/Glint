<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GLINT - Oneiric Wandering</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <style>
        :root {
            --bg-night: #0b0d14;
            --glass-bg: rgba(20, 25, 40, 0.45);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-title: #ffffff;
            --text-body: rgba(255, 255, 255, 0.8);
            --accent-pure: #8be9fd;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-night);
            color: var(--text-body);
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            -webkit-font-smoothing: antialiased;
        }

        /* GRAIN GLOBAL DE FOND */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.15'/%3E%3C/svg%3E");
            mix-blend-mode: overlay;
            z-index: 9999;
            pointer-events: none;
        }

        h1,
        h2,
        h3,
        .serif {
            font-family: 'Playfair Display', serif;
            color: var(--text-title);
            font-weight: normal;
            text-wrap: balance;
        }

        #transition-veil {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: var(--bg-night);
            z-index: 999999;
            opacity: 1;
            transition: opacity 1.2s ease-in-out;
            pointer-events: none;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
        }

        #threejs-radar-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #dream-veil {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, transparent 0%, rgba(11, 13, 20, 0.8) 100%);
            pointer-events: none;
            z-index: 2;
        }

        .edge-glow {
            position: absolute;
            top: 0;
            width: 80px;
            height: 100vh;
            pointer-events: none;
            z-index: 90;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        #glow-left {
            left: 0;
        }

        #glow-right {
            right: 0;
        }

        #radar-ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 80px;
            box-sizing: border-box;
            z-index: 10;
            pointer-events: none;
        }

        .info-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 30px 20px;
            text-align: center;
            width: 85%;
            max-width: 350px;
            height: 300px;
            pointer-events: auto;
            box-sizing: border-box;
            transition: box-shadow 1s ease;
        }

        .info-top {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100px;
            width: 100%;
        }

        .info-mid {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            width: 100%;
        }

        .info-bottom {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            height: 20px;
            width: 100%;
        }

        .main-title {
            font-size: 1.5rem;
            letter-spacing: 2px;
            margin: 0 0 10px 0;
            line-height: 1;
        }

        #distance-display {
            font-size: 2rem;
            font-weight: 200;
            margin: 0;
            color: var(--text-title);
            line-height: 1;
            display: flex;
            align-items: center;
        }

        #status-display {
            font-weight: 200;
            font-size: 0.8rem;
            margin: 0;
            line-height: 1.2;
            text-wrap: balance;
            height: 2em;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .data-stream {
            font-size: 0.65rem;
            color: var(--text-body);
            margin: 0;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.6;
            line-height: 1;
        }

        button {
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            margin: 0;
            height: 55px;
            width: 100%;
            box-sizing: border-box;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-title);
            font-family: 'Montserrat', sans-serif;
            font-weight: 400;
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: all 0.4s ease;
            line-height: 1;
        }

        button:active {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(0.98);
        }

        #recalc-btn {
            display: none;
            font-size: 0.65rem;
            border: none;
            opacity: 0.5;
            height: 40px;
            background: transparent;
            margin-top: 15px;
        }

        #ar-container {
            width: 100%;
            display: none;
        }

        #ARButton {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid var(--accent-pure) !important;
            color: var(--accent-pure) !important;
            font-family: 'Montserrat', sans-serif !important;
            font-weight: 600 !important;
            letter-spacing: 2px !important;
            position: relative !important;
            bottom: auto !important;
            left: auto !important;
            transform: none !important;
            width: 100% !important;
            max-width: 100% !important;
            margin: 0 !important;
            height: 55px !important;
            border-radius: 50px !important;
            box-shadow: 0 0 15px var(--accent-pure) !important;
        }

        #xr-ui {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: fit-content;
            z-index: 100;
            pointer-events: none;
            text-align: center;
            display: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 0.8rem;
            letter-spacing: 2px;
            font-weight: 600;
            transition: all 0.4s ease;
        }

        .fade-in-seq {
            opacity: 0;
            animation: fadeInAnim 1.5s ease forwards;
        }

        .delay-1 {
            animation-delay: 0.3s;
        }

        .delay-2 {
            animation-delay: 0.6s;
        }

        .delay-3 {
            animation-delay: 0.9s;
        }

        @keyframes fadeInAnim {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* --- STYLES COMMUNS POUR LA FICHE ARTEFACT (AR ET CARNET) --- */
        .fs-fiche {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-night);
            z-index: 3000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            overflow: hidden;
        }

        /* L'arrière plan "Noisy Moving Gradient" de la fiche */
        .fs-blobs-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .fs-blob {
            position: absolute;
            filter: blur(90px);
            border-radius: 50%;
            opacity: 0.7;
            mix-blend-mode: screen;
            animation: slowDrift 20s ease-in-out infinite alternate;
        }

        @keyframes slowDrift {
            0% {
                transform: translate(0, 0) scale(1);
            }

            50% {
                transform: translate(25vw, -20vh) scale(1.3);
            }

            100% {
                transform: translate(-10vw, 15vh) scale(0.9);
            }
        }

        .fs-content {
            position: relative;
            z-index: 2;
            width: 85%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* L'artefact mouvant au centre de la fiche */
        .fiche-ethereal-blob {
            width: 170px;
            height: 170px;
            margin: 0 auto 35px auto;
            border-radius: 45% 55% 65% 35% / 45% 45% 55% 55%;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.9) 0%, var(--accent-pure) 50%, rgba(0, 0, 0, 0.2) 100%);
            box-shadow: inset 10px 10px 20px rgba(255, 255, 255, 0.6), inset -10px -10px 20px rgba(0, 0, 0, 0.4);
            animation: morphEthereal 10s linear infinite;
        }

        /* Morphing puissant de l'artefact central */
        @keyframes morphEthereal {
            0% {
                border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
                transform: rotate(0deg) scale(1);
            }

            33% {
                border-radius: 70% 30% 50% 50% / 30% 30% 70% 70%;
                transform: rotate(120deg) scale(1.05);
            }

            66% {
                border-radius: 100% 60% 60% 100% / 100% 100% 60% 60%;
                transform: rotate(240deg) scale(0.95);
            }

            100% {
                border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
                transform: rotate(360deg) scale(1);
            }
        }

        /* Typographie Minimaliste */
        .fs-content h2 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 1.4rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 0 0 15px 0;
            color: #fff;
            text-align: center;
        }

        .fs-content .artifact-lore {
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.85);
            text-align: center;
            line-height: 1.6;
            margin-bottom: 25px;
            text-wrap: balance;
        }

        .clean-divider {
            border: none;
            border-top: 1px solid rgba(255, 255, 255, 0.4);
            width: 100%;
            margin: 0 0 20px 0;
        }

        .clean-stats {
            width: 100%;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        .clean-stats p {
            margin: 12px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .clean-stats .lbl {
            opacity: 0.8;
            text-transform: uppercase;
            font-weight: 400;
        }

        .clean-stats .val {
            font-weight: 500;
            color: #fff;
        }

        .clean-stats .val.resonance {
            font-style: italic;
            color: var(--accent-pure);
        }

        .clean-btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 40px;
            width: 100%;
        }

        .clean-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 30px;
            color: #fff;
            height: 50px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            font-weight: 400;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.3s;
        }

        .clean-btn:active {
            background: rgba(255, 255, 255, 0.1);
        }

        /* --- CARNET (SANCTUARY) --- */
        #sanctuary-ui {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #080a11;
            z-index: 5000;
            display: none;
            flex-direction: column;
            padding: 50px 20px 20px 20px;
            box-sizing: border-box;
            overflow: hidden;
        }

        .sanctuary-header {
            text-align: center;
            margin-bottom: 20px;
            flex-shrink: 0;
        }

        .sanctuary-header h2 {
            margin: 0;
            letter-spacing: 6px;
            font-size: 1.8rem;
        }

        .sanctuary-header p {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.75rem;
            font-weight: 200;
            letter-spacing: 2px;
            opacity: 0.6;
            margin-top: 10px;
            text-transform: uppercase;
        }

        #memory-map {
            width: 100%;
            height: 180px;
            border-radius: 15px;
            margin-bottom: 20px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--glass-border);
            z-index: 1;
            flex-shrink: 0;
            display: none;
        }

        .leaflet-control-attribution {
            display: none !important;
        }

        .constellation {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 20px 0;
        }

        .star {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--glass-border);
            margin: 0 4px;
            transition: all 1s;
        }

        .star-link {
            height: 1px;
            width: 12px;
            background: var(--glass-border);
            transition: background 1s;
        }

        .final-revelation {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            text-align: center;
            margin-bottom: 20px;
            font-style: italic;
            animation: fadeInAnim 3s forwards;
            text-wrap: balance;
            color: var(--text-title);
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
        }

        .sanctuary-list {
            flex: 1 1 auto;
            min-height: 0;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
            padding-bottom: 20px;
            scrollbar-width: none;
        }

        .fragment-slot {
            position: relative;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            background: rgba(18, 20, 28, 0.65);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            backdrop-filter: blur(15px);
        }

        .slot-content {
            position: relative;
            z-index: 2;
            padding: 25px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* --- ANIMATION DES BLOBS DANS LES CARTES --- */
        @keyframes morphCardBlob {
            0% {
                border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
                transform: rotate(0deg) scale(1) translate(0, 0);
            }

            33% {
                border-radius: 70% 30% 50% 50% / 30% 30% 70% 70%;
                transform: rotate(120deg) scale(1.3) translate(10%, -10%);
            }

            66% {
                border-radius: 100% 60% 60% 100% / 100% 100% 60% 60%;
                transform: rotate(240deg) scale(0.8) translate(-10%, 15%);
            }

            100% {
                border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
                transform: rotate(360deg) scale(1) translate(0, 0);
            }
        }

        .card-blob {
            position: absolute;
            width: 280px;
            height: 280px;
            filter: blur(45px);
            opacity: 0.8;
            z-index: 0;
            animation: morphCardBlob 12s linear infinite;
            mix-blend-mode: screen;
        }

        .fragment-slot:not(.found) {
            background: rgba(18, 20, 28, 0.3);
            border: 1px dashed rgba(255, 255, 255, 0.05);
        }

        .clickable-slot {
            cursor: pointer;
        }

        .clickable-slot:active {
            transform: scale(0.98);
        }

        .slot-content .slot-title {
            font-size: 0.65rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.5;
        }

        .slot-content .slot-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            opacity: 0.3;
        }

        .fragment-slot.found .slot-name {
            opacity: 1;
            color: var(--text-title);
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .slot-content .slot-word {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.4rem;
            text-align: right;
            opacity: 0;
        }

        .sanctuary-footer {
            flex-shrink: 0;
            margin-top: 10px;
            padding-bottom: env(safe-area-inset-bottom, 10px);
        }

        #btn-back-radar {
            border-color: transparent;
        }

        #btn-reset {
            border-color: transparent;
            opacity: 0.5;
            font-size: 0.6rem;
            margin-top: 10px;
        }

        #flash-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #fff;
            z-index: 8000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease-out;
        }

        #apotheosis-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-night);
            z-index: 9999999;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 2s ease-in-out;
        }

        .apo-word {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 2.8rem;
            letter-spacing: 4px;
            opacity: 0;
            position: absolute;
            text-transform: lowercase;
            transition: opacity 1.5s ease-in-out, transform 3s ease-out;
            transform: scale(0.8);
            text-align: center;
        }

        .apo-word.show {
            opacity: 1;
            transform: scale(1.1);
            text-shadow: 0 0 30px currentColor;
        }

        /* Review UI = Même design que Artifact UI */
        #review-ui {
            z-index: 6000;
        }
    </style>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
</head>

<body>

    <div id="transition-veil"></div>
    <div id="flash-overlay"></div>

    <div id="apotheosis-overlay"></div>

    <div id="review-ui" class="fs-fiche">
        <div class="fs-blobs-container">
            <div id="review-bg-blob1" class="fs-blob b1" style="width: 120vw; height: 120vw; top: -30%; left: -20%;">
            </div>
            <div id="review-bg-blob2" class="fs-blob b2"
                style="width: 100vw; height: 100vw; bottom: -20%; right: -20%;"></div>
        </div>
        <div class="fs-content">
            <div class="fiche-ethereal-blob" id="review-artefact-blob"></div>
            <h2 id="review-art-name">NAME</h2>
            <p id="review-art-lore" class="artifact-lore">LORE</p>
            <hr class="clean-divider">
            <div class="clean-stats">
                <p><span class="lbl">ESSENCE</span> <span class="val" id="review-progress"></span></p>
                <p><span class="lbl">ANCHOR POINT</span> <span class="val" id="review-gps"></span></p>
                <p><span class="lbl">RESONANCE</span> <span class="val resonance" id="review-word">"WORD"</span></p>
            </div>
            <div class="clean-btn-group">
                <button id="btn-close-review" class="clean-btn">CLOSE</button>
            </div>
        </div>
    </div>

    <div id="artifact-ui" class="fs-fiche">
        <div class="fs-blobs-container">
            <div id="ui-bg-blob1" class="fs-blob b1" style="width: 120vw; height: 120vw; top: -30%; left: -20%;"></div>
            <div id="ui-bg-blob2" class="fs-blob b2" style="width: 100vw; height: 100vw; bottom: -20%; right: -20%;">
            </div>
        </div>
        <div class="fs-content">
            <div class="fiche-ethereal-blob fade-in-seq" id="ui-artefact-blob"></div>
            <h2 id="ui-art-name" class="fade-in-seq">MNEMONIC SHARD</h2>
            <p id="ui-art-lore" class="artifact-lore fade-in-seq delay-1"></p>
            <hr class="clean-divider fade-in-seq delay-2">
            <div class="clean-stats fade-in-seq delay-2">
                <p><span class="lbl">ESSENCE</span> <span class="val" id="ui-progress">1 / 7</span></p>
                <p><span class="lbl">ANCHOR POINT</span> <span class="val" id="ui-gps">0.000, 0.000</span></p>
                <p><span class="lbl">RESONANCE</span> <span class="val resonance" id="ui-word">"---"</span></p>
            </div>
            <div class="clean-btn-group fade-in-seq delay-3">
                <button id="btn-inventory" class="clean-btn">OPEN THE JOURNAL</button>
                <button id="btn-continue" class="clean-btn">CONTINUE WANDERING</button>
            </div>
        </div>
    </div>

    <div id="threejs-radar-container"></div>
    <div id="dream-veil"></div>
    <div id="glow-left" class="edge-glow"></div>
    <div id="glow-right" class="edge-glow"></div>

    <div id="radar-ui">
        <div class="info-box glass-panel" id="main-panel">
            <div class="info-top">
                <h1 class="main-title serif" id="main-title">Slumber</h1>
                <p id="distance-display">---</p>

    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/addons/webxr/ARButton.js';

        let audioCtx = null;
        function getAudioCtx() {
            if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
            if (audioCtx.state === 'suspended') { audioCtx.resume(); }
            return audioCtx;
        }

        function playUISound(type) {
            const ctx = getAudioCtx(); const t = ctx.currentTime;
            function sparkle(freq, delay, duration, vol) {
                const osc = ctx.createOscillator(); const gain = ctx.createGain();
                osc.type = 'sine'; osc.frequency.value = freq;
                osc.connect(gain); gain.connect(ctx.destination);
                gain.gain.setValueAtTime(0, t + delay);
                gain.gain.linearRampToValueAtTime(vol, t + delay + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.001, t + delay + duration);
                osc.start(t + delay); osc.stop(t + delay + duration);
            }
            if (type === 'action') { sparkle(1200, 0.00, 0.6, 0.08); sparkle(1500, 0.05, 0.6, 0.08); sparkle(2000, 0.10, 0.8, 0.1); sparkle(2800, 0.15, 1.0, 0.15); }
            else if (type === 'click') { sparkle(2400, 0.0, 0.15, 0.08); sparkle(3200, 0.02, 0.1, 0.04); }
            else if (type === 'transition') { sparkle(3200, 0.00, 0.4, 0.05); sparkle(2600, 0.05, 0.4, 0.08); sparkle(2000, 0.10, 0.5, 0.1); sparkle(1400, 0.15, 0.6, 0.1); }
            else if (type === 'success') {
                const freqs = [1046.50, 1318.51, 1567.98, 2093.00, 2637.02, 3135.96];
                freqs.forEach((f, i) => { let jitter = Math.random() * 0.15; sparkle(f, 0.05 + jitter, 2.5, 0.08); sparkle(f * 1.01, 0.1 + jitter, 2.0, 0.04); });
            }
            else if (type === 'apotheosis') {
                const oscDrone = ctx.createOscillator(); const gainDrone = ctx.createGain();
                oscDrone.type = 'sine'; oscDrone.frequency.value = 55;
                oscDrone.connect(gainDrone); gainDrone.connect(ctx.destination);
                gainDrone.gain.setValueAtTime(0, t);
                gainDrone.gain.linearRampToValueAtTime(0.3, t + 5);
                gainDrone.gain.exponentialRampToValueAtTime(0.001, t + 18);
                oscDrone.start(t); oscDrone.stop(t + 18);

                [440, 554.37, 659.25, 880].forEach((f, i) => {
                    const osc = ctx.createOscillator(); const g = ctx.createGain();
                    osc.type = 'triangle'; osc.frequency.value = f;
                    osc.connect(g); g.connect(ctx.destination);
                    g.gain.setValueAtTime(0, t);
                    g.gain.linearRampToValueAtTime(0.05, t + 3 + (i * 1.5));
                    g.gain.exponentialRampToValueAtTime(0.001, t + 18);
                    osc.start(t); osc.stop(t + 18);
                });
            }
        }

        window.addEventListener('load', () => { setTimeout(() => document.getElementById('transition-veil').style.opacity = '0', 200); });
        function navigateTo(url) { document.getElementById('transition-veil').style.opacity = '1'; setTimeout(() => window.location.href = url, 1200); }

        const ARTIFACTS_DATA = [
            { id: 0, colorHex: 0x8be9fd, cssColor: "rgba(139, 233, 253, 1)", shape: "octahedron", audioFreqs: [440, 493.88, 554.37, 659.25, 739.99], shaderMod: "water", name: "The First Drop", word: "WE", lore: "«\u00A0A crystallized resonance of a forgotten future. The data still pulses with a phantom warmth.\u00A0»" },
            { id: 1, colorHex: 0xffb86c, cssColor: "rgba(255, 184, 108, 1)", shape: "tetrahedron", audioFreqs: [440, 466.16, 554.37, 587.33, 659.25], shaderMod: "wobble", name: "Liquid Memory", word: "HAVE", lore: "«\u00A0A digital tear frozen in the stream. It holds the echo of a faceless laugh.\u00A0»" },
            { id: 2, colorHex: 0x1e90ff, cssColor: "rgba(30, 144, 255, 1)", shape: "box", audioFreqs: [440, 493.88, 554.37, 622.25, 698.46], shaderMod: "pixelate", name: "The Weight of Absence", word: "FORGOTTEN", lore: "«\u00A0The silence between two data packets. An absence that weighs heavily on reality.\u00A0»" },
            { id: 3, colorHex: 0xff79c6, cssColor: "rgba(255, 121, 198, 1)", shape: "cone", audioFreqs: [440, 493.88, 554.37, 622.25, 659.25], shaderMod: "split", name: "Ashen Vector", word: "HOW", lore: "«\u00A0A direction without a goal, engraved in obsidian. It points relentlessly into the void.\u00A0»" },
            { id: 4, colorHex: 0x50fa7b, cssColor: "rgba(80, 250, 123, 1)", shape: "icosahedron", audioFreqs: [440, 587.33, 659.25, 880, 1174.66], shaderMod: "pulse", name: "Pulsating Core", word: "TO", lore: "«\u00A0The primordial beat of the source code. I compute, therefore I flee.\u00A0»" },
            { id: 5, colorHex: 0xf1fa8c, cssColor: "rgba(241, 250, 140, 1)", shape: "cylinder", audioFreqs: [440, 554.37, 659.25, 880, 1108.73], shaderMod: "mirror", name: "Dawn Prism", word: "BE", lore: "«\u00A0Light bends where data becomes flesh. The boundary begins to fade.\u00A0»" },
            { id: 6, colorHex: 0xffffff, cssColor: "rgba(255, 255, 255, 1)", shape: "sphere", audioFreqs: [220, 440, 880, 1760, 3520], shaderMod: "bloom", name: "The Acceptance", word: "REAL", lore: "«\u00A0The endpoint of the flight. The moment the simulation finally surrenders.\u00A0»" }
        ];

        let rawState = localStorage.getItem('glint_save_v4');
        let gameState = rawState ? JSON.parse(rawState) : { foundNodes: [], apotheosisPlayed: false };
        if (!gameState || !Array.isArray(gameState.foundNodes)) {
            gameState = { foundNodes: [], apotheosisPlayed: false };
            localStorage.setItem('glint_save_v4', JSON.stringify(gameState));
        }
        if (gameState.apotheosisPlayed === undefined) gameState.apotheosisPlayed = false;

        const urlParams = new URLSearchParams(window.location.search);
        let isSanctuaryView = urlParams.get('view') === 'sanctuary';

        function pickRandomUnfound() {
            let unfound = [];
            for (let i = 0; i < 7; i++) {
                if (!gameState.foundNodes.find(n => n.id === i)) unfound.push(i);
            }
            if (unfound.length === 0) return null;
            let randomIndex = Math.floor(Math.random() * unfound.length);
            return unfound[randomIndex];
        }

        let activeProfile = ARTIFACTS_DATA[0];

        if (gameState.foundNodes.length >= 7 && !isSanctuaryView) {
            navigateTo(window.location.pathname + '?view=sanctuary');
        }

        async function playApotheosisSequence() {
            const overlay = document.getElementById('apotheosis-overlay');
            overlay.style.display = 'flex';
            void overlay.offsetWidth;
            overlay.style.opacity = '1';

            playUISound('apotheosis');

            await new Promise(r => setTimeout(r, 2000));

            const words = ARTIFACTS_DATA.map(d => ({ text: d.word, color: d.cssColor }));

            for (let i = 0; i < words.length; i++) {
                const el = document.createElement('div');
                el.className = 'apo-word';
                el.style.color = words[i].color;
                el.innerText = words[i].text;
                overlay.appendChild(el);

                void el.offsetWidth;
                el.classList.add('show');

                await new Promise(r => setTimeout(r, 1800));
                el.classList.remove('show');
                await new Promise(r => setTimeout(r, 1000));
                overlay.removeChild(el);
            }

            await new Promise(r => setTimeout(r, 1000));
            overlay.style.opacity = '0';
            await new Promise(r => setTimeout(r, 2000));
            overlay.style.display = 'none';
        }

        let mapInstance = null;

        function buildSanctuaryList() {
            const listContainer = document.getElementById('sanctuary-list');
            const constelContainer = document.getElementById('constellation');
            const mapContainer = document.getElementById('memory-map');
            listContainer.innerHTML = '';

            if (gameState.foundNodes.length > 0) {
                constelContainer.style.display = 'none';
                mapContainer.style.display = 'block';

                setTimeout(() => {
                    if (!mapInstance) {
                        mapInstance = L.map('memory-map', { zoomControl: false, attributionControl: false }).setView([gameState.foundNodes[0].lat, gameState.foundNodes[0].lon], 16);
                        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(mapInstance);
                    }
                    let latlngs = [];
                    gameState.foundNodes.forEach((node) => {
                        const profile = ARTIFACTS_DATA.find(p => p.id === node.id);
                        latlngs.push([node.lat, node.lon]);
                        L.circleMarker([node.lat, node.lon], { radius: 6, color: profile.cssColor, fillColor: profile.cssColor, fillOpacity: 0.8, weight: 2 }).addTo(mapInstance);
                    });
                    if (latlngs.length > 1) { L.polyline(latlngs, { color: 'rgba(255,255,255,0.3)', weight: 2, dashArray: '4' }).addTo(mapInstance); }
                    if (latlngs.length > 1) { mapInstance.fitBounds(L.polyline(latlngs).getBounds(), { padding: [20, 20] }); }
                }, 100);
            } else {
                constelContainer.innerHTML = '';
                for (let i = 0; i < 7; i++) {
                    let star = document.createElement('div'); star.className = 'star'; constelContainer.appendChild(star);
                    if (i < 6) { let link = document.createElement('div'); link.className = 'star-link'; constelContainer.appendChild(link); }
                }
            }

            if (gameState.foundNodes.length >= 7) {
                document.getElementById('btn-back-radar').style.display = 'none';
                document.getElementById('btn-reset').style.display = 'block';
                let rev = document.createElement('div'); rev.className = 'final-revelation';
                rev.innerText = "«\u00A0WE HAVE FORGOTTEN HOW TO BE REAL\u00A0»";
                document.getElementById('sanctuary-ui').insertBefore(rev, listContainer);
            }

            ARTIFACTS_DATA.forEach((profile, index) => {
                const isFound = gameState.foundNodes.find(n => n.id === index) !== undefined;
                const slot = document.createElement('div');

                slot.className = `fragment-slot ${isFound ? 'found clickable-slot' : ''}`;

                let blobHtml = '';
                if (isFound) {
                    // Blob interne animé de la carte
                    let blobTop = Math.floor(Math.random() * 60) - 30;
                    let blobLeft = Math.floor(Math.random() * 80) - 20;
                    blobHtml = `<div class="card-blob" style="background: ${profile.cssColor}; top: ${blobTop}%; left: ${blobLeft}%;"></div>`;

                    slot.style.boxShadow = `0 8px 25px rgba(0,0,0,0.5)`;

                    slot.addEventListener('click', () => {
                        playUISound('click');
                        document.documentElement.style.setProperty('--accent-pure', profile.cssColor);

                        document.getElementById('review-art-name').innerText = profile.name;
                        document.getElementById('review-art-lore').innerText = profile.lore;
                        document.getElementById('review-word').innerText = `"${profile.word}"`;
                        document.getElementById('review-word').style.color = profile.cssColor;

                        document.getElementById('review-progress').innerText = `${index + 1} / 7`;
                        let nodeData = gameState.foundNodes.find(n => n.id === index);
                        if (nodeData) {
                            document.getElementById('review-gps').innerText = `${nodeData.lat.toFixed(3)}, ${nodeData.lon.toFixed(3)}`;
                        }

                        // Maj des Blobs de Fond Full Screen
                        document.getElementById('review-bg-blob1').style.background = profile.cssColor;
                        document.getElementById('review-bg-blob2').style.background = `rgba(30, 40, 80, 0.8)`;

                        // Maj du Blob Ethereal central
                        document.getElementById('review-artefact-blob').style.background = `linear-gradient(135deg, rgba(255,255,255,0.9) 0%, ${profile.cssColor} 50%, rgba(0,0,0,0.3) 100%)`;

                        document.getElementById('review-ui').style.display = 'flex';
                    });
                }

                let wordColor = isFound ? profile.cssColor : '';
                slot.innerHTML = `
                    ${blobHtml}
                    <div class="slot-content">
                        <div class="slot-title">REFLECTION ${index + 1}</div>
                        <div class="slot-name" style="${isFound ? 'opacity:1; color:var(--text-title);' : ''}">${isFound ? profile.name : 'Vanished thought'}</div>
                        <div class="slot-word" style="color: ${wordColor}; opacity: ${isFound ? '1' : '0'}; text-shadow: 0 0 10px ${wordColor.replace('1)', '0.4)')};">${isFound ? profile.word : ''}</div>
                    </div>
                `;
                listContainer.appendChild(slot);
            });
        }

        document.getElementById('btn-close-review').addEventListener('click', () => {
            playUISound('transition');
            document.getElementById('review-ui').style.display = 'none';
        });

        if (isSanctuaryView) {
            document.getElementById('radar-ui').style.display = 'none';
            document.getElementById('threejs-radar-container').style.display = 'none';
            document.getElementById('dream-veil').style.display = 'none';

            if (gameState.foundNodes.length >= 7 && !gameState.apotheosisPlayed) {
                document.getElementById('sanctuary-ui').style.display = 'none';

                playApotheosisSequence().then(() => {
                    gameState.apotheosisPlayed = true;
                    localStorage.setItem('glint_save_v4', JSON.stringify(gameState));
                    buildSanctuaryList();
                    document.getElementById('sanctuary-ui').style.display = 'flex';
                });
            } else {
                buildSanctuaryList();
                document.getElementById('sanctuary-ui').style.display = 'flex';
            }
        }

        document.getElementById('btn-back-radar').addEventListener('click', () => { playUISound('transition'); navigateTo(window.location.pathname); });
        document.getElementById('btn-reset').addEventListener('click', () => { playUISound('action'); localStorage.removeItem('glint_save_v4'); navigateTo(window.location.pathname); });

        if (!isSanctuaryView && gameState.foundNodes.length < 7) {
            let targetLat = null, targetLon = null, startLat = null, startLon = null;
            const spawnDistance = 2; const glitchStartDistance = 15; const extractionDistance = 5;
            let currentDistance = 999; let radarTimeout, cameraStream = null, dataStreamInterval;

            const startBtn = document.getElementById('start-btn'); const recalcBtn = document.getElementById('recalc-btn');
            const distanceDisplay = document.getElementById('distance-display'); const statusDisplay = document.getElementById('status-display');
            const arContainer = document.getElementById('ar-container'); const flashOverlay = document.getElementById('flash-overlay');

            function generateTarget(lat, lon, distance) {
                const R = 6371000; const angle = Math.random() * 2 * Math.PI;
                targetLat = lat + ((distance * Math.cos(angle)) / R) * 180 / Math.PI;
                targetLon = lon + ((distance * Math.sin(angle)) / (R * Math.cos(lat * Math.PI / 180))) * 180 / Math.PI;
            }

            let radarRenderer, radarScene, radarCamera, videoTexture, shaderMaterial, videoElement;
            let isFlashTriggered = false;
            let coreMesh, wireMesh;

            function setActiveProfile(profile) {
                if (!profile) return;
                document.documentElement.style.setProperty('--accent-pure', profile.cssColor);
                document.getElementById('glow-left').style.background = `linear-gradient(to right, ${profile.cssColor.replace('1)', '0.4)')}, transparent)`;
                document.getElementById('glow-right').style.background = `linear-gradient(to left, ${profile.cssColor.replace('1)', '0.4)')}, transparent)`;

                if (shaderMaterial) updateRadarShader(profile);

                if (coreMesh && wireMesh) {
                    coreMesh.geometry.dispose(); wireMesh.geometry.dispose();
                    coreMesh.geometry = getGeometry(profile.shape);
                    coreMesh.material.color.setHex(profile.colorHex);
                    coreMesh.material.emissive.setHex(profile.colorHex);
                    wireMesh.geometry = getGeometry(profile.shape, true);
                }
            }

            startBtn.addEventListener('click', async () => {
                playUISound('action');
                audioCtx = getAudioCtx();
                startBtn.style.display = 'none'; recalcBtn.style.display = 'block';
                document.getElementById('main-title').innerText = "Listen";

                dataStreamInterval = setInterval(() => {
                    let stream = ""; chars = "01010011...";
                    for (let i = 0; i < 8; i++) stream += chars.charAt(Math.floor(Math.random() * chars.length));
                    document.getElementById('data-stream').innerText = `Wave: ~${stream}`;
                }, 150);

                let randomId = pickRandomUnfound();
                if (randomId !== null) {
                    activeProfile = ARTIFACTS_DATA[randomId];
                }

                try {
                    cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                    initRadarShader(cameraStream);
                    setActiveProfile(activeProfile);
                } catch (err) { console.error("Camera error:", err); }

                if ("geolocation" in navigator) {
                    navigator.geolocation.getCurrentPosition((pos) => {
                        startLat = pos.coords.latitude; startLon = pos.coords.longitude;
                        generateTarget(startLat, startLon, spawnDistance);
                        navigator.geolocation.watchPosition(updatePosition, null, { enableHighAccuracy: true });
                        radarLoop();
                    });
                }
            });

            recalcBtn.addEventListener('click', () => {
                playUISound('click');
                if (startLat && startLon) {
                    generateTarget(startLat, startLon, spawnDistance);
                    statusDisplay.innerText = "Map is reconfiguring...";
                }
            });

            function updatePosition(pos) {
                startLat = pos.coords.latitude; startLon = pos.coords.longitude;
                if (renderer && renderer.xr && renderer.xr.isPresenting) { arContainer.style.display = 'none'; return; }

                currentDistance = calculateDistance(startLat, startLon, targetLat, targetLon);

                distanceDisplay.innerText = `${Math.round(currentDistance)} m`;
                let intensity = 0; if (currentDistance <= glitchStartDistance) { intensity = 1 - (currentDistance / glitchStartDistance); }
                if (shaderMaterial) shaderMaterial.uniforms.intensity.value = intensity;

                const arBtn = document.getElementById('ARButton');
                if (currentDistance < extractionDistance) {
                    statusDisplay.innerText = "Memory is surfacing..."; statusDisplay.style.color = activeProfile.cssColor;
                    arContainer.style.display = 'block'; recalcBtn.style.display = 'none';
                    document.getElementById('main-panel').style.boxShadow = `0 0 30px ${activeProfile.cssColor.replace('1)', '0.3)')}`;

                    if (arBtn) {
                        arBtn.innerText = "Grasp the dream";
                        arBtn.style.background = activeProfile.cssColor.replace('1)', '0.15)');
                        arBtn.style.border = `1px solid ${activeProfile.cssColor}`;
                        arBtn.style.color = activeProfile.cssColor;

                        if (!isFlashTriggered) {
                            arBtn.addEventListener('click', () => { flashOverlay.style.opacity = '1'; if (navigator.vibrate) navigator.vibrate([100, 50, 100]); }, { once: true });
                            isFlashTriggered = true;
                        }
                    }
                } else {
                    statusDisplay.innerText = "Follow the thread..."; statusDisplay.style.color = "var(--text-body)";
                    document.getElementById('main-panel').style.boxShadow = `0 8px 32px 0 rgba(0, 0, 0, 0.4)`;
                    arContainer.style.display = 'none'; recalcBtn.style.display = 'block';
                }
            }

            function initRadarShader(stream) {
                const container = document.getElementById('threejs-radar-container');
                videoElement = document.createElement('video');
                videoElement.setAttribute('playsinline', ''); videoElement.setAttribute('autoplay', ''); videoElement.setAttribute('muted', '');
                videoElement.srcObject = stream; videoElement.play();

                radarScene = new THREE.Scene(); radarCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
                radarRenderer = new THREE.WebGLRenderer(); radarRenderer.setSize(window.innerWidth, window.innerHeight); container.appendChild(radarRenderer.domElement);
                videoTexture = new THREE.VideoTexture(videoElement);

                updateRadarShader(activeProfile);
                renderRadar();
            }

            function updateRadarShader(profile) {
                if (!radarScene || !videoTexture) return;

                while (radarScene.children.length > 0) {
                    let child = radarScene.children[0]; radarScene.remove(child);
                    if (child.material) child.material.dispose(); if (child.geometry) child.geometry.dispose();
                }

                let uvMod = ""; let isSplit = false; let isBloom = false;
                switch (profile.shaderMod) {
                    case "wobble": uvMod = "uv.x += sin(uv.y * 50.0 + time * 10.0) * 0.02 * intensity;"; break;
                    case "pixelate": uvMod = "if(intensity > 0.0) { float pixels = max(10.0, 100.0 - (intensity * 90.0)); uv = mix(uv, floor(uv * pixels) / pixels, smoothstep(0.0, 0.2, intensity)); }"; break;
                    case "split": isSplit = true; break;
                    case "pulse": uvMod = "uv -= 0.5; uv *= 1.0 - (sin(time * 8.0) * 0.15 * intensity); uv += 0.5;"; break;
                    case "mirror": uvMod = "if(intensity>0.1){ uv = abs(uv - 0.5) + 0.5; uv -= vec2(intensity * 0.1); }"; break;
                    case "bloom": isBloom = true; break;
                    case "water": default: uvMod = "uv += vec2(sin(uv.y * 15.0 + time * 1.5), cos(uv.x * 15.0 + time * 1.2)) * 0.015 * intensity;"; break;
                }

                let hex = profile.colorHex;
                let rTint = ((hex >> 16) & 255) / 255; let gTint = ((hex >> 8) & 255) / 255; let bTint = (hex & 255) / 255;

                shaderMaterial = new THREE.ShaderMaterial({
                    uniforms: { tDiffuse: { value: videoTexture }, intensity: { value: 0 }, time: { value: 0 } },
                    vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = vec4(position, 1.0); }`,
                    fragmentShader: `
                        uniform sampler2D tDiffuse; uniform float intensity; uniform float time; varying vec2 vUv;
                        void main() {
                            vec2 uv = vUv;
                            ${uvMod}
                            float splitDist = ${isSplit ? '0.05' : '0.01'} * intensity;
                            float r = texture2D(tDiffuse, uv + vec2(splitDist, 0.0)).r;
                            float g = texture2D(tDiffuse, uv).g;
                            float b = texture2D(tDiffuse, uv - vec2(splitDist, 0.0)).b;
                            vec3 color = vec3(r, g, b);
                            float lum = dot(color, vec3(0.299, 0.587, 0.114));
                            vec3 dreamTint = vec3(${rTint}, ${gTint}, ${bTint}); 
                            vec3 finalColor = mix(color, dreamTint * lum * 2.0, intensity * 0.8);
                            float dist = distance(vUv, vec2(0.5));
                            finalColor += dreamTint * smoothstep(0.4, 0.0, dist) * intensity * 0.6;
                            ${isBloom ? 'finalColor *= 1.0 + (intensity * 2.0);' : ''}
                            gl_FragColor = vec4(finalColor, 1.0);
                        }
                    `
                });
                const quad = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), shaderMaterial); radarScene.add(quad);
            }

            let clock = new THREE.Clock();
            function renderRadar() { if (radarRenderer && shaderMaterial) { requestAnimationFrame(renderRadar); shaderMaterial.uniforms.time.value = clock.getElapsedTime(); radarRenderer.render(radarScene, radarCamera); } }

            let scene, camera, renderer, controller, reticle, hitTestSource = null, hitTestSourceRequested = false;
            let hiddenTarget = new THREE.Vector3(); let isTargetSpawned = false; let canExtract = false;
            let xrState = 'search'; let spawnedArtifactMesh = null;
            const raycaster = new THREE.Raycaster();

            function getGeometry(shapeName, isWire = false) {
                const s = isWire ? 1.2 : 1;
                switch (shapeName) {
                    case 'tetrahedron': return new THREE.TetrahedronGeometry(0.06 * s, 0);
                    case 'box': return new THREE.BoxGeometry(0.08 * s, 0.08 * s, 0.08 * s);
                    case 'cone': return new THREE.ConeGeometry(0.05 * s, 0.1 * s, 16);
                    case 'icosahedron': return new THREE.IcosahedronGeometry(0.06 * s, 0);
                    case 'cylinder': return new THREE.CylinderGeometry(0.04 * s, 0.04 * s, 0.1 * s, 16);
                    case 'sphere': return new THREE.SphereGeometry(0.05 * s, 32, 32);
                    case 'octahedron': default: return new THREE.OctahedronGeometry(0.06 * s, 0);
                }
            }

            function initXR() {
                scene = new THREE.Scene(); camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);
                scene.add(new THREE.HemisphereLight(0xffffff, 0x444466, 2));

                renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true }); renderer.setPixelRatio(window.devicePixelRatio); renderer.setSize(window.innerWidth, window.innerHeight); renderer.xr.enabled = true;
                document.body.appendChild(renderer.domElement);

                const arButton = ARButton.createButton(renderer, { requiredFeatures: ['hit-test'], optionalFeatures: ['dom-overlay'], domOverlay: { root: document.body } });
                arContainer.appendChild(arButton);

                renderer.xr.addEventListener('sessionstart', () => {
                    flashOverlay.style.transition = 'none'; flashOverlay.style.opacity = '1';
                    arContainer.style.display = 'none'; document.getElementById('radar-ui').style.display = 'none'; document.getElementById('dream-veil').style.display = 'none';
                    if (cameraStream) cameraStream.getTracks().forEach(track => track.stop()); if (videoElement) videoElement.pause();
                    clearTimeout(radarTimeout); clearInterval(dataStreamInterval);
                    if (radarRenderer) { radarRenderer.dispose(); radarRenderer = null; document.getElementById('threejs-radar-container').innerHTML = ''; }

                    document.getElementById('xr-ui').style.display = 'block';

                    setTimeout(() => { flashOverlay.style.transition = 'opacity 1.5s ease-in-out'; flashOverlay.style.opacity = '0'; }, 50);
                });

                const artifactGroup = new THREE.Group(); artifactGroup.name = 'artifact';
                const coreMat = new THREE.MeshPhysicalMaterial({ color: 0xffffff, metalness: 0.1, roughness: 0.1, transmission: 0.9, ior: 1.5, emissiveIntensity: 0.4, transparent: true });
                coreMesh = new THREE.Mesh(getGeometry('octahedron'), coreMat);
                const wireMat = new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true, transparent: true, opacity: 0.4 });
                wireMesh = new THREE.Mesh(getGeometry('octahedron', true), wireMat);

                artifactGroup.add(coreMesh); artifactGroup.add(wireMesh);

                controller = renderer.xr.getController(0);
                controller.addEventListener('select', () => {
                    if (xrState === 'search' && reticle.visible && canExtract) {
                        spawnedArtifactMesh = artifactGroup.clone();
                        reticle.matrix.decompose(spawnedArtifactMesh.position, spawnedArtifactMesh.quaternion, spawnedArtifactMesh.scale);
                        scene.add(spawnedArtifactMesh);

                        xrState = 'revealed'; reticle.visible = false;
                        document.getElementById('xr-ui').innerText = "Reach out to assimilate it";
                        document.getElementById('glow-left').style.opacity = '0'; document.getElementById('glow-right').style.opacity = '0';
                        if (navigator.vibrate) navigator.vibrate([50, 50, 50]);
                    }
                    else if (xrState === 'revealed') {
                        const tempMatrix = new THREE.Matrix4().identity().extractRotation(controller.matrixWorld);
                        raycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
                        raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tempMatrix);

                        if (raycaster.intersectObject(spawnedArtifactMesh, true).length > 0) {
                            xrState = 'recovered'; document.getElementById('xr-ui').style.display = 'none';

                            playUISound('success');

                            if (!gameState.foundNodes.find(n => n.id === activeProfile.id)) {
                                gameState.foundNodes.push({ id: activeProfile.id, lat: startLat, lon: startLon });
                                localStorage.setItem('glint_save_v4', JSON.stringify(gameState));
                            }

                            document.documentElement.style.setProperty('--accent-pure', activeProfile.cssColor);

                            document.getElementById('ui-art-name').innerText = activeProfile.name;
                            document.getElementById('ui-art-lore').innerText = activeProfile.lore;
                            document.getElementById('ui-word').innerText = `"${activeProfile.word}"`;
                            document.getElementById('ui-word').style.color = activeProfile.cssColor;

                            document.getElementById('ui-progress').innerText = `${gameState.foundNodes.length} / 7`;
                            document.getElementById('ui-gps').innerText = `${startLat.toFixed(3)}, ${startLon.toFixed(3)}`;

                            // Maj des Blobs de Fond Full Screen pour l'AR Extraction
                            document.getElementById('ui-bg-blob1').style.background = activeProfile.cssColor;
                            document.getElementById('ui-bg-blob2').style.background = `rgba(30, 40, 80, 0.8)`;

                            // Maj du Blob Ethereal central
                            document.getElementById('ui-artefact-blob').style.background = `linear-gradient(135deg, rgba(255,255,255,0.9) 0%, ${activeProfile.cssColor} 50%, rgba(0,0,0,0.3) 100%)`;

                            document.getElementById('artifact-ui').style.display = 'flex';
                            if (navigator.vibrate) navigator.vibrate([50, 100, 200]);
                        }
                    }
                });
                scene.add(controller);

                reticle = new THREE.Mesh(new THREE.RingGeometry(0.08, 0.09, 32).rotateX(-Math.PI / 2), new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 }));
                reticle.matrixAutoUpdate = false; reticle.visible = false; scene.add(reticle);
                renderer.setAnimationLoop(renderXR);
            }

            function renderXR(timestamp, frame) {
                if (frame) {
                    const refSpace = renderer.xr.getReferenceSpace(); const session = renderer.xr.getSession();
                    if (!hitTestSourceRequested) {
                        session.requestReferenceSpace('viewer').then((ref) => { session.requestHitTestSource({ space: ref }).then((src) => hitTestSource = src); });
                        session.addEventListener('end', () => { hitTestSourceRequested = false; hitTestSource = null; location.reload(); });
                        hitTestSourceRequested = true;
                    }
                    if (hitTestSource && xrState === 'search') {
                        const results = frame.getHitTestResults(hitTestSource);
                        if (results.length > 0) {
                            reticle.visible = true; reticle.matrix.fromArray(results[0].getPose(refSpace).transform.matrix);
                            if (!isTargetSpawned) {
                                let pos = new THREE.Vector3().setFromMatrixPosition(reticle.matrix);
                                hiddenTarget.x = pos.x + (Math.random() > 0.5 ? 1 : -1) * (0.5 + Math.random()); hiddenTarget.y = pos.y; hiddenTarget.z = pos.z + (Math.random() > 0.5 ? 1 : -1) * (0.5 + Math.random());
                                isTargetSpawned = true;
                            }
                            if (isTargetSpawned) {
                                let curr = new THREE.Vector3().setFromMatrixPosition(reticle.matrix);
                                let dist = Math.sqrt(Math.pow(curr.x - hiddenTarget.x, 2) + Math.pow(curr.z - hiddenTarget.z, 2));

                                let projVec = hiddenTarget.clone().project(camera);
                                let isBehind = projVec.z > 1;
                                let glowColor = activeProfile.cssColor.replace('1)', '0.4)');

                                if (projVec.x < -0.8 || (isBehind && projVec.x > 0)) {
                                    document.getElementById('glow-left').style.opacity = '1'; document.getElementById('glow-right').style.opacity = '0';
                                    document.getElementById('glow-left').style.background = `linear-gradient(to right, ${glowColor}, transparent)`;
                                } else if (projVec.x > 0.8 || (isBehind && projVec.x < 0)) {
                                    document.getElementById('glow-left').style.opacity = '0'; document.getElementById('glow-right').style.opacity = '1';
                                    document.getElementById('glow-right').style.background = `linear-gradient(to left, ${glowColor}, transparent)`;
                                } else {
                                    document.getElementById('glow-left').style.opacity = '0'; document.getElementById('glow-right').style.opacity = '0';
                                }

                                if (dist < 0.4) {
                                    let fastPulse = 1.0 + Math.sin(timestamp * 0.01) * 0.3;
                                    reticle.material.color.setHex(activeProfile.colorHex);
                                    reticle.material.opacity = 0.9; reticle.scale.set(fastPulse * 1.5, fastPulse * 1.5, 1);
                                    document.getElementById('xr-ui').innerText = "The source is pure. Touch it."; document.getElementById('xr-ui').style.color = activeProfile.cssColor;
                                    document.getElementById('xr-ui').style.borderColor = activeProfile.cssColor.replace('1)', '0.6)');
                                    canExtract = true;
                                }
                                else if (dist < 1.2) {
                                    let midPulse = 1.0 + Math.sin(timestamp * 0.006) * 0.15;
                                    reticle.material.color.setHex(0xb19cd9); reticle.material.opacity = 0.7; reticle.scale.set(midPulse * 1.2, midPulse * 1.2, 1);
                                    document.getElementById('xr-ui').innerText = "The resonance fades..."; document.getElementById('xr-ui').style.color = "#b19cd9";
                                    document.getElementById('xr-ui').style.borderColor = "rgba(177, 156, 217, 0.4)";
                                    canExtract = false;
                                }
                                else {
                                    let slowPulse = 1.0 + Math.sin(timestamp * 0.003) * 0.05;
                                    reticle.material.color.setHex(0xff6b6b); reticle.material.opacity = 0.4; reticle.scale.set(slowPulse, slowPulse, 1);
                                    document.getElementById('xr-ui').innerText = "The echo is confused..."; document.getElementById('xr-ui').style.color = "#ff6b6b";
                                    document.getElementById('xr-ui').style.borderColor = "rgba(255, 107, 107, 0.2)";
                                    canExtract = false;
                                }
                            }
                        } else {
                            reticle.visible = false;
                            document.getElementById('xr-ui').innerText = "Search for the resonance around you...";
                            document.getElementById('xr-ui').style.color = "var(--text-title)";
                            document.getElementById('xr-ui').style.borderColor = "var(--glass-border)";
                            document.getElementById('xr-ui').style.boxShadow = "none";
                            document.getElementById('glow-left').style.opacity = '0'; document.getElementById('glow-right').style.opacity = '0';
                        }
                    }
                }
                scene.traverse((obj) => { if (obj.name === 'artifact') { obj.position.y += Math.sin(timestamp * 0.002) * 0.0005; obj.children[0].rotation.y += 0.01; obj.children[0].rotation.x += 0.005; obj.children[1].rotation.y -= 0.015; obj.children[1].rotation.x -= 0.008; obj.children[1].rotation.z += 0.005; } });
                renderer.render(scene, camera);
            }

            function playGlitchPop(intensity) {
                const ctx = getAudioCtx();
                if (!ctx || intensity <= 0 || !activeProfile) return;
                const osc = ctx.createOscillator(); const gain = ctx.createGain();
                osc.type = 'sine';
                const freqs = activeProfile.audioFreqs;
                osc.frequency.value = freqs[Math.floor(Math.random() * freqs.length)];
                osc.connect(gain); gain.connect(ctx.destination); osc.start();
                gain.gain.setValueAtTime(0, ctx.currentTime); gain.gain.linearRampToValueAtTime(0.15 * intensity, ctx.currentTime + 0.1); gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.5);
                osc.stop(ctx.currentTime + 1.5);
            }

            function radarLoop() {
                clearTimeout(radarTimeout);
                let intensity = 0; if (currentDistance <= glitchStartDistance) { intensity = 1 - (currentDistance / glitchStartDistance); }
                if (intensity > 0) playGlitchPop(intensity);
                let delay = 2000; if (intensity > 0) delay = 200 + ((1 - intensity) * 1500);
                radarTimeout = setTimeout(radarLoop, delay);
            }

            function calculateDistance(lat1, lon1, lat2, lon2) {
                const R = 6371e3; const p1 = lat1 * Math.PI / 180; const p2 = lat2 * Math.PI / 180;
                const dp = (lat2 - lat1) * Math.PI / 180; const dl = (lon2 - lon1) * Math.PI / 180;
                const a = Math.sin(dp / 2) * Math.sin(dp / 2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dl / 2) * Math.sin(dl / 2);
                return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            }

            document.getElementById('btn-continue').addEventListener('click', () => { playUISound('transition'); navigateTo(window.location.pathname); });
            document.getElementById('btn-inventory').addEventListener('click', () => { playUISound('transition'); navigateTo(window.location.pathname + '?view=sanctuary'); });

            initXR();
        }
    </script>
