<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GLINT - Alpha (Fix Sanctuary)</title>
    <style>
        body { margin: 0; padding: 0; background-color: #000; color: #00ffcc; font-family: monospace; overflow: hidden; }

        /* --- UI RADAR --- */
        #radar-ui {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            display: flex; flex-direction: column; align-items: center; 
            justify-content: flex-end; padding-bottom: 90px; box-sizing: border-box;
            z-index: 10; pointer-events: none; transition: opacity 0.5s;
        }
        
        .crt-overlay {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(0,0,0,0) 50%, rgba(0,0,0,0.3) 50%), linear-gradient(90deg, rgba(255,0,0,0.06), rgba(0,255,0,0.02), rgba(0,0,255,0.06));
            background-size: 100% 4px, 3px 100%; pointer-events: none; z-index: 5;
            animation: scrollScanlines 10s linear infinite;
        }

        @keyframes scrollScanlines { 0% { background-position: 0 0, 0 0; } 100% { background-position: 0 100vh, 0 0; } }

        #ar-veil {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: rgba(0, 255, 204, 0.25); mix-blend-mode: overlay; pointer-events: none; z-index: 4; display: none; 
        }

        #flash-overlay {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #ffffff; z-index: 2000; opacity: 0; pointer-events: none; 
        }
        
        .info-box { 
            background: rgba(0, 10, 5, 0.85); padding: 20px; border: 1px solid rgba(0, 255, 204, 0.5); border-radius: 8px; 
            text-align: center; width: 85%; max-width: 400px; pointer-events: auto; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.8); backdrop-filter: blur(4px);
        }
        
        button {
            margin-top: 10px; padding: 12px 24px; background: rgba(0, 0, 0, 0.5); color: #00ffcc; border: 1px solid #00ffcc;
            font-family: monospace; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; width: 100%; border-radius: 4px;
        }

        #xr-ui {
            position: absolute; top: 40px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 400px; z-index: 100;
            pointer-events: none; text-align: center; display: none; box-sizing: border-box;
            background: rgba(0, 10, 5, 0.85); border: 1px solid rgba(0, 255, 204, 0.5); border-radius: 8px;
            padding: 15px 20px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.8); backdrop-filter: blur(4px);
            font-size: 1rem; letter-spacing: 1px; transition: all 0.3s;
        }

        #artifact-ui {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 5, 2, 0.85); z-index: 3000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            box-sizing: border-box; backdrop-filter: blur(8px);
        }
        .artifact-card {
            background: rgba(0, 20, 10, 0.9); border: 2px solid #00ffcc; border-radius: 12px;
            padding: 30px 25px; width: 80%; max-width: 350px; text-align: center;
        }
        
        #ARButton {
            background-color: #ff003c !important; border: 1px solid #fff !important; color: #fff !important;
            font-family: monospace !important; position: absolute !important; bottom: 25px !important; left: 50% !important; transform: translateX(-50%) !important;
            width: 85% !important; max-width: 400px !important; z-index: 999 !important; border-radius: 4px !important;
        }

        #threejs-radar-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
    </style>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
</head>
<body>

    <div id="flash-overlay"></div>
    <div id="ar-container" style="display: none;"></div>
    <div id="threejs-radar-container"></div>
    <div class="crt-overlay" id="crt-overlay"></div>
    <div id="ar-veil"></div>

    <div id="radar-ui">
        <div class="info-box">
            <div id="main-title" style="font-size:1.2rem; margin-bottom:10px;">CAPTEUR DÉSACTIVÉ</div>
            <p id="distance-display">Distance : ---</p>
            <div id="data-stream" style="font-size:0.7rem; color:#555; margin-bottom:10px;">_</div>
            <button id="start-btn">Activer le Radar</button>
        </div>
    </div>

    <div id="xr-ui">INITIALISATION DU SCANNER...</div>

    <div id="artifact-ui">
        <div class="artifact-card">
            <h2 id="ui-art-name">FRAGMENT</h2>
            <p id="ui-art-lore" style="font-size:0.9rem; color:#ccc; font-style:italic; margin-bottom:20px;"></p>
            <div style="text-align:left; font-size:0.8rem; border-top:1px dashed #00ffcc; padding-top:15px;">
                <p>FRAGMENT <span id="ui-progress" style="color:#00ffcc; float:right;">1 / 7</span></p>
                <p>MOT <span id="ui-word" style="color:#ff003c; float:right; font-weight:bold;">"---"</span></p>
            </div>
            <button id="btn-sanctuary" style="background:#00ffcc; color:#000; font-weight:bold; margin-top:20px;">Ouvrir le Sanctuaire</button>
            <button id="btn-continue" style="color:#888; border-color:#888; background:transparent; margin-top:10px;">Continuer la Traque</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/addons/webxr/ARButton.js';

        // --- DATA ---
        const ARTIFACTS_DATA = [
            { name: "ÉCLAT MNÉMONIQUE", word: "NOUS", lore: "Une résonance cristallisée d'un futur oublié." },
            { name: "SOUVENIR LIQUIDE", word: "AVONS", lore: "Une larme digitale figée dans le flux du réseau." },
            { name: "FRAGMENT D'ÉCHO", word: "OUBLIÉ", lore: "Le silence entre deux paquets de données." },
            { name: "VECTEUR D'INTENTION", word: "COMMENT", lore: "Une direction sans but, gravée dans l'obsidienne." },
            { name: "NOYAU D'EXISTENCE", word: "ÊTRE", lore: "La pulsation primordiale du code source." },
            { name: "PRISME DE VÉRITÉ", word: "RÉELS", lore: "La lumière se courbe là où la donnée devient chair." },
            { name: "CLEF D'ANCRAGE", word: "...", lore: "Le point final de la fuite." }
        ];

        let foundCount = parseInt(localStorage.getItem('glint_progress')) || 0;
        let targetLat, targetLon, startLat, startLon, currentDistance = 999;
        let audioCtx, cameraStream, shaderMaterial, radarRenderer, radarScene, radarCamera;
        let renderer, scene, camera, controller, reticle, hitTestSource, spawnedArtifact;
        const raycaster = new THREE.Raycaster();
        let gameMode = 'radar'; // 'radar', 'ar', 'sanctuary'

        // --- ELEMENTS UI ---
        const flashOverlay = document.getElementById('flash-overlay');
        const artifactUI = document.getElementById('artifact-ui');

        // --- INITIALISATION ---
        document.getElementById('start-btn').addEventListener('click', async () => {
            document.getElementById('start-btn').style.display = 'none';
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    startLat = pos.coords.latitude; startLon = pos.coords.longitude;
                    targetLat = startLat + 0.00002; targetLon = startLon + 0.00002; 
                    navigator.geolocation.watchPosition(updateGPS, null, {enableHighAccuracy:true});
                });
            }
            try {
                cameraStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
                initRadar();
            } catch(e) { console.error(e); }
        });

        function updateGPS(pos) {
            startLat = pos.coords.latitude; startLon = pos.coords.longitude;
            const R = 6371e3;
            const dLat = (targetLat - startLat) * Math.PI / 180;
            const dLon = (targetLon - startLon) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(startLat*Math.PI/180) * Math.cos(targetLat*Math.PI/180) * Math.sin(dLon/2)**2;
            currentDistance = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            document.getElementById('distance-display').innerText = `Distance : ${Math.round(currentDistance)}m`;
            
            if (currentDistance < 5 && gameMode === 'radar') {
                document.getElementById('ar-container').style.display = 'block';
            }
            if (shaderMaterial) shaderMaterial.uniforms.intensity.value = Math.max(0, 1 - (currentDistance / 10));
        }

        // --- RADAR LOGIQUE ---
        function initRadar() {
            radarRenderer = new THREE.WebGLRenderer({ antialias: true });
            radarRenderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('threejs-radar-container').appendChild(radarRenderer.domElement);
            radarScene = new THREE.Scene();
            radarCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
            
            const video = document.createElement('video');
            video.srcObject = cameraStream; video.play();
            const videoTex = new THREE.VideoTexture(video);

            shaderMaterial = new THREE.ShaderMaterial({
                uniforms: { tDiffuse:{value:videoTex}, intensity:{value:0} },
                vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position=vec4(position,1.0); }`,
                fragmentShader: `
                    uniform sampler2D tDiffuse; uniform float intensity; varying vec2 vUv;
                    void main(){
                        vec4 c = texture2D(tDiffuse, vUv);
                        float l = dot(c.rgb, vec3(0.299,0.587,0.114));
                        vec3 dream = mix(vec3(l), c.rgb, 1.0 + intensity);
                        gl_FragColor = vec4(dream.r + intensity*0.2, dream.g, dream.b + intensity*0.1, 1.0);
                    }
                `
            });
            radarScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2), shaderMaterial));
            
            initARLogic(); // Prépare l'AR en arrière-plan
            animateRadar();
        }

        function animateRadar() {
            if (gameMode !== 'radar') return;
            requestAnimationFrame(animateRadar);
            radarRenderer.render(radarScene, radarCamera);
        }

        // --- AR LOGIQUE ---
        function initARLogic() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.01, 20);
            renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;

            const arBtn = ARButton.createButton(renderer, {
                requiredFeatures: ['hit-test'],
                optionalFeatures: ['dom-overlay'],
                domOverlay: { root: document.body }
            });
            document.getElementById('ar-container').appendChild(arBtn);

            renderer.xr.addEventListener('sessionstart', () => {
                gameMode = 'ar';
                document.getElementById('radar-ui').style.display = 'none';
                document.getElementById('ar-veil').style.display = 'block';
                document.getElementById('xr-ui').style.display = 'block';
                document.getElementById('threejs-radar-container').style.display = 'none';
            });

            // Quand la session AR finit, on lance le Sanctuaire si besoin
            renderer.xr.addEventListener('sessionend', () => {
                if (gameMode === 'sanctuary') {
                    startSanctuaryBuild();
                }
            });

            reticle = new THREE.Mesh(new THREE.RingGeometry(0.08, 0.1, 32).rotateX(-Math.PI/2), new THREE.MeshBasicMaterial({color:0x00ffcc}));
            reticle.matrixAutoUpdate = false; reticle.visible = false;
            scene.add(reticle);

            controller = renderer.xr.getController(0);
            controller.addEventListener('select', () => {
                if (!reticle.visible) return;
                if (!spawnedArtifact) {
                    const group = new THREE.Group();
                    group.add(new THREE.Mesh(new THREE.IcosahedronGeometry(0.07,0), new THREE.MeshNormalMaterial()));
                    group.add(new THREE.Mesh(new THREE.IcosahedronGeometry(0.1,1), new THREE.MeshBasicMaterial({wireframe:true, color:0xffffff})));
                    reticle.matrix.decompose(group.position, group.quaternion, group.scale);
                    scene.add(group);
                    spawnedArtifact = group;
                    document.getElementById('xr-ui').innerText = "TOUCHEZ L'ARTEFACT";
                } else {
                    const tempMat = new THREE.Matrix4().identity().extractRotation(controller.matrixWorld);
                    raycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
                    raycaster.ray.direction.set(0,0,-1).applyMatrix4(tempMat);
                    if (raycaster.intersectObject(spawnedArtifact, true).length > 0) {
                        showArtifactUI();
                    }
                }
            });
            scene.add(controller);

            renderer.setAnimationLoop((t, frame) => {
                if (gameMode === 'ar' && frame) {
                    const session = renderer.xr.getSession();
                    const refSpace = renderer.xr.getReferenceSpace();
                    if (!hitTestSource) {
                        session.requestReferenceSpace('viewer').then(space => {
                            session.requestHitTestSource({space}).then(src => hitTestSource = src);
                        });
                    } else {
                        const results = frame.getHitTestResults(hitTestSource);
                        if (results.length > 0 && !spawnedArtifact) {
                            reticle.visible = true;
                            reticle.matrix.fromArray(results[0].getPose(refSpace).transform.matrix);
                        } else { reticle.visible = false; }
                    }
                }
                if (spawnedArtifact) spawnedArtifact.rotation.y += 0.01;
                renderer.render(scene, camera);
            });
        }

        function showArtifactUI() {
            const data = ARTIFACTS_DATA[foundCount % 7];
            document.getElementById('ui-art-name').innerText = data.name;
            document.getElementById('ui-art-lore').innerText = `"${data.lore}"`;
            document.getElementById('ui-word').innerText = `"${data.word}"`;
            document.getElementById('ui-progress').innerText = `${(foundCount % 7) + 1} / 7`;
            artifactUI.style.display = 'flex';
            document.getElementById('xr-ui').style.display = 'none';
        }

        // --- TRANSITION VERS LE SANCTUAIRE ---
        document.getElementById('btn-sanctuary').addEventListener('click', () => {
            gameMode = 'sanctuary';
            flashOverlay.style.opacity = '1';
            
            // On ferme la session AR d'abord !
            if (renderer.xr.getSession()) {
                renderer.xr.getSession().end();
            } else {
                startSanctuaryBuild(); // Si on n'était pas en AR
            }
        });

        function startSanctuaryBuild() {
            setTimeout(() => {
                // Nettoyage UI
                artifactUI.style.display = 'none';
                document.getElementById('ar-veil').style.display = 'none';
                document.getElementById('crt-overlay').style.display = 'none';
                document.body.appendChild(renderer.domElement); // On s'assure que le canvas est là
                
                // Nouvelle Scène 3D Pure
                scene = new THREE.Scene();
                scene.background = new THREE.Color(0x000105);
                camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 100);
                camera.position.set(0, 1.6, 4);

                // Monolithe heptagonal
                const mono = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.7, 0.8, 4, 7),
                    new THREE.MeshPhongMaterial({color: 0x0a0a0a, shininess: 100, flatShading: true})
                );
                mono.position.set(0, 1, -1);
                scene.add(mono);

                // Sockets (Les 7 fragments)
                for(let i=0; i<7; i++){
                    const angle = (i/7)*Math.PI*2;
                    const socket = new THREE.Mesh(
                        new THREE.IcosahedronGeometry(0.12, 1),
                        new THREE.MeshBasicMaterial({color: 0x00ffcc, wireframe:true, transparent:true, opacity:0.3})
                    );
                    socket.position.set(Math.cos(angle)*0.8, (i*0.5)-1, Math.sin(angle)*0.8);
                    mono.add(socket);
                }

                scene.add(new THREE.PointLight(0x00ffcc, 2, 10));
                scene.add(new THREE.AmbientLight(0x111111));

                // Relance de la boucle de rendu sans WebXR
                function sanctuaryLoop() {
                    if (gameMode !== 'sanctuary') return;
                    requestAnimationFrame(sanctuaryLoop);
                    mono.rotation.y += 0.005;
                    renderer.render(scene, camera);
                }
                sanctuaryLoop();

                flashOverlay.style.transition = "opacity 2s";
                flashOverlay.style.opacity = '0';
            }, 500);
        }

        document.getElementById('btn-continue').addEventListener('click', () => location.reload());
    </script>
</body>
</html>
