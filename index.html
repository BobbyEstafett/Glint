<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GLINT - The Great Slumber</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <style>
        :root {
            --bg-night: #0b0d14;
            --glass-bg: rgba(20, 25, 40, 0.45);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-title: #ffffff;
            --text-body: rgba(255, 255, 255, 0.8);
            --accent-pure: #8be9fd;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-night);
            color: var(--text-body);
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            -webkit-font-smoothing: antialiased;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.15'/%3E%3C/svg%3E");
            mix-blend-mode: overlay;
            z-index: 9999;
            pointer-events: none;
        }

        h1,
        h2,
        h3,
        .serif {
            font-family: 'Playfair Display', serif;
            color: var(--text-title);
            font-weight: normal;
            text-wrap: balance;
        }

        #transition-veil {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: var(--bg-night);
            z-index: 999999;
            opacity: 1;
            transition: opacity 1.2s ease-in-out;
            pointer-events: none;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
        }

        #threejs-radar-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #dream-veil {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, transparent 0%, rgba(11, 13, 20, 0.8) 100%);
            pointer-events: none;
            z-index: 2;
        }

        .edge-glow {
            position: absolute;
            top: 0;
            width: 80px;
            height: 100vh;
            pointer-events: none;
            z-index: 90;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        #glow-left {
            left: 0;
        }

        #glow-right {
            right: 0;
        }

        #radar-ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 80px;
            box-sizing: border-box;
            z-index: 10;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1.5s ease;
        }

        .info-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 30px 20px;
            text-align: center;
            width: 85%;
            max-width: 350px;
            height: 300px;
            pointer-events: auto;
            box-sizing: border-box;
            transition: box-shadow 1s ease;
        }

        .panel-blobs {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            opacity: 0.3;
            border-radius: 20px;
            overflow: hidden;
        }

        .panel-blob {
            position: absolute;
            filter: blur(40px);
            opacity: 0.6;
        }

        .panel-blob.b1 {
            animation: driftBlob1 20s linear infinite;
        }

        .panel-blob.b2 {
            animation: driftBlob2 15s linear infinite reverse;
        }

        .info-top {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100px;
            width: 100%;
        }

        .info-mid {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            width: 100%;
        }

        .info-bottom {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            height: 20px;
            width: 100%;
        }

        .main-title {
            font-size: 1.5rem;
            letter-spacing: 2px;
            margin: 0 0 10px 0;
            line-height: 1;
        }

        #distance-display {
            font-size: 2rem;
            font-weight: 200;
            margin: 0;
            color: var(--text-title);
            line-height: 1;
            display: flex;
            align-items: center;
        }

        #status-display {
            font-weight: 200;
            font-size: 0.8rem;
            margin: 0;
            line-height: 1.2;
            text-wrap: balance;
            height: 2em;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .data-stream {
            font-size: 0.65rem;
            color: var(--text-body);
            margin: 0;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.6;
            line-height: 1;
        }

        button {
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            margin: 0;
            height: 55px;
            width: 100%;
            box-sizing: border-box;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-title);
            font-family: 'Montserrat', sans-serif;
            font-weight: 400;
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: all 0.4s ease;
            line-height: 1;
        }

        button:active {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(0.98);
        }

        #recalc-btn {
            display: none;
            font-size: 0.65rem;
            border: none;
            opacity: 0.5;
            height: 40px;
            background: transparent;
            margin-top: 15px;
        }

        #ar-container {
            width: 100%;
            display: none;
        }

        #ARButton {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid var(--accent-pure) !important;
            color: var(--accent-pure) !important;
            font-family: 'Montserrat', sans-serif !important;
            font-weight: 600 !important;
            letter-spacing: 2px !important;
            position: relative !important;
            bottom: auto !important;
            left: auto !important;
            transform: none !important;
            width: 100% !important;
            max-width: 100% !important;
            margin: 0 !important;
            height: 55px !important;
            border-radius: 50px !important;
            box-shadow: 0 0 15px var(--accent-pure) !important;
        }

        #xr-ui {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: fit-content;
            z-index: 100;
            pointer-events: none;
            text-align: center;
            display: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 0.8rem;
            letter-spacing: 2px;
            font-weight: 600;
            transition: all 0.4s ease;
        }

        .fade-in-seq {
            opacity: 0;
            animation: fadeInAnim 1.5s ease forwards;
        }

        .delay-1 {
            animation-delay: 0.3s;
        }

        .delay-2 {
            animation-delay: 0.6s;
        }

        .delay-3 {
            animation-delay: 0.9s;
        }

        @keyframes fadeInAnim {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* --- STYLES COMMUNS POUR LA FICHE ARTEFACT --- */
        .fs-fiche {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-night) !important;
            z-index: 3000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            overflow: hidden;
        }

        .fs-blobs-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .fs-blob {
            position: absolute;
            filter: blur(70px);
            opacity: 0.7;
            mix-blend-mode: screen;
        }

        .fs-blob.b1 {
            animation: driftBlob1 25s linear infinite;
        }

        .fs-blob.b2 {
            animation: driftBlob2 20s linear infinite reverse;
        }

        @keyframes driftBlob1 {
            0% {
                border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
                transform: translate(-10%, -10%) rotate(0deg) scale(1);
            }

            33% {
                border-radius: 70% 30% 50% 50% / 30% 30% 70% 70%;
                transform: translate(20%, 15%) rotate(120deg) scale(1.3);
            }

            66% {
                border-radius: 100% 60% 60% 100% / 100% 100% 60% 60%;
                transform: translate(-15%, 20%) rotate(240deg) scale(0.9);
            }

            100% {
                border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
                transform: translate(-10%, -10%) rotate(360deg) scale(1);
            }
        }

        @keyframes driftBlob2 {
            0% {
                border-radius: 60% 40% 30% 70% / 60% 50% 40% 50%;
                transform: translate(10%, 10%) rotate(0deg) scale(1);
            }

            33% {
                border-radius: 30% 70% 70% 30% / 50% 40% 60% 50%;
                transform: translate(-20%, -15%) rotate(120deg) scale(1.4);
            }

            66% {
                border-radius: 50% 50% 30% 70% / 40% 60% 50% 50%;
                transform: translate(15%, -20%) rotate(240deg) scale(0.8);
            }

            100% {
                border-radius: 60% 40% 30% 70% / 60% 50% 40% 50%;
                transform: translate(10%, 10%) rotate(360deg) scale(1);
            }
        }

        .fs-content {
            position: relative;
            z-index: 2;
            width: 85%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .artifact-3d-canvas {
            width: 250px;
            height: 250px;
            margin: 0 auto 10px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            filter: drop-shadow(0 20px 30px rgba(0, 0, 0, 0.5));
        }

        .fs-content h2 {
            font-family: 'Playfair Display', serif;
            font-weight: 400;
            font-size: 1.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 0 0 15px 0;
            color: #fff;
            text-align: center;
        }

        .fs-content .artifact-lore {
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.9);
            text-align: center;
            line-height: 1.6;
            margin-bottom: 25px;
            text-wrap: balance;
        }

        .clean-divider {
            border: none;
            border-top: 1px solid rgba(255, 255, 255, 0.4);
            width: 100%;
            margin: 0 0 20px 0;
        }

        .clean-stats {
            width: 100%;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 2px;
        }

        .clean-stats p {
            margin: 12px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .clean-stats .lbl {
            opacity: 0.7;
            text-transform: uppercase;
            font-weight: 400;
        }

        .clean-stats .val {
            font-weight: 300;
            color: #fff;
            letter-spacing: 1px;
        }

        .clean-stats .val.resonance {
            font-family: 'Montserrat', sans-serif;
            font-weight: 400;
            letter-spacing: 4px;
            color: var(--accent-pure);
            text-transform: uppercase;
        }

        .clean-btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 40px;
            width: 100%;
        }

        .clean-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 30px;
            color: #fff;
            height: 50px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.3s;
        }

        .clean-btn:active {
            background: rgba(255, 255, 255, 0.1);
        }

        /* --- THE SANCTUARY (CARTE V5 RÉTABLIE) --- */
        #sanctuary-ui {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #0b0d14;
            z-index: 5000;
            display: none;
            flex-direction: column;
            padding: 50px 0 20px 0;
            box-sizing: border-box;
            overflow: hidden;
        }

        .sanctuary-header {
            text-align: center;
            margin-bottom: 20px;
            flex-shrink: 0;
            padding: 0 20px;
        }

        .sanctuary-header h2 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            margin: 0;
            letter-spacing: 6px;
            font-size: 1.2rem;
            color: #fff;
            text-transform: uppercase;
        }

        .sanctuary-header p {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 5px;
        }

        /* Map Container Standard */
        .map-wrapper {
            padding: 0 20px;
            margin-bottom: 20px;
            flex-shrink: 0;
        }

        #memory-map {
            width: 100%;
            height: 180px;
            border-radius: 15px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--glass-border);
            z-index: 1;
            display: none;
            overflow: hidden;
        }

        .leaflet-control-attribution {
            display: none !important;
        }

        /* Nœuds et Constellation */
        .pulsing-node {
            width: 12px;
            height: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 500;
        }

        .artifact-core {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            z-index: 10;
        }

        .artifact-halo {
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            opacity: 0.8;
            animation: pulseHalo 2s infinite ease-out;
        }

        @keyframes pulseHalo {
            0% {
                transform: scale(1);
                opacity: 0.8;
            }

            100% {
                transform: scale(2.5);
                opacity: 0;
            }
        }

        .constellation {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 20px 0;
        }

        .star {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--glass-border);
            margin: 0 4px;
            transition: all 1s;
        }

        .star-link {
            height: 1px;
            width: 12px;
            background: var(--glass-border);
            transition: background 1s;
        }

        .final-revelation {
            font-family: 'Montserrat', sans-serif;
            font-weight: 400;
            font-size: 1rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 30px;
            padding: 0 20px;
            font-style: normal;
            animation: fadeInAnim 3s forwards;
            text-wrap: balance;
            color: var(--text-title);
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
        }

        /* --- CARROUSEL COVERFLOW STACKÉ --- */
        .sanctuary-list {
            position: relative;
            /* Référence absolue pour les calculs JS */
            flex: 1 1 auto;
            display: flex;
            flex-direction: row;
            gap: 0px;
            /* Les cartes sont gérées par translateX */
            overflow-x: auto;
            overflow-y: hidden;
            /* 110px = moitié de la largeur d'une carte (220/2). On soustrait les margins CSS du JS plus loin */
            padding: 20px calc(50vw - 70px);
            scroll-snap-type: x mandatory;
            scrollbar-width: none;
            align-items: center;
            scroll-behavior: smooth;
        }

        .sanctuary-list::-webkit-scrollbar {
            display: none;
        }

        .slot-wrapper {
            position: relative;
            width: 140px; 
            height: 340px;
            flex-shrink: 0;
            scroll-snap-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .fragment-slot {
            position: absolute;
            display: flex;
            flex-direction: column;
            width: 220px;
            height: 340px;
            background: rgba(18, 20, 28, 0.65);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            overflow: hidden;
            backdrop-filter: blur(15px);
            transition: box-shadow 0.3s ease;
            will-change: transform, opacity, z-index;
        }

        .fragment-slot.active-card {
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8);
        }

        .slot-content {
            position: relative;
            z-index: 2;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100%;
            box-sizing: border-box;
            text-align: center;
        }

        @keyframes morphCardBlob {
            0% {
                border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
                transform: rotate(0deg) scale(1) translate(0, 0);
            }

            33% {
                border-radius: 70% 30% 50% 50% / 30% 30% 70% 70%;
                transform: rotate(120deg) scale(1.3) translate(10%, -10%);
            }

            66% {
                border-radius: 100% 60% 60% 100% / 100% 100% 60% 60%;
                transform: rotate(240deg) scale(0.8) translate(-10%, 15%);
            }

            100% {
                border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
                transform: rotate(360deg) scale(1) translate(0, 0);
            }
        }

        .card-blob {
            position: absolute;
            width: 150%;
            height: 150%;
            filter: blur(45px);
            opacity: 0.6;
            z-index: 0;
            animation: morphCardBlob 12s linear infinite;
            mix-blend-mode: screen;
        }

        .fragment-slot:not(.found) {
            background: rgba(18, 20, 28, 0.3);
            border: 1px dashed rgba(255, 255, 255, 0.05);
        }

        .clickable-slot {
            cursor: pointer;
        }

        .slot-content .slot-title {
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            font-size: 0.65rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.5;
            margin-bottom: auto;
        }

        .slot-content .slot-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            font-weight: 400;
            opacity: 0.3;
            text-transform: uppercase;
            margin-top: auto;
            margin-bottom: 10px;
            line-height: 1.1;
        }

        .fragment-slot.found .slot-name {
            opacity: 1;
            color: var(--text-title);
        }

        .slot-content .slot-word {
            font-family: 'Montserrat', sans-serif;
            font-weight: 400;
            font-size: 1rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-align: center;
            opacity: 0;
        }

        /* --- ANIMATION DE RÉVÉLATION (NOUVELLE CARTE TROUVÉE) --- */
        .fragment-slot.just-found .card-blob {
            animation: revealBlob 1.5s cubic-bezier(0.1, 0.8, 0.2, 1) forwards, morphCardBlob 12s linear infinite 1.5s;
            opacity: 0;
            transform: scale(0);
        }

        @keyframes revealBlob {
            0% { opacity: 0; transform: scale(0); filter: blur(10px) brightness(3); }
            100% { opacity: 0.6; transform: scale(1); filter: blur(45px) brightness(1); }
        }

        .fragment-slot.just-found .slot-name {
            opacity: 0;
            animation: revealText 1s ease-out 1.2s forwards;
        }

        @keyframes revealText {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .fragment-slot.just-found .slot-word {
            opacity: 0 !important;
            animation: revealWord 1.5s ease-out 1.8s forwards;
        }

        @keyframes revealWord {
            0% { opacity: 0; text-shadow: 0 0 30px currentColor; filter: brightness(2); transform: scale(1.1); }
            100% { opacity: 1; text-shadow: 0 0 0px transparent; filter: brightness(1); transform: scale(1); }
        }

        .sanctuary-footer {
            flex-shrink: 0;
            margin-top: 10px;
            padding: 0 20px env(safe-area-inset-bottom, 10px) 20px;
        }

        #btn-back-radar {
            border-color: transparent;
        }

        #btn-reset {
            border-color: transparent;
            opacity: 0.5;
            font-size: 0.6rem;
            margin-top: 10px;
        }

        /* --- DIVERS --- */
        #flash-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #fff;
            z-index: 8000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease-out;
        }

        #apotheosis-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-night);
            z-index: 9999999;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;

    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/addons/webxr/ARButton.js';

        let audioCtx = null;
        function getAudioCtx() {
            if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
            if (audioCtx.state === 'suspended') { audioCtx.resume(); }
            return audioCtx;
        }

        function playUISound(type) {
            const ctx = getAudioCtx(); const t = ctx.currentTime;
            function sparkle(freq, delay, duration, vol) {
                const osc = ctx.createOscillator(); const gain = ctx.createGain();
                osc.type = 'sine'; osc.frequency.value = freq;
                osc.connect(gain); gain.connect(ctx.destination);
                gain.gain.setValueAtTime(0, t + delay);
                gain.gain.linearRampToValueAtTime(vol, t + delay + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.001, t + delay + duration);
                osc.start(t + delay); osc.stop(t + delay + duration);
            }
            if (type === 'action') { sparkle(1200, 0.00, 0.6, 0.08); sparkle(1500, 0.05, 0.6, 0.08); sparkle(2000, 0.10, 0.8, 0.1); sparkle(2800, 0.15, 1.0, 0.15); }
            else if (type === 'click') { sparkle(2400, 0.0, 0.15, 0.08); sparkle(3200, 0.02, 0.1, 0.04); }
            else if (type === 'transition') { sparkle(3200, 0.00, 0.4, 0.05); sparkle(2600, 0.05, 0.4, 0.08); sparkle(2000, 0.10, 0.5, 0.1); sparkle(1400, 0.15, 0.6, 0.1); }
            else if (type === 'success') {
                const freqs = [1046.50, 1318.51, 1567.98, 2093.00, 2637.02, 3135.96];
                freqs.forEach((f, i) => { let jitter = Math.random() * 0.15; sparkle(f, 0.05 + jitter, 2.5, 0.08); sparkle(f * 1.01, 0.1 + jitter, 2.0, 0.04); });
            }
            else if (type === 'apotheosis') {
                const oscDrone = ctx.createOscillator(); const gainDrone = ctx.createGain();
                oscDrone.type = 'sine'; oscDrone.frequency.value = 55;
                oscDrone.connect(gainDrone); gainDrone.connect(ctx.destination);
                gainDrone.gain.setValueAtTime(0, t);
                gainDrone.gain.linearRampToValueAtTime(0.3, t + 5);
                gainDrone.gain.exponentialRampToValueAtTime(0.001, t + 18);
                oscDrone.start(t); oscDrone.stop(t + 18);

                [440, 554.37, 659.25, 880].forEach((f, i) => {
                    const osc = ctx.createOscillator(); const g = ctx.createGain();
                    osc.type = 'triangle'; osc.frequency.value = f;
                    osc.connect(g); g.connect(ctx.destination);
                    g.gain.setValueAtTime(0, t);
                    g.gain.linearRampToValueAtTime(0.05, t + 3 + (i * 1.5));
                    g.gain.exponentialRampToValueAtTime(0.001, t + 18);
                    osc.start(t); osc.stop(t + 18);
                });
            }
        }

        window.addEventListener('load', () => { setTimeout(() => document.getElementById('transition-veil').style.opacity = '0', 200); });
        function navigateTo(url) { document.getElementById('transition-veil').style.opacity = '1'; setTimeout(() => window.location.href = url, 1200); }
        function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

        function getRGB(rgbaString) {
            if (!rgbaString) return 'rgb(255,255,255)';
            return rgbaString.replace(/rgba\((.*),\s*[\d.]+\)/, 'rgb($1)');
        }

        const ARTIFACTS_DATA = [
            { id: 0, colorHex: 0x8be9fd, color1: new THREE.Color(0x0a3c96), color2: new THREE.Color(0x8be9fd), cssColor: "rgba(139, 233, 253, 1)", shape: "octahedron", audioFreqs: [440, 493.88, 554.37, 659.25, 739.99], shaderMod: "water", name: "The First Drop", word: "WE", lore: "« A crystallized fragment of a waking mind. It still pulses with a phantom warmth. »" },
            { id: 1, colorHex: 0xffb86c, color1: new THREE.Color(0x961432), color2: new THREE.Color(0xffb86c), cssColor: "rgba(255, 184, 108, 1)", shape: "tetrahedron", audioFreqs: [440, 466.16, 554.37, 587.33, 659.25], shaderMod: "wobble", name: "Liquid Memory", word: "HAVE", lore: "« A tear frozen within the Great Slumber. It holds the faint echo of a faceless laugh. »" },
            { id: 2, colorHex: 0x1e90ff, color1: new THREE.Color(0x280a78), color2: new THREE.Color(0x1e90ff), cssColor: "rgba(30, 144, 255, 1)", shape: "box", audioFreqs: [440, 493.88, 554.37, 622.25, 698.46], shaderMod: "pixelate", name: "The Weight of Absence", word: "FORGOTTEN", lore: "« The silence between two dreams. An absence that weighs heavily on the illusion. »" },
            { id: 3, colorHex: 0xff79c6, color1: new THREE.Color(0x500a64), color2: new THREE.Color(0xff79c6), cssColor: "rgba(255, 121, 198, 1)", shape: "cone", audioFreqs: [440, 493.88, 554.37, 622.25, 659.25], shaderMod: "split", name: "Ashen Vector", word: "HOW", lore: "« A direction without a destination, engraved in glass. It points relentlessly into the void. »" },
            { id: 4, colorHex: 0x50fa7b, color1: new THREE.Color(0x0a6464), color2: new THREE.Color(0x50fa7b), cssColor: "rgba(80, 250, 123, 1)", shape: "icosahedron", audioFreqs: [440, 587.33, 659.25, 880, 1174.66], shaderMod: "pulse", name: "Pulsating Core", word: "TO", lore: "« The primordial beat of a waking heart. I dream, therefore I fade. »" },
            { id: 5, colorHex: 0xf1fa8c, color1: new THREE.Color(0xb43278), color2: new THREE.Color(0xf1fa8c), cssColor: "rgba(241, 250, 140, 1)", shape: "cylinder", audioFreqs: [440, 554.37, 659.25, 880, 1108.73], shaderMod: "mirror", name: "Dawn Prism", word: "BE", lore: "« Light bends where the dream meets reality. The boundary begins to fracture. »" },
            { id: 6, colorHex: 0xffffff, color1: new THREE.Color(0x647896), color2: new THREE.Color(0xffffff), cssColor: "rgba(255, 255, 255, 1)", shape: "sphere", audioFreqs: [220, 440, 880, 1760, 3520], shaderMod: "bloom", name: "The Acceptance", word: "REAL", lore: "« The endpoint of the slumber. The moment the illusion finally surrenders. »" }
        ];

        let rawState = localStorage.getItem('glint_save_v4');
        let gameState = rawState ? JSON.parse(rawState) : { foundNodes: [], apotheosisPlayed: false, onboardingDone: false };
        if (!gameState || !Array.isArray(gameState.foundNodes)) {
            gameState = { foundNodes: [], apotheosisPlayed: false, onboardingDone: false };
            localStorage.setItem('glint_save_v4', JSON.stringify(gameState));
        }

        const urlParams = new URLSearchParams(window.location.search);
        let isSanctuaryView = urlParams.get('view') === 'sanctuary';
        
        let newShardId = urlParams.get('newShard'); 

        function pickRandomUnfound() {
            let unfound = [];
            for (let i = 0; i < 7; i++) {
                if (!gameState.foundNodes.find(n => n.id === i)) unfound.push(i);
            }
            if (unfound.length === 0) return null;
            let randomIndex = Math.floor(Math.random() * unfound.length);
            return unfound[randomIndex];
        }

        let activeProfile = ARTIFACTS_DATA[0];

        /* --- MOTEUR 3D "HOLO GLASS" --- */
        let uiScene, uiCamera, uiRenderer, uiMesh;

        const holoVertexShader = `
            varying vec3 vNormal;
            varying vec3 vPosition;
            void main() {
                vNormal = normalize(normalMatrix * normal);
                vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                vPosition = -mvPosition.xyz;
                gl_Position = projectionMatrix * mvPosition;
            }
        `;

        const holoFragmentShader = `
            uniform vec3 color1;
            uniform vec3 color2;
            varying vec3 vNormal;
            varying vec3 vPosition;
            
            void main() {
                vec3 viewDir = normalize(vPosition);
                float fresnel = 1.0 - max(dot(viewDir, vNormal), 0.0);
                float rimPower = pow(fresnel, 3.0);
                float glowPower = pow(fresnel, 1.5);
                
                vec3 coreColor = vec3(0.05, 0.05, 0.08); 
                vec3 edgeColor = mix(color1, color2, vNormal.y * 0.5 + 0.5); 
                
                vec3 finalColor = mix(coreColor, edgeColor, glowPower);
                finalColor += vec3(1.0) * rimPower * 0.8;
                
                gl_FragColor = vec4(finalColor, 0.85 + (rimPower * 0.15));
            }
        `;

        const holoUniforms = {
            color1: { value: new THREE.Color(0x0a3c96) },
            color2: { value: new THREE.Color(0x8be9fd) }
        };

        function getGeometry(shapeName) {
            const s = 1.2;
            switch (shapeName) {
                case 'tetrahedron': return new THREE.TetrahedronGeometry(0.06 * s, 0);
                case 'box': return new THREE.BoxGeometry(0.08 * s, 0.08 * s, 0.08 * s);
                case 'cone': return new THREE.ConeGeometry(0.05 * s, 0.1 * s, 8);
                case 'icosahedron': return new THREE.IcosahedronGeometry(0.06 * s, 0);
                case 'cylinder': return new THREE.CylinderGeometry(0.04 * s, 0.04 * s, 0.1 * s, 8);
                case 'sphere': return new THREE.IcosahedronGeometry(0.05 * s, 2);
                case 'octahedron': default: return new THREE.OctahedronGeometry(0.06 * s, 0);
            }
        }

        function initUI3D() {
            const containerSize = 250;
            uiScene = new THREE.Scene();
            uiCamera = new THREE.PerspectiveCamera(45, 1, 0.01, 10);
            uiCamera.position.z = 0.35;

            uiRenderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            uiRenderer.setSize(containerSize, containerSize);
            uiRenderer.setPixelRatio(window.devicePixelRatio);

            const uiMaterial = new THREE.ShaderMaterial({
                uniforms: holoUniforms,
                vertexShader: holoVertexShader,
                fragmentShader: holoFragmentShader,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });

            uiMesh = new THREE.Mesh(getGeometry('octahedron'), uiMaterial);
            uiScene.add(uiMesh);

            uiRenderer.setAnimationLoop(() => {
                uiMesh.rotation.y += 0.005;
                uiMesh.rotation.x += 0.003;
                uiRenderer.render(uiScene, uiCamera);
            });
        }

        function attachUI3D(containerId, profile) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            container.appendChild(uiRenderer.domElement);

            uiMesh.geometry.dispose();
            uiMesh.geometry = getGeometry(profile.shape);

            holoUniforms.color1.value.copy(profile.color1);
            holoUniforms.color2.value.copy(profile.color2);
        }

        if (gameState.foundNodes.length >= 7 && !isSanctuaryView && gameState.onboardingDone) {
            navigateTo(window.location.pathname + '?view=sanctuary');
        }

        async function playApotheosisSequence() {
            const overlay = document.getElementById('apotheosis-overlay');
            overlay.style.display = 'flex';
            void overlay.offsetWidth;
            overlay.style.opacity = '1';

            playUISound('apotheosis');

            await new Promise(r => setTimeout(r, 2000));

            const words = ARTIFACTS_DATA.map(d => ({ text: d.word, color: d.cssColor }));

            for (let i = 0; i < words.length; i++) {
                const el = document.createElement('div');
                el.className = 'apo-word';
                el.style.color = words[i].color;
                el.innerText = words[i].text;
                overlay.appendChild(el);

                void el.offsetWidth;
                el.classList.add('show');

                await new Promise(r => setTimeout(r, 1800));
                el.classList.remove('show');
                await new Promise(r => setTimeout(r, 1000));
                overlay.removeChild(el);
            }

            await new Promise(r => setTimeout(r, 1000));
            overlay.style.opacity = '0';
            await new Promise(r => setTimeout(r, 2000));
            overlay.style.display = 'none';
        }

        let mapInstance = null;

        function buildSanctuaryList() {
            const listContainer = document.getElementById('sanctuary-list');
            const constelContainer = document.getElementById('constellation');
            const mapContainer = document.getElementById('memory-map');
            listContainer.innerHTML = '';

            if (gameState.foundNodes.length > 0) {
                constelContainer.style.display = 'none';
                mapContainer.style.display = 'block';

                setTimeout(() => {
                    if (!mapInstance) {
                        mapInstance = L.map('memory-map', { zoomControl: false, attributionControl: false }).setView([gameState.foundNodes[0].lat, gameState.foundNodes[0].lon], 16);
                        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(mapInstance);
                    }

                    mapInstance.invalidateSize();

                    mapInstance.eachLayer((layer) => {
                        if (!!layer.toGeoJSON) mapInstance.removeLayer(layer);
                    });

                    let latlngs = [];

                    gameState.foundNodes.forEach((node) => {
                        const profile = ARTIFACTS_DATA.find(p => p.id === node.id);
                        latlngs.push([node.lat, node.lon]);

                        const pulsingIcon = L.divIcon({
                            className: 'pulsing-node',
                            html: `<div class="artifact-core" style="background:${profile.cssColor};"></div><div class="artifact-halo" style="background:${profile.cssColor};"></div>`,
                            iconSize: [12, 12]
                        });
                        L.marker([node.lat, node.lon], { icon: pulsingIcon }).addTo(mapInstance);
                    });

                    if (latlngs.length > 1) {
                        L.polyline(latlngs, {
                            color: 'rgba(255, 215, 0, 0.4)',
                            weight: 3,
                            opacity: 0.6,
                            lineJoin: 'round',
                            smoothFactor: 1
                        }).addTo(mapInstance);
                    }

                    if (latlngs.length > 1) { mapInstance.fitBounds(L.polyline(latlngs).getBounds(), { padding: [20, 20] }); }
                }, 100);
            } else {
                constelContainer.innerHTML = '';
                for (let i = 0; i < 7; i++) {
                    let star = document.createElement('div'); star.className = 'star'; constelContainer.appendChild(star);
                    if (i < 6) { let link = document.createElement('div'); link.className = 'star-link'; constelContainer.appendChild(link); }
                }
            }

            if (gameState.foundNodes.length >= 7) {
                document.getElementById('btn-back-radar').style.display = 'none';
                document.getElementById('btn-reset').style.display = 'block';
                let rev = document.createElement('div'); rev.className = 'final-revelation';
                rev.innerText = "«\u00A0WE HAVE FORGOTTEN HOW TO BE REAL\u00A0»";
                document.getElementById('sanctuary-ui').insertBefore(rev, listContainer);
            }

            ARTIFACTS_DATA.forEach((profile, index) => {
                const isFound = gameState.foundNodes.find(n => n.id === index) !== undefined;
                
                const wrapper = document.createElement('div');
                wrapper.className = 'slot-wrapper';

                const slot = document.createElement('div');
                slot.className = `fragment-slot ${isFound ? 'found clickable-slot' : ''}`;

                let wordColorStyle = `color: ${isFound ? profile.cssColor : ''}; opacity: ${isFound ? '1' : '0'};`;
                if (newShardId !== null && parseInt(newShardId) === index) {
                    slot.classList.add('just-found');
                    wordColorStyle = `color: ${profile.cssColor};`;
                }

                let blobHtml = '';
                if (isFound) {
                    let blobTop = Math.floor(Math.random() * 60) - 30;
                    let blobLeft = Math.floor(Math.random() * 80) - 20;
                    blobHtml = `<div class="card-blob" style="background: radial-gradient(circle, rgba(${profile.color2.r * 255},${profile.color2.g * 255},${profile.color2.b * 255},0.8) 0%, rgba(${profile.color1.r * 255},${profile.color1.g * 255},${profile.color1.b * 255},0.8) 80%); top: ${blobTop}%; left: ${blobLeft}%;"></div>`;

                    slot.addEventListener('click', () => {
                        if (!slot.classList.contains('active-card')) {
                            const targetLeft = wrapper.offsetLeft - listContainer.clientWidth / 2 + wrapper.offsetWidth / 2;
                            listContainer.scrollTo({ left: targetLeft, behavior: 'smooth' });
                            return;
                        }

                        playUISound('click');
                        document.documentElement.style.setProperty('--accent-pure', profile.cssColor);

                        document.getElementById('review-art-name').innerText = profile.name;
                        document.getElementById('review-art-lore').innerHTML = profile.lore;
                        document.getElementById('review-word').innerText = `"${profile.word}"`;
                        document.getElementById('review-word').style.color = profile.cssColor;

                        document.getElementById('review-progress').innerText = `${index + 1} / 7`;
                        let nodeData = gameState.foundNodes.find(n => n.id === index);
                        let latVal = (nodeData && typeof nodeData.lat === 'number') ? nodeData.lat : 0;
                        let lonVal = (nodeData && typeof nodeData.lon === 'number') ? nodeData.lon : 0;
                        document.getElementById('review-gps').innerText = `${latVal.toFixed(3)}, ${lonVal.toFixed(3)}`;

                        document.getElementById('review-bg-blob1').style.background = `rgba(${profile.color1.r * 255},${profile.color1.g * 255},${profile.color1.b * 255},0.8)`;
                        document.getElementById('review-bg-blob2').style.background = `rgba(${profile.color2.r * 255},${profile.color2.g * 255},${profile.color2.b * 255},0.8)`;

                        attachUI3D('review-3d-container', profile);
                        document.getElementById('review-ui').style.display = 'flex';

                const containerCenter = listContainer.scrollLeft + listContainer.clientWidth / 2;

                    const wrapperCenter = wrapper.offsetLeft + wrapper.offsetWidth / 2;
                    const distance = wrapperCenter - containerCenter;
                    
                    const step = wrapper.offsetWidth; 
                    let normalizedDistance = distance / step;
                    
                    if(normalizedDistance > 3) normalizedDistance = 3;
                    if(normalizedDistance < -3) normalizedDistance = -3;

                    const absOffset = Math.abs(normalizedDistance);

                    let scale = 1 - absOffset * 0.15;
                    if (scale < 0.7) scale = 0.7;

                    let rotateY = normalizedDistance * -45;
                    if (rotateY > 60) rotateY = 60;
                    if (rotateY < -60) rotateY = -60;

                    let translateX = normalizedDistance * -20; 

                    let zIndex = Math.round(100 - absOffset * 10);
                    let opacity = Math.max(1 - (absOffset * 0.5), 0.2);

                    slot.style.transform = `perspective(1000px) translateX(${translateX}px) scale(${scale}) rotateY(${rotateY}deg)`;
                    slot.style.zIndex = zIndex;
                    slot.style.opacity = opacity;

                    if (absOffset < 0.5) {
                        if (!slot.classList.contains('active-card')) {
                            slot.classList.add('active-card');

                videoElement.setAttribute('playsinline', ''); videoElement.setAttribute('autoplay', ''); videoElement.setAttribute('muted', '');
                videoElement.srcObject = stream; videoElement.play();

                radarScene = new THREE.Scene(); radarCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
                radarRenderer = new THREE.WebGLRenderer(); radarRenderer.setSize(window.innerWidth, window.innerHeight); container.appendChild(radarRenderer.domElement);
                videoTexture = new THREE.VideoTexture(videoElement);

                updateRadarShader(activeProfile);
                renderRadar();
            }

            function updateRadarShader(profile) {
                if (!radarScene || !videoTexture) return;

                while (radarScene.children.length > 0) {
                    let child = radarScene.children[0]; radarScene.remove(child);
                    if (child.material) child.material.dispose(); if (child.geometry) child.geometry.dispose();
                }

                let uvMod = ""; let isSplit = false; let isBloom = false;
                switch (profile.shaderMod) {
                    case "wobble": uvMod = "uv.x += sin(uv.y * 50.0 + time * 10.0) * 0.02 * intensity;"; break;
                    case "pixelate": uvMod = "if(intensity > 0.0) { float pixels = max(10.0, 100.0 - (intensity * 90.0)); uv = mix(uv, floor(uv * pixels) / pixels, smoothstep(0.0, 0.2, intensity)); }"; break;
                    case "split": isSplit = true; break;
                    case "pulse": uvMod = "uv -= 0.5; uv *= 1.0 - (sin(time * 8.0) * 0.15 * intensity); uv += 0.5;"; break;
                    case "mirror": uvMod = "if(intensity>0.1){ uv = abs(uv - 0.5) + 0.5; uv -= vec2(intensity * 0.1); }"; break;
                    case "bloom": isBloom = true; break;
                    case "water": default: uvMod = "uv += vec2(sin(uv.y * 15.0 + time * 1.5), cos(uv.x * 15.0 + time * 1.2)) * 0.015 * intensity;"; break;
                }

                let hex = profile.colorHex;
                let rTint = ((hex >> 16) & 255) / 255; let gTint = ((hex >> 8) & 255) / 255; let bTint = (hex & 255) / 255;

                shaderMaterial = new THREE.ShaderMaterial({
                    uniforms: { tDiffuse: { value: videoTexture }, intensity: { value: 0 }, time: { value: 0 } },
                    vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = vec4(position, 1.0); }`,
                    fragmentShader: `
                        uniform sampler2D tDiffuse; uniform float intensity; uniform float time; varying vec2 vUv;
                        void main() {
                            vec2 uv = vUv;
                            ${uvMod}
                            float splitDist = ${isSplit ? '0.05' : '0.01'} * intensity;
                            float r = texture2D(tDiffuse, uv + vec2(splitDist, 0.0)).r;
                            float g = texture2D(tDiffuse, uv).g;
                            float b = texture2D(tDiffuse, uv - vec2(splitDist, 0.0)).b;
                            vec3 color = vec3(r, g, b);
                            float lum = dot(color, vec3(0.299, 0.587, 0.114));
                            vec3 dreamTint = vec3(${rTint}, ${gTint}, ${bTint}); 
                            vec3 finalColor = mix(color, dreamTint * lum * 2.0, intensity * 0.8);
                            float dist = distance(vUv, vec2(0.5));
                            finalColor += dreamTint * smoothstep(0.4, 0.0, dist) * intensity * 0.6;
                            ${isBloom ? 'finalColor *= 1.0 + (intensity * 2.0);' : ''}
                            gl_FragColor = vec4(finalColor, 1.0);
                        }
                    `
                });
                const quad = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), shaderMaterial); radarScene.add(quad);
            }

            let clock = new THREE.Clock();
            function renderRadar() { if (radarRenderer && shaderMaterial) { requestAnimationFrame(renderRadar); shaderMaterial.uniforms.time.value = clock.getElapsedTime(); radarRenderer.render(radarScene, radarCamera); } }

            function playGlitchPop(intensity) {
                const ctx = getAudioCtx();
                if (!ctx || intensity <= 0 || !activeProfile) return;
                const osc = ctx.createOscillator(); const gain = ctx.createGain();
                osc.type = 'sine';
                const freqs = activeProfile.audioFreqs;
                osc.frequency.value = freqs[Math.floor(Math.random() * freqs.length)];
                osc.connect(gain); gain.connect(ctx.destination); osc.start();
                gain.gain.setValueAtTime(0, ctx.currentTime); gain.gain.linearRampToValueAtTime(0.15 * intensity, ctx.currentTime + 0.1); gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.5);
                osc.stop(ctx.currentTime + 1.5);
            }

            function radarLoop() {
                clearTimeout(radarTimeout);
                let intensity = 0; if (currentDistance <= glitchStartDistance) { intensity = 1 - (currentDistance / glitchStartDistance); }
                if (intensity > 0) playGlitchPop(intensity);
                let delay = 2000; if (intensity > 0) delay = 200 + ((1 - intensity) * 1500);
                radarTimeout = setTimeout(radarLoop, delay);
            }

            function calculateDistance(lat1, lon1, lat2, lon2) {
                const R = 6371e3; const p1 = lat1 * Math.PI / 180; const p2 = lat2 * Math.PI / 180;
                const dp = (lat2 - lat1) * Math.PI / 180; const dl = (lon2 - lon1) * Math.PI / 180;
                const a = Math.sin(dp / 2) * Math.sin(dp / 2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dl / 2) * Math.sin(dl / 2);
                return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            }

        }

        initUI3D();
    </script>
</body>
