<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GLINT - L.U.C.I.D Terminal</title>
    <style>
        :root {
            --bg-color: #e0e5ec;
            --text-main: #4a5568;
            --text-light: #a0aec0;
            --accent-hot: #7f9cf5;  
            --accent-mid: #fbd38d;  
            --accent-cold: #fc8181; 
            --shadow-light: #ffffff;
            --shadow-dark: #a3b1c6;
        }

        body { 
            margin: 0; padding: 0; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden; height: 100vh;
        }

        /* --- STRUCTURE GLOBALE (L'OUTIL) --- */
        #main-container {
            display: grid;
            grid-template-rows: auto 1fr auto;
            height: 100vh;
            width: 100vw;
            padding: 20px;
            box-sizing: border-box;
            gap: 15px;
        }

        .device-header { text-align: center; padding-top: env(safe-area-inset-top); }
        .device-header h1 { margin: 0; font-size: 1rem; font-weight: 900; letter-spacing: 5px; opacity: 0.7; }

        /* --- L'ÉCRAN (LUCARNE) --- */
        #screen-frame {
            position: relative;
            border-radius: 30px;
            overflow: hidden;
            background: #cbd5e0;
            box-shadow: inset 10px 10px 20px var(--shadow-dark), inset -10px -10px 20px var(--shadow-light);
            display: flex; align-items: center; justify-content: center;
        }

        #threejs-radar-container { width: 100%; height: 100%; }
        
        /* Overlay permanent pour garder l'aspect "outil" même en AR */
        #ar-frame-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 30px; border: 4px solid var(--bg-color);
            box-shadow: inset 0 0 40px rgba(0,0,0,0.1);
            pointer-events: none; z-index: 5;
        }

        /* --- INTERFACE DE CONTRÔLE --- */
        .controls {
            display: flex; flex-direction: column; gap: 10px;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .info-panel {
            background: var(--bg-color);
            padding: 15px; border-radius: 20px;
            box-shadow: 6px 6px 12px var(--shadow-dark), -6px -6px 12px var(--shadow-light);
            text-align: center;
        }

        .data-stream { font-family: monospace; font-size: 0.65rem; color: var(--text-light); margin-bottom: 5px; }
        #distance-display { font-size: 1.5rem; font-weight: 200; margin: 5px 0; color: var(--text-main); }
        #status-msg { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }

        button {
            padding: 18px; border-radius: 50px; border: none;
            background: var(--bg-color); color: var(--text-main);
            font-weight: 700; text-transform: uppercase; letter-spacing: 1px; font-size: 0.8rem;
            box-shadow: 6px 6px 12px var(--shadow-dark), -6px -6px 12px var(--shadow-light);
            transition: all 0.3s ease;
        }
        button:active { box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light); }

        /* État Alerte du bouton */
        button.extraction-ready {
            color: var(--accent-cold);
            animation: pulse-red 2s infinite;
        }
        @keyframes pulse-red { 0% { color: var(--accent-cold); } 50% { color: #fff; background: var(--accent-cold); } 100% { color: var(--accent-cold); } }

        #ar-container { width: 100%; display: none; }
        #ARButton { 
            width: 100% !important; position: static !important; 
            background: var(--bg-color) !important; color: var(--accent-cold) !important;
            border-radius: 50px !important; box-shadow: 6px 6px 12px var(--shadow-dark) !important;
        }

        /* HUD AR DISCRET */
        #xr-ui {
            position: absolute; top: 30px; left: 50%; transform: translateX(-50%);
            padding: 10px 20px; border-radius: 50px; background: rgba(255,255,255,0.8);
            font-size: 0.7rem; font-weight: 800; display: none; z-index: 100;
        }

        /* UI RECOMPENSE */
        #artifact-ui {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(224, 229, 236, 0.9); z-index: 9000;
            display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px);
        }
        .card {
            background: var(--bg-color); padding: 30px; border-radius: 30px;
            width: 80%; text-align: center;
            box-shadow: 15px 15px 30px var(--shadow-dark), -15px -15px 30px var(--shadow-light);
        }

        /* --- UI SANCTUAIRE --- */
        #sanctuary-ui {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg-color);
            z-index: 10000; display: none; flex-direction: column; padding: 40px 20px;
        }
        .sanc-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; margin: 20px 0; min-height: 0; }
        .slot { background: var(--bg-color); padding: 15px; border-radius: 20px; box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light); }
        .slot.found { box-shadow: 6px 6px 12px var(--shadow-dark), -6px -6px 12px var(--shadow-light); }
    </style>
</head>
<body>

    <div id="flash-overlay" style="position:fixed; width:100%; height:100%; background:white; z-index:20000; opacity:0; pointer-events:none;"></div>

    <div id="main-container">
        <header class="device-header">
            <h1>L.U.C.I.D</h1>
            <p>V.02 PROTOTYPE</p>
        </header>

        <section id="screen-frame">
            <div id="threejs-radar-container"></div>
            <div id="ar-frame-overlay"></div>
            <div id="xr-ui">SCANNER ACTIF</div>
        </section>

        <footer class="controls">
            <div class="info-panel">
                <div class="data-stream" id="data-stream">IDLE_SYSTEM_READY</div>
                <div id="distance-display">---</div>
                <div id="status-msg">En attente de signal</div>
            </div>
            <button id="start-btn">Initialiser</button>
            <div id="ar-container"></div>
            <button id="recalc-btn" style="padding:10px; font-size:0.6rem; opacity:0.6;">Recalibrer Coordonnées</button>
        </footer>
    </div>

    <div id="artifact-ui">
        <div class="card">
            <h2 id="ui-art-name">ARTEFACT</h2>
            <p id="ui-art-lore" style="font-style:italic; color:var(--text-light); font-size:0.8rem;"></p>
            <div style="margin:20px 0; padding-top:15px; border-top:1px solid #cbd5e0;">
                <p style="font-size:0.7rem; color:var(--accent-hot);">DÉCRYPTAGE : <span id="ui-word" style="font-weight:900; font-size:1.1rem;">---</span></p>
            </div>
            <button id="btn-inventory">Vers l'Archive</button>
            <button id="btn-continue" style="box-shadow:none; opacity:0.5;">Continuer</button>
        </div>
    </div>

    <div id="sanctuary-ui">
        <h2 style="text-align:center; letter-spacing:3px;">ARCHIVE</h2>
        <div class="sanc-list" id="sanc-list"></div>
        <button id="btn-back-radar">Scanner</button>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/addons/webxr/ARButton.js';

        // --- DONNÉES ---
        const ARTIFACTS_DATA = [
            { name: "ÉCLAT MNÉMONIQUE", word: "NOUS", lore: "Une résonance cristallisée d'un futur oublié." },
            { name: "SOUVENIR LIQUIDE", word: "AVONS", lore: "Une larme digitale figée dans le flux du réseau." },
            { name: "FRAGMENT D'ÉCHO", word: "OUBLIÉ", lore: "Le silence entre deux paquets de données." },
            { name: "VECTEUR D'INTENTION", word: "COMMENT", lore: "Une direction sans but, gravée dans l'obsidienne." },
            { name: "NOYAU D'EXISTENCE", word: "ÊTRE", lore: "La pulsation primordiale du code source." },
            { name: "PRISME DE VÉRITÉ", word: "RÉELS", lore: "La lumière se courbe là où la donnée devient chair." },
            { name: "CLEF D'ANCRAGE", word: "...", lore: "Le point final de la fuite." }
        ];

        const urlParams = new URLSearchParams(window.location.search);
        let foundCount = parseInt(urlParams.get('fragment')) || 0;
        let isSanctuaryView = urlParams.get('view') === 'sanctuary';

        if(isSanctuaryView) {
            document.getElementById('main-container').style.display = 'none';
            document.getElementById('sanctuary-ui').style.display = 'flex';
            const list = document.getElementById('sanc-list');
            ARTIFACTS_DATA.forEach((d, i) => {
                const div = document.createElement('div');
                div.className = `slot ${i < foundCount ? 'found' : ''}`;
                div.innerHTML = `<div style="font-size:0.6rem; color:var(--text-light)">LOG_${i+1}</div>
                                 <div style="font-weight:bold">${i < foundCount ? d.name : '---'}</div>
                                 <div style="color:var(--accent-cold); text-align:right; font-weight:900">${i < foundCount ? d.word : '???'}</div>`;
                list.appendChild(div);
            });
        }

        document.getElementById('btn-back-radar').addEventListener('click', () => {
            window.location.href = window.location.pathname + '?fragment=' + foundCount;
        });

        if(!isSanctuaryView) {
            let targetLat, targetLon, startLat, startLon, currentDistance = 999;
            let radarRenderer, radarScene, radarCamera, shaderMaterial, videoTexture;
            let renderer, scene, camera, controller, reticle, hitTestSource, spawnedArtifact;
            const raycaster = new THREE.Raycaster();
            let xrState = 'search';

            document.getElementById('start-btn').addEventListener('click', async () => {
                document.getElementById('start-btn').style.display = 'none';
                document.getElementById('status-msg').innerText = "Analyse en cours...";
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(pos => {
                        startLat = pos.coords.latitude; startLon = pos.coords.longitude;
                        targetLat = startLat + 0.00002; targetLon = startLon + 0.00002;
                        navigator.geolocation.watchPosition(updGPS, null, {enableHighAccuracy:true});
                    });
                }
                const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
                initRadar(stream);
            });

            function updGPS(pos) {
                const R = 6371e3;
                const dLat = (targetLat-pos.coords.latitude)*Math.PI/180;
                const dLon = (targetLon-pos.coords.longitude)*Math.PI/180;
                const a = Math.sin(dLat/2)**2 + Math.cos(pos.coords.latitude*Math.PI/180)*Math.cos(targetLat*Math.PI/180)*Math.sin(dLon/2)**2;
                currentDistance = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                
                document.getElementById('distance-display').innerText = `${Math.round(currentDistance)} m`;
                
                if (currentDistance < 5) {
                    document.getElementById('ar-container').style.display = 'block';
                    document.getElementById('status-msg').innerText = "BRÈCHE IDENTIFIÉE";
                    document.getElementById('start-btn').style.display = 'none';
                    // Le bouton AR est créé par Three.js dans ar-container, on lui donne la classe extraction-ready
                    const ab = document.getElementById('ARButton');
                    if(ab) {
                        ab.classList.add('extraction-ready');
                        ab.innerText = "INITIER L'EXTRACTION";
                    }
                }
                if(shaderMaterial) shaderMaterial.uniforms.intensity.value = Math.max(0, 1-(currentDistance/12));
            }

            function initRadar(stream) {
                const container = document.getElementById('threejs-radar-container');
                radarRenderer = new THREE.WebGLRenderer({antialias:true});
                radarRenderer.setSize(container.clientWidth, container.clientHeight);
                container.appendChild(radarRenderer.domElement);
                radarScene = new THREE.Scene();
                radarCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
                const video = document.createElement('video');
                video.srcObject = stream; video.play();
                videoTexture = new THREE.VideoTexture(video);
                
                shaderMaterial = new THREE.ShaderMaterial({
                    uniforms: { tDiffuse:{value:videoTexture}, intensity:{value:0}, time:{value:0} },
                    vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position=vec4(position,1.0); }`,
                    fragmentShader: `
                        uniform sampler2D tDiffuse; uniform float intensity; uniform float time; varying vec2 vUv;
                        void main(){
                            vec2 uv = vUv;
                            // Effet technologique : grille de pixels
                            vec2 grid = fract(uv * vec2(200.0, 100.0));
                            float line = smoothstep(0.0, 0.1, grid.y);
                            
                            uv.x += sin(time*10.0 + uv.y*100.0) * 0.003 * intensity;
                            vec4 c = texture2D(tDiffuse, uv);
                            float lum = dot(c.rgb, vec3(0.299, 0.587, 0.114));
                            
                            // Mix Prisme et Techno
                            vec3 col = mix(vec3(lum + 0.3), c.rgb, 0.5);
                            col += vec3(0.8, 0.9, 1.0) * intensity * 0.4; // Éclat bleu
                            col *= (0.95 + 0.05 * line); // Micro-lignes
                            
                            gl_FragColor = vec4(col, 1.0);
                        }
                    `
                });
                radarScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2), shaderMaterial));
                
                initXR();
                const clock = new THREE.Clock();
                function anim(){
                    if(xrState !== 'active'){
                        requestAnimationFrame(anim);
                        shaderMaterial.uniforms.time.value = clock.getElapsedTime();
                        radarRenderer.render(radarScene, radarCamera);
                    }
                }
                anim();
            }

            function initXR() {
                renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
                renderer.setPixelRatio(window.devicePixelRatio);
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.xr.enabled = true;
                
                const btn = ARButton.createButton(renderer, {
                    requiredFeatures: ['hit-test'],
                    optionalFeatures: ['dom-overlay'],
                    domOverlay: { root: document.body }
                });
                document.getElementById('ar-container').appendChild(btn);

                scene = new THREE.Scene();
                camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.01, 20);
                scene.add(new THREE.HemisphereLight(0xffffff, 0xbbbbff, 3));

                renderer.xr.addEventListener('sessionstart', () => {
                    xrState = 'active';
                    document.getElementById('xr-ui').style.display = 'block';
                    document.getElementById('main-container').style.background = 'transparent';
                    // On ne cache pas tout l'outil, on laisse la coque visible
                });

                // ARTEFACT - Rendu visible et éthéré
                const group = new THREE.Group(); group.name = 'art';
                const core = new THREE.Mesh(
                    new THREE.IcosahedronGeometry(0.08, 0),
                    new THREE.MeshPhysicalMaterial({
                        color: 0xffffff, emissive: 0x7f9cf5, emissiveIntensity: 2,
                        metalness: 0.9, roughness: 0.1, transparent: true, opacity: 0.9
                    })
                );
                const halo = new THREE.Mesh(
                    new THREE.IcosahedronGeometry(0.12, 1),
                    new THREE.MeshBasicMaterial({color: 0x7f9cf5, wireframe:true, transparent:true, opacity:0.3})
                );
                group.add(core, halo);

                reticle = new THREE.Mesh(
                    new THREE.RingGeometry(0.08, 0.1, 32).rotateX(-Math.PI/2),
                    new THREE.MeshBasicMaterial()
                );
                reticle.matrixAutoUpdate = false; reticle.visible = false;
                scene.add(reticle);

                controller = renderer.xr.getController(0);
                controller.addEventListener('select', () => {
                    if (!reticle.visible) return;
                    if (xrState === 'active') {
                        spawnedArtifact = group.clone();
                        reticle.matrix.decompose(spawnedArtifact.position, spawnedArtifact.quaternion, spawnedArtifact.scale);
                        scene.add(spawnedArtifact);
                        xrState = 'found';
                        document.getElementById('xr-ui').innerText = "RÉSONANCE STABLE - TOUCHER";
                    } else if (xrState === 'found') {
                        const m = new THREE.Matrix4().identity().extractRotation(controller.matrixWorld);
                        raycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
                        raycaster.ray.direction.set(0,0,-1).applyMatrix4(m);
                        if(raycaster.intersectObject(spawnedArtifact, true).length > 0) {
                            const d = ARTIFACTS_DATA[foundCount % 7];
                            document.getElementById('ui-art-name').innerText = d.name;
                            document.getElementById('ui-art-lore').innerText = d.lore;
                            document.getElementById('ui-word').innerText = d.word;
                            document.getElementById('ui-progress').innerText = `${(foundCount%7)+1} / 7`;
                            document.getElementById('artifact-ui').style.display = 'flex';
                        }
                    }
                });
                scene.add(controller);

                renderer.setAnimationLoop((t, frame) => {
                    if (frame && xrState === 'active') {
                        const session = renderer.xr.getSession();
                        const refSpace = renderer.xr.getReferenceSpace();
                        if (!hitTestSource) {
                            session.requestReferenceSpace('viewer').then(s => {
                                session.requestHitTestSource({space:s}).then(src => hitTestSource = src);
                            });
                        } else {
                            const results = frame.getHitTestResults(hitTestSource);
                            if (results.length > 0) {
                                reticle.visible = true;
                                reticle.matrix.fromArray(results[0].getPose(refSpace).transform.matrix);
                                
                                // Chaud Froid Pastel
                                const dist = reticle.position.distanceTo(new THREE.Vector3(0,0,-2));
                                if(dist < 0.5) { 
                                    reticle.material.color.setHex(0x7f9cf5); 
                                    document.getElementById('xr-ui').style.color = "var(--accent-hot)";
                                }
                                else if(dist < 1.5) {
                                    reticle.material.color.setHex(0xfbd38d);
                                    document.getElementById('xr-ui').style.color = "var(--accent-mid)";
                                }
                                else {
                                    reticle.material.color.setHex(0xfc8181);
                                    document.getElementById('xr-ui').style.color = "var(--accent-cold)";
                                }
                            } else { reticle.visible = false; }
                        }
                    }
                    if(spawnedArtifact) spawnedArtifact.rotation.y += 0.01;
                    renderer.render(scene, camera);
                });
            }

            document.getElementById('btn-continue').addEventListener('click', () => {
                window.location.href = window.location.pathname + '?fragment=' + (foundCount + 1);
            });
            document.getElementById('btn-inventory').addEventListener('click', () => {
                window.location.href = window.location.pathname + '?fragment=' + (foundCount + 1) + '&view=sanctuary';
            });
        }
    </script>
</body>
</html>
