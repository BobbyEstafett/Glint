<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GLINT - Alpha (Expérience Intégrale)</title>
    <style>
        body { margin: 0; padding: 0; background-color: #000; color: #00ffcc; font-family: monospace; overflow: hidden; }

        /* --- UI RADAR --- */
        #radar-ui {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            display: flex; flex-direction: column; align-items: center; 
            justify-content: flex-end; padding-bottom: 90px; box-sizing: border-box;
            z-index: 10; pointer-events: none; transition: opacity 0.5s;
        }
        
        .crt-overlay {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(0,0,0,0) 50%, rgba(0,0,0,0.3) 50%), linear-gradient(90deg, rgba(255,0,0,0.06), rgba(0,255,0,0.02), rgba(0,0,255,0.06));
            background-size: 100% 4px, 3px 100%; pointer-events: none; z-index: 5;
            animation: scrollScanlines 10s linear infinite;
        }

        @keyframes scrollScanlines { 0% { background-position: 0 0, 0 0; } 100% { background-position: 0 100vh, 0 0; } }

        #ar-veil {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: rgba(0, 255, 204, 0.2); mix-blend-mode: overlay; pointer-events: none; z-index: 4; display: none; 
        }

        #flash-overlay {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #ffffff; z-index: 5000; opacity: 0; pointer-events: none;
        }
        
        .info-box { 
            background: rgba(0, 10, 5, 0.85); padding: 20px; border: 1px solid rgba(0, 255, 204, 0.5); border-radius: 8px; 
            text-align: center; width: 85%; max-width: 400px; pointer-events: auto; backdrop-filter: blur(4px);
        }
        
        button {
            margin-top: 10px; padding: 12px 24px; background: rgba(0, 0, 0, 0.5); color: #00ffcc; border: 1px solid #00ffcc;
            font-family: monospace; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; width: 100%; border-radius: 4px;
        }

        #ar-container {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 1000; display: none; width: 85%; max-width: 400px;
        }
        
        #ARButton { 
            background: #ff003c !important; color: #fff !important; border: 1px solid #fff !important;
            width: 100% !important; position: static !important; border-radius: 4px !important;
            font-family: monospace !important; letter-spacing: 1px !important;
        }

        #xr-ui {
            position: absolute; top: 40px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 400px; z-index: 100;
            pointer-events: none; text-align: center; display: none; box-sizing: border-box;
            background: rgba(0, 10, 5, 0.85); border: 1px solid rgba(0, 255, 204, 0.5); border-radius: 8px;
            padding: 15px 20px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.8); backdrop-filter: blur(4px);
        }

        #artifact-ui {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 5, 2, 0.9); z-index: 6000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            backdrop-filter: blur(8px);
        }
        .artifact-card {
            background: rgba(0, 20, 10, 0.9); border: 2px solid #00ffcc; border-radius: 12px;
            padding: 30px 25px; width: 80%; max-width: 350px; text-align: center;
        }
        .artifact-stats { text-align: left; font-size: 0.85rem; border-top: 1px dashed rgba(0, 255, 204, 0.5); padding-top: 15px; margin-top: 20px; }
        .artifact-stats p { margin: 10px 0; color: #888; display: flex; justify-content: space-between; }
        
        #threejs-radar-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
    </style>
</head>
<body>

    <div id="flash-overlay"></div>
    <div id="threejs-radar-container"></div>
    <div class="crt-overlay" id="global-crt"></div>
    <div id="ar-veil"></div>
    <div id="ar-container"></div>

    <div id="radar-ui">
        <div class="info-box">
            <div id="main-title" style="font-size:1.2rem; margin-bottom:10px; letter-spacing:2px;">ANALYSEUR DE FLUX</div>
            <p id="distance-display">Recherche de signal...</p>
            <div id="data-stream" style="font-size:0.7rem; color:#444; margin-bottom:10px;">_</div>
            <button id="start-btn">Activer le Capteur</button>
        </div>
    </div>

    <div id="xr-ui">BALAYEZ LE SOL POUR LOCALISER LA FAILLE</div>

    <div id="artifact-ui">
        <div class="artifact-card">
            <h2 id="ui-art-name">FRAGMENT</h2>
            <p id="ui-art-lore" style="font-style:italic; color:#ccc; line-height:1.4;"></p>
            <div class="artifact-stats">
                <p>FRAGMENT <span id="ui-art-count">1 / 7</span></p>
                <p>MOT <span id="ui-art-word" style="color:#ff003c; font-weight:bold;">NOUS</span></p>
            </div>
            <button id="btn-sanctuary" style="background:#00ffcc; color:#000; font-weight:bold; margin-top:20px;">Ouvrir le Sanctuaire</button>
            <button id="btn-continue" style="color:#888; border-color:#444; background:transparent;">Continuer</button>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/addons/webxr/ARButton.js';

        // --- DATA ---
        const ARTIFACTS_DATA = [
            { name: "ÉCLAT MNÉMONIQUE", word: "NOUS", lore: "Une résonance cristallisée d'un futur oublié." },
            { name: "SOUVENIR LIQUIDE", word: "AVONS", lore: "Une larme digitale figée dans le flux du réseau." },
            { name: "FRAGMENT D'ÉCHO", word: "OUBLIÉ", lore: "Le silence entre deux paquets de données." },
            { name: "VECTEUR D'INTENTION", word: "COMMENT", lore: "Une direction sans but, gravée dans l'obsidienne." },
            { name: "NOYAU D'EXISTENCE", word: "ÊTRE", lore: "La pulsation primordiale du code source." },
            { name: "PRISME DE VÉRITÉ", word: "RÉELS", lore: "La donnée devient chair." },
            { name: "CLEF D'ANCRAGE", word: "...", lore: "Le point final de la fuite." }
        ];

        let foundCount = parseInt(localStorage.getItem('glint_progress')) || 0;
        let targetLat, targetLon, startLat, startLon, currentDistance = 999;
        let gameMode = 'radar';
        let cameraStream, radarRenderer, radarScene, radarCamera, shaderMaterial, clock = new THREE.Clock();
        let xrRenderer, xrScene, xrCamera, controller, reticle, hitTestSource, spawnedArtifact;
        const raycaster = new THREE.Raycaster();

        const flashOverlay = document.getElementById('flash-overlay');

        // --- 1. RADAR ---
        document.getElementById('start-btn').addEventListener('click', async () => {
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('main-title').innerText = "SYNCHRONISATION...";
            
            setInterval(() => {
                const chars = "0123456789ABCDEF"; let s = "";
                for(let i=0; i<16; i++) s += chars[Math.floor(Math.random()*16)];
                document.getElementById('data-stream').innerText = "[LEAK_ID] 0x" + s;
            }, 80);

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    startLat = pos.coords.latitude; startLon = pos.coords.longitude;
                    targetLat = startLat + 0.00002; targetLon = startLon + 0.00002;
                    navigator.geolocation.watchPosition(updateGPS, null, {enableHighAccuracy:true});
                });
            }
            try {
                cameraStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
                initRadar();
            } catch(e) { alert("Caméra indisponible"); }
        });

        function updateGPS(pos) {
            startLat = pos.coords.latitude; startLon = pos.coords.longitude;
            const R = 6371e3;
            const dLat = (targetLat-startLat)*Math.PI/180;
            const dLon = (targetLon-startLon)*Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(startLat*Math.PI/180)*Math.cos(targetLat*Math.PI/180)*Math.sin(dLon/2)**2;
            currentDistance = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            document.getElementById('distance-display').innerText = `Distance : ${Math.round(currentDistance)}m`;
            
            if (currentDistance < 6 && gameMode === 'radar') {
                showARButton();
            }
            let intensity = Math.max(0, 1 - (currentDistance / 15));
            if(shaderMaterial) shaderMaterial.uniforms.intensity.value = intensity;
        }

        function initRadar() {
            radarRenderer = new THREE.WebGLRenderer({ antialias: true });
            radarRenderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('threejs-radar-container').appendChild(radarRenderer.domElement);
            radarScene = new THREE.Scene();
            radarCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
            
            const video = document.createElement('video');
            video.srcObject = cameraStream; video.play();
            const videoTex = new THREE.VideoTexture(video);

            shaderMaterial = new THREE.ShaderMaterial({
                uniforms: { tDiffuse:{value:videoTex}, intensity:{value:0}, time:{value:0} },
                vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position=vec4(position,1.0); }`,
                fragmentShader: `
                    uniform sampler2D tDiffuse; uniform float intensity; uniform float time; varying vec2 vUv;
                    float rnd(vec2 s){ return fract(sin(dot(s,vec2(12.9898,78.233)))*43758.5453); }
                    void main(){
                        vec2 uv = vUv;
                        float offset = step(0.98, rnd(vec2(time*10.0, uv.y))) * (rnd(vec2(uv.y, time))-0.5) * intensity * 0.1;
                        uv.x += offset;
                        vec4 c = texture2D(tDiffuse, uv);
                        float l = dot(c.rgb, vec3(0.299,0.587,0.114));
                        vec3 col = mix(vec3(l), c.rgb, 1.0 + intensity*2.0);
                        float ab = 0.01 * intensity;
                        col.r = texture2D(tDiffuse, uv + vec2(ab, 0.0)).r + intensity*0.2;
                        col.b = texture2D(tDiffuse, uv - vec2(ab, 0.0)).b + intensity*0.1;
                        gl_FragColor = vec4(col, 1.0);
                    }
                `
            });
            radarScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2), shaderMaterial));
            
            initXR(); // Prépare l'AR
            
            function loop() {
                if(gameMode === 'radar') {
                    requestAnimationFrame(loop);
                    shaderMaterial.uniforms.time.value = clock.getElapsedTime();
                    radarRenderer.render(radarScene, radarCamera);
                }
            }
            loop();
        }

        // --- 2. EXTRACTION AR ---
        function showARButton() {
            if (document.getElementById('ar-container').style.display === 'block') return;
            const btn = ARButton.createButton(xrRenderer, {
                requiredFeatures: ['hit-test'],
                optionalFeatures: ['dom-overlay'],
                domOverlay: { root: document.body }
            });
            document.getElementById('ar-container').appendChild(btn);
            document.getElementById('ar-container').style.display = 'block';
        }

        function initXR() {
            xrRenderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            xrRenderer.setPixelRatio(window.devicePixelRatio);
            xrRenderer.setSize(window.innerWidth, window.innerHeight);
            xrRenderer.xr.enabled = true;

            xrScene = new THREE.Scene();
            xrCamera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.01, 20);
            xrScene.add(new THREE.HemisphereLight(0xffffff, 0xbbbbff, 2));

            xrRenderer.xr.addEventListener('sessionstart', () => {
                gameMode = 'ar';
                flashOverlay.style.opacity = '1';
                setTimeout(() => {
                    flashOverlay.style.transition = "opacity 1.5s";
                    flashOverlay.style.opacity = "0";
                    document.getElementById('radar-ui').style.display = 'none';
                    document.getElementById('ar-container').style.display = 'none';
                    document.getElementById('ar-veil').style.display = 'block';
                    document.getElementById('xr-ui').style.display = 'block';
                    if (cameraStream) cameraStream.getTracks().forEach(t => t.stop());
                    document.getElementById('threejs-radar-container').style.display = 'none';
                }, 300);
            });

            reticle = new THREE.Mesh(
                new THREE.RingGeometry(0.08, 0.1, 32).rotateX(-Math.PI/2),
                new THREE.MeshBasicMaterial({color: 0x00ffcc})
            );
            reticle.matrixAutoUpdate = false; reticle.visible = false;
            xrScene.add(reticle);

            controller = xrRenderer.xr.getController(0);
            controller.addEventListener('select', () => {
                if (!reticle.visible) return;
                if (!spawnedArtifact) {
                    const group = new THREE.Group();
                    group.add(new THREE.Mesh(new THREE.IcosahedronGeometry(0.06,0), new THREE.MeshNormalMaterial({flatShading:true})));
                    group.add(new THREE.Mesh(new THREE.IcosahedronGeometry(0.09,1), new THREE.MeshBasicMaterial({color:0xffffff, wireframe:true, opacity:0.5, transparent:true})));
                    reticle.matrix.decompose(group.position, group.quaternion, group.scale);
                    xrScene.add(group);
                    spawnedArtifact = group;
                    document.getElementById('xr-ui').innerText = "ANOMALIE DÉGAGÉE - TOUCHEZ L'OBJET";
                    document.getElementById('xr-ui').style.borderColor = "#fff";
                } else {
                    const tempMat = new THREE.Matrix4().identity().extractRotation(controller.matrixWorld);
                    raycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
                    raycaster.ray.direction.set(0,0,-1).applyMatrix4(tempMat);
                    if (raycaster.intersectObject(spawnedArtifact, true).length > 0) {
                        showArtifactUI();
                    }
                }
            });
            xrScene.add(controller);

            xrRenderer.setAnimationLoop((t, frame) => {
                if (gameMode === 'ar' && frame) {
                    const session = xrRenderer.xr.getSession();
                    const refSpace = xrRenderer.xr.getReferenceSpace();
                    if (!hitTestSource) {
                        session.requestReferenceSpace('viewer').then(space => {
                            session.requestHitTestSource({space}).then(src => hitTestSource = src);
                        });
                    } else {
                        const results = frame.getHitTestResults(hitTestSource);
                        if (results.length > 0 && !spawnedArtifact) {
                            reticle.visible = true;
                            reticle.matrix.fromArray(results[0].getPose(refSpace).transform.matrix);
                            // Chaud / Froid dynamique
                            let dist = reticle.position.distanceTo(new THREE.Vector3(0,0,-1));
                            reticle.material.color.setHex(dist < 0.4 ? 0x00ffcc : 0xff003c);
                        } else { reticle.visible = false; }
                    }
                }
                if (spawnedArtifact) spawnedArtifact.rotation.y += 0.01;
                if (gameMode !== 'radar') xrRenderer.render(xrScene, xrCamera);
            });
        }

        function showArtifactUI() {
            const data = ARTIFACTS_DATA[foundCount % 7];
            document.getElementById('ui-art-name').innerText = data.name;
            document.getElementById('ui-art-lore').innerText = `"${data.lore}"`;
            document.getElementById('ui-art-word').innerText = data.word;
            document.getElementById('ui-art-count').innerText = `${(foundCount % 7) + 1} / 7`;
            document.getElementById('artifact-ui').style.display = 'flex';
            document.getElementById('xr-ui').style.display = 'none';
            if (navigator.vibrate) navigator.vibrate(200);
        }

        // --- 3. SANCTUAIRE ---
        document.getElementById('btn-sanctuary').addEventListener('click', () => {
            flashOverlay.style.transition = 'none';
            flashOverlay.style.opacity = '1';
            gameMode = 'sanctuary';
            foundCount++;
            localStorage.setItem('glint_progress', foundCount);

            setTimeout(() => {
                if (xrRenderer.xr.getSession()) xrRenderer.xr.getSession().end();
                document.getElementById('artifact-ui').style.display = 'none';
                document.getElementById('ar-veil').style.display = 'none';
                
                // Reconstruction Scène 3D Classique
                while(xrScene.children.length > 0){ xrScene.remove(xrScene.children[0]); }
                xrScene.background = new THREE.Color(0x000105);
                xrCamera.position.set(0, 1.6, 3);
                xrCamera.lookAt(0, 1.2, 0);

                const mono = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.7, 0.8, 4, 7),
                    new THREE.MeshPhongMaterial({color: 0x0a0a0a, shininess: 100, flatShading: true})
                );
                mono.position.set(0, 1, -1);
                xrScene.add(mono);

                for(let i=0; i<7; i++){
                    const angle = (i/7)*Math.PI*2;
                    const isFound = i < foundCount;
                    const socket = new THREE.Mesh(
                        new THREE.IcosahedronGeometry(0.1, 0),
                        isFound ? new THREE.MeshNormalMaterial() : new THREE.MeshBasicMaterial({color: 0x00ffcc, wireframe:true, opacity:0.3, transparent:true})
                    );
                    socket.position.set(Math.cos(angle)*0.8, (i*0.5)-1, Math.sin(angle)*0.8);
                    mono.add(socket);
                }

                xrScene.add(new THREE.PointLight(0x00ffcc, 2, 10));
                xrScene.add(new THREE.AmbientLight(0x111111));

                flashOverlay.style.transition = "opacity 2s";
                flashOverlay.style.opacity = '0';

                function loop() {
                    if (gameMode === 'sanctuary') {
                        requestAnimationFrame(loop);
                        mono.rotation.y += 0.005;
                        xrRenderer.render(xrScene, xrCamera);
                    }
                }
                loop();
            }, 600);
        });

        document.getElementById('btn-continue').addEventListener('click', () => {
            foundCount++;
            localStorage.setItem('glint_progress', foundCount);
            location.reload();
        });

    </script>
</body>
</html>
